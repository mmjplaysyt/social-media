CREATE TABLE IF NOT EXISTS comments(id UUID DEFAULT gen_random_uuid() PRIMARY KEY,user_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,post_id UUID REFERENCES posts(id) ON DELETE CASCADE NOT NULL,content TEXT NOT NULL CHECK(char_length(content)>0),created_at TIMESTAMPTZ DEFAULT now());

CREATE TABLE IF NOT EXISTS messages(id UUID DEFAULT gen_random_uuid() PRIMARY KEY,conversation_id UUID REFERENCES conversations(id) ON DELETE CASCADE NOT NULL,sender_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,content TEXT NOT NULL CHECK(char_length(content)>0),created_at TIMESTAMPTZ DEFAULT now());

CREATE TABLE IF NOT EXISTS group_members(group_id UUID REFERENCES groups(id) ON DELETE CASCADE,user_id UUID REFERENCES profiles(id) ON DELETE CASCADE,role TEXT DEFAULT 'member' CHECK(role IN('admin','member')),PRIMARY KEY(group_id,user_id));
CREATE TABLE IF NOT EXISTS polls(id UUID DEFAULT gen_random_uuid() PRIMARY KEY,post_id UUID REFERENCES posts(id) ON DELETE CASCADE NOT NULL,question TEXT NOT NULL,multiple_choice BOOLEAN DEFAULT false,created_at TIMESTAMPTZ DEFAULT now());

function toast(m,t='in'){const b=document.getElementById('toastBox'),e=document.createElement('div');e.className='toast '+t;e.textContent=m;b.appendChild(e);setTimeout(()=>e.remove(),3100)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function timeAgo(d){if(!d)return'';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'d';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function defAv(n){const c=(n||'U').charAt(0).toUpperCase(),cols=['#d4922a','#e04050','#30c070','#5b9ef5','#9060cc','#e07830'],col=cols[(n||'U').charCodeAt(0)%cols.length];return"data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect width="80" height="80" rx="40" fill="'+col+'"/><text x="50%" y="54%" text-anchor="middle" dy=".1em" font-family="sans-serif" font-size="30" font-weight="700" fill="#fff">'+c+'</text></svg>')}
function avUrl(p){return p&&p.avatar_url?p.avatar_url:defAv(p?p.username:'U')}

async function handleAuth(e){e.preventDefault();const btn=document.getElementById('aBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';const email=document.getElementById('aE').value.trim(),pass=document.getElementById('aP').value;try{let r;if(authM==='signup'){r=await sb.auth.signUp({email,password:pass,options:{data:{username:document.getElementById('aU').value.trim().toLowerCase(),full_name:document.getElementById('aN').value.trim()}}});if(r.error)throw r.error;if(r.data.user&&!r.data.session){toast('Check email to confirm, then sign in.','in');authM='login';renderAuth();return}}else{r=await sb.auth.signInWithPassword({email,password:pass});if(r.error)throw r.error}me=r.data.user;await new Promise(r=>setTimeout(r,800));await ensureProfile(me);await loadProf(me.id);toast('Welcome!','ok');renderApp();setupRT()}catch(err){toast(err.message||'Auth failed','er');btn.disabled=false;btn.innerHTML=authM==='login'?'<i class="fas fa-arrow-right"></i> Sign In':'<i class="fas fa-user-plus"></i> Create Account'}}

function renderStoryViewer(){if(!storyViewerData?.length){closeStoryViewer();return}const s=storyViewerData[storyIdx];const uid=storyViewerUid||'';getProf(uid).then(prof=>{const name=esc(prof?.full_name||prof?.username||'User');const el=document.createElement('div');el.className='story-viewer';el.id='storyViewer';el.onclick=e=>{if(e.target===el||e.target.tagName==='IMG')nextStory()};let pg='<div class="story-progress">';storyViewerData.forEach((_,i)=>{pg+='<div class="story-progress-bar"><div class="story-progress-fill" id="spf-'+i+'" style="width:'+(i<storyIdx?'100':'0')+'%"></div></div>'});pg+='</div>';el.innerHTML=pg+'<div class="story-top"><img class="av av-s" src="'+avUrl(prof)+'" alt=""><div><div style="font-weight:600;font-size:13px;color:#fff">'+name+'</div><div style="font-size:11px;color:rgba(255,255,255,.5)">'+timeAgo(s.created_at)+'</div></div><button class="bi" style="color:#fff;font-size:18px;margin-left:auto" onclick="event.stopPropagation();closeStoryViewer()"><i class="fas fa-xmark"></i></button></div><img src="'+s.image_url+'" alt="Story" style="max-width:100%;max-height:100%;object-fit:contain">';document.getElementById('storyViewer')?.remove();document.body.appendChild(el);const f=document.getElementById('spf-'+storyIdx);if(f){let w=0;storyTimer=setInterval(()=>{w+=2;if(w>=100){clearInterval(storyTimer);nextStory()}else f.style.width=w+'%'},60)}})}
function nextStory(){clearInterval(storyTimer);storyIdx++;if(storyIdx>=storyViewerData.length)closeStoryViewer();else renderStoryViewer()}

function renderPosts(posts){const el=document.getElementById('feedArea');if(!el)return;if(!posts.length){el.innerHTML='<div class="empty-s"><i class="fas fa-feather-pointed"></i><p>No posts yet</p></div>';return}el.innerHTML=posts.map(p=>{const pr=p.profile||{username:'user',full_name:'User',avatar_url:''};let media='';if(p.image_url)media+='<img class="post-img" src="'+p.image_url+'" alt="" onclick="lightbox(\''+p.image_url+'\')" loading="lazy" onerror="this.style.display=\'none\'">';if(p.video_url)media+='<div class="video-wrap"><video src="'+p.video_url+'" preload="metadata" controls playsinline></video></div>';let pollH='';if(p.poll){const tv=Object.values(p.voteCounts).reduce((a,b)=>a+b,0);const hasVoted=Object.keys(p.myVotes).length>0;pollH='<div style="margin-top:10px;padding:12px;background:#0a0a0a;border:1px solid #262626;border-radius:10px"><div style="font-weight:700;font-size:13px;margin-bottom:8px">'+esc(p.poll.question)+'</div>'+(p.poll.poll_options||[]).map(o=>{const v2=p.voteCounts[o.id]||0;const pct=tv?Math.round(v2/tv*100):0;const iv=p.myVotes[o.id];return '<div class="poll-opt'+(iv?' voted':'')+'" onclick="votePoll(\''+o.id+'\',\''+p.id+'\')"><div class="poll-bar" style="width:'+(hasVoted?pct:0)+'%"></div><div class="poll-opt-text">'+esc(o.label)+(iv?' <i class="fas fa-check" style="color:var(--acc);font-size:11px"></i>':'')+'</div><div class="poll-opt-pct">'+(hasVoted?pct+'%':'')+'</div></div>'}).join('')+'<div style="font-size:11px;color:#555;margin-top:6px">'+tv+' vote'+(tv!==1?'s':'')+'</div></div>'}const isOther=me&&p.user_id!==me.id;const isF=amF(p.user_id);const fbHtml=isOther?'<button class="fbtn '+(isF?'fw':'nf')+'" style="flex-shrink:0" onclick="event.stopPropagation();toggleFollowFeed(\''+p.user_id+'\',this)">'+(isF?'Following':'Follow')+'</button>':'';return '<article class="post"><div style="display:flex;gap:10px"><img class="av" src="'+avUrl(pr)+'" alt="" onclick="viewUser(\''+p.user_id+'\')" loading="lazy"><div style="flex:1;min-wid async function createPost(){const ta=document.getElementById('compT'),content=ta?.value.trim();if(!content){toast('Write something','er');return}const btn=document.getElementById('compBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';await ensureProfile(me);await loadProf(me.id);let iu='',vu='';if(imgFile){try{const ext=imgFile.name.split('.').pop(),path=me.id+'/'+Date.now()+'.'+ext;const{error}=await sb.storage.from('post-images').upload(path,imgFile);if(!error)iu=sb.storage.from('post-images').getPublicUrl(path).data.publicUrl}catch(e){}}if(videoFile){try{const ext=videoFile.name.split('.').pop(),path=me.id+'/'+Date.now()+'_v.'+ext;const{error}=await sb.storage.from('videos').upload(path,videoFile);if(!error)vu=sb.storage.from('videos').getPublicUrl(path).data.publicUrl}catch(e){}}const pd=getPollFields();const{error}=await sb.from('posts').insert({user_id:me.id,content,image_url:iu,video_url:vu});if(error){toast('Failed','er');btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Post';return}const{data:np}=await sb.from('posts').select('id').eq('user_id',me.id).eq('content',content).order('created_at',{ascending:false}).limit(1).single();if(pd&&np){const{data:poll}=await sb.from('polls').insert({post_id:np.id,question:pd.question}).select().single();if(poll)await sb.from('poll_options').insert(pd.options.map((l,i)=>({poll_id:poll.id,label:l,sort_order:i})))}ta.value='';imgFile=null;imgPrev=null;videoFile=null;videoPrev=null;btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Post';document.getElementById('imgPrev').innerHTML='';document.getElementById('vidPrev').innerHTML='';const po=document.getElementById('pollOpts');if(po)po.style.display='none';toast('Posted!','ok');loadFeed()}
function handleImg(e){const f=e.target.files[0];if(!f||f.size>5*1024*1024){if(f)toast('Max 5MB','er');return}imgFile=f;imgPrev=URL.createObjectURL(f);document.getElementById('imgPrev').innerHTML='<div style="position:relative;border-radius:8px;overflow:hidden;margin-top:8px"><img src="'+imgPrev+'" style="width:100%;max-height:180px;object-fit:cover;border-radius:8px" alt=""><button onclick="event.stopPropagation();rmImg()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:11px"><i class="fas fa-xmark"></i></button></div>'}
function handleVid(e){const f=e.target.files[0];if(!f||f.size>50*1024*1024){if(f)toast('Max 50MB','er');return}videoFile=f;videoPrev=URL.createObjectURL(f);document.getElementById('vidPrev').innerHTML='<div style="position:relative;border-radius:8px;overflow:hidden;margin-top:8px"><video src="'+videoPrev+'" style="width:100%;max-height:180px;border-radius:8px" muted></video><button onclick="event.stopPropagation();rmVid()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:11px"><i class="fas fa-xmark"></i></button></div>'}
function rmImg(){imgFile=null;if(imgPrev)URL.revokeObjectURL(imgPrev);imgPrev=null;document.getElementById('imgPrev').innerHTML=''}
function rmVid(){videoFile=null;if(videoPrev)URL.revokeObjectURL(videoPrev);videoPrev=null;document.getElementById('vidPrev').innerHTML=''}
async function delPost(pid){showModal('Delete Post','',[{t:'Cancel',cls:'bgc bsm',fn:()=>{}},{t:'Delete',cls:'bp bsm',st:'background:var(--red);color:#fff',fn:async()=>{await sb.from('posts').delete().eq('id',pid);toast('Deleted','ok');if(view==='feed')loadFeed();else loadUserPosts(viewingUid||me.id,false)}}],true,'<p style="color:#555;font-size:13px">This cannot be undone.</p>')}

async function viewUser(uid){if(me&&uid===me.id){viewingUid=null;view='profile';chatView=null;renderApp();return}chatView=null;view='profile';viewingUid=uid;renderApp();const fp=document.getElementById('feedPane');fp.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner" style="width:28px;height:28px;border-width:3px;border-color:#333"></span></div>';const[pr,fr,pc,fc,gc,posts]=await Promise.all([sb.from('profiles').select('*').eq('id',uid).single(),me?sb.from('follows').select('follower_id').eq('follower_id',me.id).eq('following_id',uid).single():{data:null},sb.from('posts').select('*',{count:'exact',head:true}).eq('user_id',uid),sb.from('follows').select('*',{count:'exact',head:true}).eq('following_id',uid),sb.from('follows').select('*',{count:'exact',head:true}).eq('follower_id',uid),sb.from('posts').select('id,user_id,content,image_url,video_url,created_at,profiles!user_id(username,full_name,avatar_url)').eq('user_id',uid).order('created_at',{ascending:false}).limit(50)]);const p=pr.data;const isF=!!fr.data;if(isF)followCache[uid]=true;else delete followCache[uid];const ps=posts.data||[];const pids=ps.map(x=>x.id);let ul=[],lc={},cc={};if(pids.length&&me){const{data:lks}=await sb.from('likes').select('post_id').eq('user_id',me.id).in('post_id',pids);ul=lks||[];const{data:allL}=await sb.from('likes').select('post_id');(allL||[]).forEach(l=>{lc[l.post_id]=(lc[l.post_id]||0)+1})}if(pids.length){const{data:cs}=await sb.from('comments').select('post_id').in('post_id',pids);(cs||[]).forEach(c=>{cc[c.post_id]=(cc[c.post_id]||0)+1})}const{data:polls}=await sb.from('polls').select('*,poll_options(id,label,sort_order)').in('post_id',pids);const pollMap={};(polls||[]).forEach(x=>{pollMap[x.post_id]=x});const oIds=(polls||[]).flatMap(x=>(x.poll_options||[]).map(o=>o.id));let mv={};if(oIds.length&&me){const{data:vs}=await sb.from('poll_votes').select('poll_option_id').eq('user_id',me.id).in('poll_option_id',oIds);(vs||[]).forEach(v=>{mv[v.poll_option_id]=true})}const{data:av}=await sb.from('poll_votes').select('poll_option_id').in('poll_option_id',oIds);const vc={};(av||[]).forEach(v=>{vc[v.poll_option_id]=(vc[v.poll_option_id]||0)+1});const ep=ps.map(x=>({...x,profile:x.profiles,liked:ul.some(l=>l.post_id===x.id),likeCount:lc[x.id]||0,commentCount:cc[x.id]||0,poll:pollMap[x.id]||null,myVotes:mv,voteCounts:vc}));fp.innerHTML='<div class="feed-center"><div class="prof-h"><div class="prof-banner"></div><div style="padding:0 24px 24px"><div style="display:flex;align-items:flex-end;gap:14px;margin-top:-36px"><img class="av av-xl" src="'+avUrl(p)+'" alt="" style="border:4px solid var(--card)" loading="lazy"><div style="flex:1"></div><button class="fbtn '+(isF?'fw':'nf')+'" id="followBtn-'+p.id+'" onclick="toggleFollow(\''+p.id+'\')">'+(isF?'Following':'Follow')+'</button></div><h2 style="font-size:18px;font-weight:800;margin-top:12px">'+esc(p.full_name||p.username)+'</h2><p class="hd" style="margin-top:2px">@'+esc(p.username)+'</p><p style="font-size:13px;color:#555;margin-top:8px;line-height:1.5">'+(esc(p.bio)||'No bio yet.')+'</p><div style="display:flex;gap:18px;margin-top:12px"><span style="font-size:12px"><strong>'+(pc.count||0)+'</strong> <span style="color:#555">Posts</span></span><span style="font-size:12px"><strong>'+(fc.count||0)+'</strong> <span style="color:#555">Followers</span></span><span style="font-size:12px"><strong>'+(gc.count||0)+'</strong> <span style="color:#555">Following</span></span></div></div></div></div><div id="feedArea"></div></div>';renderPosts(ep)}

async function getOrCreateDM(uid){const{data:myConvos}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',me.id);if(!myConvos?.length){const{data:c}=await sb.from('conversations').insert({}).select().single();await sb.from('conversation_participants').insert([{conversation_id:c.id,user_id:me.id},{conversation_id:c.id,user_id:uid}]);return c.id}const cids=myConvos.map(x=>x.conversation_id);const{data:shared}=await sb.from('conversation_participants').select('conversation_id').in('conversation_id',cids).eq('user_id',uid).limit(1);if(shared?.length)return shared[0].conversation_id;const{data:c}=await sb.from('conversations').insert({}).select().single();await sb.from('conversation_participants').insert([{conversation_id:c.id,user_id:me.id},{conversation_id:c.id,user_id:uid}]);return c.id}

function renderDMFull(){document.getElementById('mainArea').innerHTML='<div style="display:flex;width:100%;height:100%"><div style="width:300px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:#0a0a0a;flex-shrink:0"><div style="padding:14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)"><button class="bi" onclick="chatView=null;renderApp()"><i class="fas fa-arrow-left"></i></button><h3 style="font-size:15px;font-weight:700">Messages</h3><button class="bi" style="margin-left:auto" onclick="newDMModal()"><i class="fas fa-pen-to-square"></i></button></div><div style="padding:8px 10px"><input class="inp" style="font-size:12px;padding:8px 12px" placeholder="Search..." id="dmFullSearch" oninput="searchDMUsers(this.value)"></div><div class="dm-list" id="dmListFull"><div style="text-align:center;padding:20px"><span class="spinner" style="border-color:#333"></span></div></div></div><div id="dmChatArea" style="flex:1;display:flex;flex-direction:column;background:#000"><div class="empty-s" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center"><i class="fas fa-comment-dots" style="font-size:42px;margin-bottom:8px;opacity:.15"></i><p style="font-weight:600;font-size:16px;margin-bottom:4px">Your Messages</p><p style="font-size:12px;color:#555">Select or start a conversation</p></div></div></div>';loadDMList()}
async function loadDMList(){const{data:parts}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',me.id);if(!parts?.length){const el=document.getElementById('dmListFull')||document.getElementById('dmList');if(el)el.innerHTML='<div class="empty-s" style="padding:20px"><i class="fas fa-comment-dots" style="font-size:42px;margin-bottom:8px;opacity:.15"></i><p style="font-size:12px;color:#555">No conversations yet</p></div>';return}const cids=parts.map(p=>p.conversation_id);const{data:other}=await sb.from('conversation_participants').select('conversation_id,user_id,profiles!user_id(username,full_name,avatar_url)').in('conversation_id',cids).neq('user_id',me.id);const{data:msgs}=await sb.from('messages').select('*').in('conversation_id',cids).order('created_at',{ascending:false});const lm={};msgs?.forEach(m=>{if(!lm[m.conversation_id])lm[m.conversation_id]=m});const cm={};(other||[]).forEach(p=>{cm[p.conversation_id]=p});const list=parts.map(p=>{const o=cm[p.conversation_id],l=lm[p.conversation_id];if(!o)return null;return{cid:p.conversation_id,peer:o,last:l}}).filter(Boolean).sort((a,b)=>new Date(b.last?.created_at||0)-new Date(a.last?.created_at||0));const el=document.getElementById('dmListFull')||document.getElementById('dmList');if(!el)return;el.innerHTML=list.map(c=>'<div class="dm-item '+(chatView?.convId===c.cid?'on':'')+'" onclick="openDM(\''+c.cid+'\',\''+c.peer.user_id+'\')"><img class="av-s" src="'+avUrl(c.peer)+'" alt="" loading="lazy"><div style="min-width:0;flex:1"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(c.peer?.full_name||c.peer?.username)+'</div><div class="last-msg">'+(c.last?esc(c.last.content):'No messages')+'</div></div>'+(c.last?'<span class="ts" style="color:#444">'+timeAgo(c.last.created_at)+'</span>':'')+'</div>').join('')}

function searchDMUsers(q){if(!q.trim())return loadDMList();const like='%'+q.trim()+'%';sb.from('profiles').select('*').or('username.ilike.'+like+',full_name.ilike.'+like).neq('id',me.id).limit(10).then(({data})=>{const el=document.getElementById('dmListFull')||document.getElementById('dmList');if(!el||!data?.length){if(el)el.innerHTML='<div style="padding:12px;color:#555;font-size:12px;text-align:center">No users found</div>';return}el.innerHTML=data.map(u=>'<div class="dm-item" onclick="startDMWith(\''+u.id+'\')"><img class="av-s" src="'+avUrl(u)+'" alt="" loading="lazy"><div><div style="font-weight:600;font-size:13px">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div></div></div>').join('')})}

async function newDMModal(){showModal('New Message',[{t:'Cancel',cls:'bgc bsm',fn:()=>{}},{t:'Start',cls:'bp bsm',fn:()=>{const v=document.getElementById('newDmInp')?.value.trim();if(!v)return;closeModal();startDMWithByUsername(v)}}],true,'<p style="color:#555;font-size:13px;margin-bottom:14px">Type a username to start chatting.</p><div><label class="lbl">Username</label><input class="inp" id="newDmInp" placeholder="username"></div>')}
async function startDMWithUsername(name){const{data}=await sb.from('profiles').select('*').ilike('username',name).neq('id',me.id).limit(1);if(!data?.length){toast('User not found','er');return}startDMWith(data[0].id)}

async function openDM(cid,peerId){chatView={type:'dm',convId:cid,peerId};unreadDMs=0;renderNav();const area=document.getElementById('dmChatArea');if(area){area.innerHTML='';loadDMChat(area,cid,peerId)}else{renderDMFull();setTimeout(()=>{const a=document.getElementById('dmChatArea');if(a)loadDMChat(a,cid,peerId)},50)}loadDMList()}
async function loadDMChat(area,cid,peerId){const peer=await getProf(peerId);area.innerHTML='<div class="chat-header"><button class="bi" onclick="chatView={type:\'dm\'};renderDMFull()"><i class="fas fa-arrow-left"></i></button><img class="av av-s" src="'+avUrl(peer)+'" alt="" loading="lazy"><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px">'+esc(peer.full_name||peer.username)+'</div><div class="hd" style="font-size:10px">@'+esc(peer.username)+'</div></div><button class="bi" title="Voice call" onclick="startCall(\'dm\',\''+cid+'\',null,\''+peerId+'\')"><i class="fas fa-phone"></i></button><button class="bi" title="Video call" onclick="startCall(\'dm\',\''+cid+'\',null,\''+peerId+'\',true)"><i class="fas fa-video"></i></button></div><div class="chat-messages" id="chatMsgs"><div style="text-align:center;padding:40px"><span class="spinner" style="border-color:#333"></span></div></div><div class="chat-input-bar"><input class="inp" id="chatInp" placeholder="Type a message..." onkeydown="if(event.key===\'Enter\')sendDM()"><button class="bp bsm" onclick="sendDM()" style="padding:8px 14px"><i class="fas fa-paper-plane"></i></button></div></div>';loadMessages();document.getElementById('chatInp')?.focus()}
async function sendDM(){if(!chatView||chatView.type!=='dm')return;const inp=document.getElementById('chatInp');if(!inp||!inp.value.trim())return;await sb.from('messages').insert({conversation_id:chatView.convId,sender_id:me.id,content:inp.value.trim()});inp.value='';playSend();loadMessages()}

async function loadMessages(){if(!chatView)return;const cid=chatView.type==='dm'?chatView.convId:chatView.groupId;const{data:msgs}=await sb.from('messages').select('*,profiles!sender_id(username,full_name,avatar_url)').eq('conversation_id',cid).order('created_at',{ascending:true}).limit(200);const el=document.getElementById('chatMsgs');if(!el)return;if(!msgs?.length){el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px;color:#555">No messages yet. Say hello!</p></div>';return}let html='',ld='';msgs.forEach(m=>{const d=new Date(m.created_at).toLocaleDateString();if(d!==ld){ld=d;html+='<div class="msg-date-divider"><span>'+(d===new Date().toLocaleDateString()?'Today':d)+'</span></div>'}const sr=m.profiles||{username:'user',full_name:'User',avatar_url:''};let ct=esc(m.content);if(ct.startsWith('[CALL]')){const ps2=ct.split('|');ct='<span style="color:#555;display:flex;align-items:center;gap:6px"><i class="fas fa-'+(ps2[1]==='video'?'video':'phone')+'"></i> '+(m.sender_id===me.id?'You':esc(sr.full_name||sr.username))+' started a '+(ps2[1]==='video'?'video':'voice')+' call'+(parseInt(ps2[2])>0?' · '+fmtTime(parseInt(ps2[2])):'')+'</span>'}html+='<div style="display:flex;gap:6px;'+(m.sender_id===me.id?'flex-direction:row-reverse':'')+'"><div class="msg-bubble '+(m.sender_id===me?'msg-self':'msg-other')+'"><div>'+ct+'</div><div class="msg-meta" style="text-align:'+(m.sender_id===me?'right':'left')+'">'+(m.sender_id===me?'You':esc(sr.full_name||sr.username))+' · '+timeAgo(m.created_at)+'</div></div></div>'});el.innerHTML=html;el.scrollTop=el.scrollHeight}

async function goGroups(){chatView={type:'group'};view='feed';renderApp();renderGroupsFull()}
function renderGroupsFull(){document.getElementById('mainArea').innerHTML='<div style="display:flex;width:100%;height:100%"><div style="width:300px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:#0a0a0a;flex-shrink:0"><div style="padding:14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)"><button class="bi" onclick="chatView=null;renderApp()"><i class="fas fa-arrow-left"></i></button><h3 style="font-size:15px;font-weight:700">Groups</h3><button class="bi" style="margin-left:auto" onclick="createGroupModal()"><i class="fas fa-plus"></i></button></div><div style="padding:8px 10px"><input class="inp" style="font-size:12px;padding:8px 12px" placeholder="Search..." id="grpSearch" oninput="searchGroups(this.value)"></div><div class="dm-list" id="grpList"><div style="text-align:center;padding:20px"><span class="spinner" style="border-color:#333"></span></div></div></div><div id="grpChatArea" style="flex:1;display:flex;flex-direction:column;background:#000"><div class="empty-s" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center"><i class="fas fa-users" style="font-size:42px;margin-bottom:8px;opacity:.15"></i><p style="font-weight:600;font-size:16px;margin-bottom:4px">Your Groups</p><p style="font-size:12px;color:#555">Select or create a group</p></div></div></div>';loadGroupList()}
async function loadGroupList(){const{data:mems}=await sb.from('group_members').select('group_id,role,groups(id,name,description,created_at)').eq('user_id',me.id);const el=document.getElementById('grpList');if(!el)return;if(!mems?.length){el.innerHTML='<div class="empty-s" style="padding:20px"><i class="fas fa-users" style="font-size:42px;margin-bottom:8px;opacity:.15"></i><p style="font-size:12px;color:#555">No groups yet</p></div>';return}el.innerHTML=mems.sort((a,b)=>new Date(b.groups?.created_at||0)-new Date(a.groups?.created_at||0)).map(m=>'<div class="dm-item '+(chatView?.groupId===m.group_id?'on':'')+'" onclick="openGroup(\''+m.group_id+'\')"><div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,rgba(212,146,42,.15),rgba(154,112,208,.1));display:flex;align-items:center;flex-shrink:0"><i class="fas fa-users" style="font-size:13px;color:var(--acc)"></i></div><div style="min-width:0;flex:1"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(m.groups?.name)+'</div><div class="last-msg">'+(esc(m.groups?.description)||'No description')+'</div></div>'+(m.role==='admin'?'<span class="role role-admin" style="font-size:9px">Admin</span>':'')+'</div>').join('')}
function searchGroups(q){if(!q.trim())return loadGroupList();sb.from('groups').select('*,group_members(user_id)').ilike('name','%'+q+'%').limit(10).then(({data})=>{const el=document.getElementById('grpList');if(!el||!data?.length){if(el)el.innerHTML='<div style="padding:12px;color:#555;font-size:12px;text-align:center">None found</div>';return}el.innerHTML=data.map(g=>'<div class="dm-item" onclick="openGroup(\''+g.id+'\')"><div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,rgba(212,146,42,.2),rgba(154,112,208,.1));display:flex;align-items:center;flex-shrink:0"><i class="fas fa-users" style="font-size:13px;color:var(--acc)"></i></div><div style="min-width:0"><div style="font-weight:600;font-size:13px">'+esc(g.name)+'</div><div class="hd">'+(g.group_members?.length||0)+' members</div></div></div>').join('')})}

async function createGroupModal(){showModal('Create Group',[{t:'Cancel',cls:'bgc bsm',fn:()=>{}},{t:'Create',cls:'bp bsm',fn:async()=>{const n=document.getElementById('newGrpName')?.value.trim();if(!n){toast('Name required','er');return}const{data:g}=await sb.from('groups').insert({name:n,description:document.getElementById('newGrpDesc')?.value.trim()||'',created_by:me.id}).select().single();await sb.from('group_members').insert({group_id:g.id,user_id:me.id,role:'admin'});await sb.from('conversations').upsert({id:g.id},{onConflict:'id'});closeModal();toast('Group created!','ok');loadGroupList();openGroup(g.id)}}],true,'<div style="margin-bottom:14px"><label class="lbl">Group Name</label><input class="inp" id="newGrpName" placeholder="My Group" maxlength="40"></div><div><label class="lbl">Description</label><input class="inp" id="newGrpDesc" placeholder="About this group" maxlength="100"></div>')}
async function ensureGroupConv(gid){const{data:ex}=await sb.from('conversations').select('id').eq('id',gid).single();if(!ex)await sb.from('conversations').upsert({id:gid},{onConflict:'id'})}
async function openGroup(gid){chatView={type:'group',groupId:gid};unreadGroups=0;renderNav();await ensureGroupConv(gid);const area=document.getElementById('grpChatArea');if(area){area.innerHTML='';loadGroupChat(area,gid)}else{renderGroupsFull();setTimeout(()=>{const a=document.getElementById('grpChatArea');if(a)loadGroupChat(a,gid)},50)}loadGroupList()}
async function loadGroupChat(area,gid){const{data:grp}=await sb.from('groups').select('*').eq('id',gid).single();const{data:mems}=await sb.from('group_members').select('user_id,role,profiles!user_id(username,full_name,avatar_url)').eq('group_id',gid);const isAdmin=mems?.some(m=>m.user_id===me.id&&m.role==='admin');area.innerHTML='<div class="chat-header"><button class="bi" onclick="chatView={type:\'group\'};renderGroupsFull()"><i class="fas fa-arrow-left"></i></button><div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,rgba(212,146,42,.2),rgba(154,112,208,.15));display:flex;align-items:center;flex-shrink:0"><i class="fas fa-users" style="font-size:13px;color:var(--acc)"></i></div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(grp?.name)+'</div><div class="hd" style="font-size:10px">'+(mems?.length||0)+' members</div></div><button class="bi" title="Voice call" onclick="startCall(\'group\',null,\''+gid+'\',null,false)"><i class="fas fa-phone"></i></button><button class="bi" title="Video call" onclick="startCall(\'group\',null,\''+gid+'\',null,true)"><i class="fas fa-video"></i></button><button class="bi" onclick="showGroupInfo(\''+gid+'\')"><i class="fas fa-circle-info"></i></button>'+(isAdmin?'<button class="bi" onclick="showAddMember(\''+gid+'\')"><i class="fas fa-user-plus"></i></button>':'')+'</div><div class="chat-messages" id="chatMsgs"><div style="text-align:center;padding:40px"><span class="spinner" style="border-color:#333"></span></div></div><div class="chat-input-bar"><input class="inp" id="chatInp" placeholder="Message the group..." onkeydown="if(event.key===\'Enter\')sendGroupMsg()"><button class="bp bsm" onclick="sendGroupMsg()" style="padding:8px 14px"><i class="fas fa-paper-plane"></i></button></div></div>';loadMessages();document.getElementById('chatInp')?.focus()}
async function sendGroupMsg(){if(!chatView||chatView.type!=='group')return;const inp=document.getElementById('chatInp');if(!inp||!inp.value.trim())return;await ensureGroupConv(chatView.groupId);await sb.from('messages').insert({conversation_id:chatView.groupId,sender_id:me.id,content:inp.value.trim()});inp.value='';playSend();loadMessages()}

async function showGroupInfo(gid){const{data:grp}=await sb.from('groups').select('*').eq('id',gid).single();const{data:mems}=await sb.from('group_members').select('user_id,role,profiles!user_id(username,full_name,avatar_url)').eq('group_id',gid);const isAdmin=mems?.some(m=>m.user_id===me.id&&m.role==='admin'),isCr=grp?.created_by===me.id;const ml=(mems||[]).map(m=>'<div class="grp-member"><img class="av av-s" src="'+avUrl(m.profiles)+'" alt="" loading="lazy"><div style="flex:1;min-width:0"><span class="un" style="font-size:12px" onclick="closeModal();viewUser(\''+m.user_id+'\')">'+esc(m.profiles?.full_name||m.profiles?.username)+'</span><span class="hd" style="font-size:10px"> @'+esc(m.profiles?.username)+'</span></div><span class="role '+(m.role==='admin'?'role-admin':'role-member')+'">'+m.role+'</span>'+(isAdmin&&m.user_id!==me.id?'<button class="bi" style="font-size:11px;color:var(--red)" onclick="removeFromGroup(\''+gid+'\',\''+m.user_id+'\')"><i class="fas fa-xmark"></i></button>':'')+'</div>').join('');const btns=[{t:'Close',cls:'bgc bsm',fn:()=>{}}];if(isCr)btns.push({t:'Delete Group',cls:'bp bsm',st:'background:var(--red);color:#fff',fn:async()=>{await sb.from('groups').delete().eq('id',gid);closeModal();chatView={type:'group'};renderGroupsFull();toast('Deleted','ok')}});else if(isAdmin)btns.push({t:'Leave',cls:'bgc bsm',st:'border-color:var(--red);color:var(--red)',fn:async()=>{await sb.from('group_members').delete().eq('group_id',gid).eq('user_id',me.id);closeModal();chatView={type:'group'};renderGroupsFull();toast('Left','ok')}});showModal(grp?.name||'Group',btns,true,'<p style="color:#555;font-size:12px;margin-bottom:12px">'+(esc(grp?.description)||'No description')+'</p><div style="max-height:240px;overflow-y:auto;border-top:1px solid var(--border);padding-top:8px">'+ml+'</div>')}

async function showAddMember(gid){showModal('Add Member',[{t:'Cancel',cls:'bgc bsm',fn:()=>{}},{t:'Add',cls:'bp bsm',fn:async()=>{const un=document.getElementById('addMemInp')?.value.trim();if(!un){toast('Enter username','er');return}const{data:u}=await sb.from('profiles').select('*').ilike('username',un).limit(1);if(!u?.length){toast('Not found','er');return}if(u[0].id===me.id){toast('Already member','er');return}const{data:ex}=await sb.from('group_members').select('user_id').eq('group_id',gid).eq('user_id',u[0].id).single();if(ex){toast('Already in group','er');return}await sb.from('group_members').insert({group_id:gid,user_id:u[0].id,role:'member'});closeModal();toast(u[0].username+' added!','ok');const a=document.getElementById('grpChatArea');if(a)loadGroupChat(a,gid)}}],true,'<div><label class="lbl">Username</label><input class="inp" id="addMemInp" placeholder="username"></div>')}
async function removeFromGroup(gid,uid){await sb.from('group_members').delete().eq('group_id',gid).eq('user_id',uid);toast('Removed','ok');closeModal();const a=document.getElementById('grpChatArea');if(a)loadGroupChat(a,gid)}
async function loadExplore(){await refreshFC();const el=document.getElementById('feedArea');if(!el)return;el.innerHTML='<div style="margin-bottom:18px"><h2 style="font-size:20px;font-weight:800;margin-bottom:12px">Explore</h2><input class="inp" placeholder="Search users..." id="exploreInp" oninput="doExplore(this.value)" style="padding:12px 16px;font-size:14px"></div><div id="exploreResults"><div class="empty-s"><i class="fas fa-compass" style="font-size:42px;margin-bottom:8px;opacity:.15"></i><p style="font-weight:600;font-size:16px;margin-bottom:4px">Discover People</p></div></div>';const{data:users}=await sb.from('profiles').select('*').neq('id',me.id).order('created_at',{ascending:false}).limit(8);if(users?.length)document.getElementById('exploreResults').innerHTML='<h3 style="font-size:14px;font-weight:600;color:#555;margin-bottom:12px">Suggested</h3>'+users.map(u=>'<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser(\''+u.id+'\')"><img class="av" src="'+avUrl(u)+'" alt="" loading="lazy"><div style="flex:1;min-width:0"><div class="un">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div>'+(u.bio?'<p style="font-size:11px;color:#555;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(u.bio)+'</p>':'')+'</div><button class="fbtn '+(amF(u.id)?'fw':'nf')+'" onclick="event.stopPropagation();toggleFollowExplore(\''+u.id+'\',this)">'+(amF(u.id)?'Following':'Follow')+'</button></div>').join('')}

async function doExplore(q){if(!q.trim()){loadExplore();return}await refreshFC();const like='%'+q.trim()+'%';const{data:users}=await sb.from('profiles').select('*').or('username.ilike.'+like+',full_name.ilike.'+like).neq('id',me.id).limit(20);const el=document.getElementById('exploreResults');if(!el)return;if(!users?.length){el.innerHTML='<div class="empty-s"><p>No users found</p></div>';return}el.innerHTML=users.map(u=>'<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser(\''+u.id+'\')"><img class="av" src="'+avUrl(u)+'" alt="" loading="lazy"><div style="flex:1;min-width:0"><div class="un">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div></div><button class="fbtn '+(amF(u.id)?'fw':'nf')+'" onclick="event.stopPropagation();toggleFollowExplore(\''+u.id+'\',this)">'+(amF(u.id)?'Following':'Follow')+'</button></div>').join('')}

async function goSettings(){chatView=null;view='settings';renderApp();const fp=document.getElementById('mainArea');fp.innerHTML='<div class="feed-pane"><div class="feed-center"><h2 style="font-size:20px;font-weight:800;margin-bottom:20px">Settings</h2><div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px"><h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Edit Profile</h3><div style="display:flex;align-items:center;gap:16px;margin-bottom:20px"><div class="avatar-upload" onclick="document.getElementById(\'avatarFileInput\').click()"><img class="av av-xl" id="avatarPreview" src="'+avUrl(myProf)+'" alt=""><div class="av-overlay"><i class="fas fa-camera" style="color:#fff;font-size:20px"></i></div></div><input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="previewAvatar(this)"><div style="flex:1"><p style="font-size:12px;color:#555">Click avatar to upload</p><p style="font-size:11px;color:#333;margin-top:2px">JPG, PNG — max 2MB</p></div></div><div style="margin-bottom:14px"><label class="lbl">Display Name</label><input class="inp" id="setName" value="'+esc(myProf?.full_name||'')+'" maxlength="50"></div><div style="margin-bottom:14px"><label class="lbl">Username</label><input class="inp" id="setUser" value="'+esc(myProf?.username||'')+'" maxlength="20" pattern="[a-zA-Z0-9_]+"></div><div style="margin-bottom:14px"><label class="lbl">Bio</label><textarea class="inp" id="setBio" maxlength="160" style="resize:none;min-height:60px;font-size:13px">'+esc(myProf?.bio||'')+'</textarea></div><button class="bp" id="saveBtn" onclick="saveSettings()"><i class="fas fa-check"></i> Save Changes</button></div><div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px"><h3 style="font-size:15px;font-weight:700;margin-bottom:8px;color:var(--red)">Danger Zone</h3><p style="font-size:12px;color:#555;margin-bottom:14px">Sign out of your account</p><button class="bgc" style="border-color:var(--red);color:var(--red)" onclick="handleLogout()"><i class="fas fa-right-from-bracket"></i> Sign Out</button></div></div></div>'}
function previewAvatar(input){const f=input.files[0];if(!f)return;if(f.size>2*1024*1024){toast('Max 2MB','er');input.value='';return}pendingAvatarFile=f;document.getElementById('avatarPreview').src=URL.createObjectURL(f)}
async function saveSettings(){const btn=document.getElementById('saveBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';const fn=document.getElementById('setName').value.trim(),un=document.getElementById('setUser').value.trim().toLowerCase(),bio=document.getElementById('setBio').value.trim();let avu=myProf?.avatar_url||'';if(!un||!/^[a-zA-Z0-9_]+$/.test(un)){toast('Invalid username','er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';return}if(pendingAvatarFile){try{toast('Uploading avatar...','in');const ext=pendingAvatarFile.name.split('.').pop();const path=me.id+'/avatar.'+ext;if(myProf?.avatar_url){const oldPath=myProf.avatar_url.split('/').slice(-2).join('/');if(oldPath.includes('avatar'))await sb.storage.from('avatars').remove([oldPath]).catch(()=>{})}await sb.storage.from('avatars').upload(path,pendingAvatarFile,{upsert:true});avu=sb.storage.from('avatars').getPublicUrl(path).data.publicUrl+'?t='+Date.now()}catch(e){toast('Upload failed: '+(e.message||''),'er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';pendingAvatarFile=null;return}pendingAvatarFile=null}try{const{error}=await sb.from('profiles').update({full_name:fn,username:un,bio,avatar_url:avu}).eq('id',me.id);if(error){toast(error.message,'er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';return}myProf={...myProf,full_name:fn,username:un,bio,avatar_url:avu};toast('Saved!','ok');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';renderNav()}catch(e){toast('Save failed','er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes'}}

function goFeed(){chatView=null;viewingUid=null;view='feed';dmOpen=true;renderApp()}
function goProfile(){chatView=null;viewingUid=null;view='profile';renderApp()}
function goExplore(){chatView=null;viewingUid=null;view='explore';dmOpen=true;renderApp()}
async function handleLogout(){if(activeCall)endCall();await sb.auth.signOut();me=null;myProf=null;chatView=null;view='feed';followCache={};renderAuth()}
async function renderDMChat(){if(!chatView||chatView.type!=='dm')return;const area=document.getElementById('chatArea');if(area)await loadDMChat(area,chatView.convId,chatView.peerId)}
async function renderGroupChat(){if(!chatView||chatView.type!=='group')return;const area=document.getElementById('chatArea');if(area){await ensureGroupConv(chatView.groupId);await loadGroupChat(area,chatView.groupId)}}
function startCall(type,convId,groupId,peerId,isVideo){toast('Calling feature requires WebRTC setup','in')}
function endCall(){if(activeCall){activeCall=null;clearInterval(callTimerInt);document.getElementById('callOverlay')?.remove();toast('Call ended','ok')}}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(activeCall)endCall();else if(storyViewerData)closeStoryViewer();else closeModal()}});
init();
</script>
</body>
