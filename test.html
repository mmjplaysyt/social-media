const SQL=`CREATE TABLE IF NOT EXISTS profiles(id UUID REFERENCES auth.users ON DELETE CASCADE PRIMARY KEY,username TEXT UNIQUE NOT NULL,full_name TEXT DEFAULT '',avatar_url TEXT DEFAULT '',bio TEXT DEFAULT '',created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS posts(id UUID DEFAULT gen_random_uuid() PRIMARY KEY,user_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,content TEXT NOT NULL CHECK(char_length(content)>0),image_url TEXT DEFAULT '',video_url TEXT DEFAULT '',created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS likes(user_id UUID REFERENCES profiles(id) ON DELETE CASCADE,post_id UUID REFERENCES posts(id) ON DELETE CASCADE,PRIMARY KEY(user_id,post_id),created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS comments(id UUID DEFAULT gen_random_uuid() PRIMARY KEY,user_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,post_id UUID REFERENCES posts(id) ON DELETE CASCADE NOT NULL,content TEXT NOT NULL CHECK(char_length(content)>0),created_at TIMESTAMPTZ DEFAULT now());

CREATE TABLE IF NOT EXISTS conversations(id UUID DEFAULT gen_random_uuid() PRIMARY KEY,created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS conversation_participants(conversation_id UUID REFERENCES conversations(id) ON DELETE CASCADE,user_id UUID REFERENCES profiles(id) ON DELETE CASCADE,PRIMARY KEY(conversation_id,user_id));
CREATE TABLE IF NOT EXISTS messages(id UUID DEFAULT gen_random_uuid() PRIMARY KEY,conversation_id UUID REFERENCES conversations(id) ON DELETE CASCADE NOT NULL,sender_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,content TEXT NOT NULL CHECK(char_length(content)>0),created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS groups(id UUID DEFAULT gen_random_uuid() PRIMARY KEY,name TEXT NOT NULL,description TEXT DEFAULT '',avatar_url TEXT DEFAULT '',created_by UUID REFERENCES profiles(id) ON DELETE CASCADE,created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS group_members(group_id UUID REFERENCES groups(id) ON DELETE CASCADE,user_id UUID REFERENCES profiles(id) ON DELETE CASCADE,role TEXT DEFAULT 'member' CHECK(role IN('admin','member')),PRIMARY KEY(group_id,user_id));
CREATE TABLE IF NOT EXISTS polls(id UUID DEFAULT gen_random_uuid() PRIMARY KEY,post_id UUID REFERENCES posts(id) ON DELETE CASCADE NOT NULL,question TEXT NOT NULL,multiple_choice BOOLEAN DEFAULT false,created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS poll_options(id UUID DEFAULT gen_random_uuid() PRIMARY KEY,poll_id UUID REFERENCES polls(id) ON DELETE CASCADE NOT NULL,label TEXT NOT NULL,sort_order INT DEFAULT 0);

CREATE TABLE IF NOT EXISTS stories(id UUID DEFAULT gen_random_uuid() PRIMARY KEY,user_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,image_url TEXT NOT NULL,created_at TIMESTAMPTZ DEFAULT now());

function toast(m,t='in'){const b=document.getElementById('toastBox'),e=document.createElement('div');e.className='toast '+t;e.textContent=m;b.appendChild(e);setTimeout(()=>e.remove(),3100)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function timeAgo(d){if(!d)return'';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'d';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function defAv(n){const c=(n||'U').charAt(0).toUpperCase(),cols=['#d4922a','#d94050','#3ab87a','#5b9ef5','#9a70d0','#e07830'],col=cols[(n||'U').charCodeAt(0)%cols.length];return"data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect width="80" height="80" rx="40" fill="'+col+'"/><text x="50%" y="54%" text-anchor="middle" dy=".1em" font-family="sans-serif" font-size="30" font-weight="700" fill="#fff">'+c+'</text></svg>')}

function setupRT(){sb.channel('mmj-rt').on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},()=>{if(view==='feed'&&!chatView)loadFeed()}).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},payload=>{const cid=payload.new.conversation_id;if(chatView&&((chatView.type==='dm'&&chatView.convId===cid)||(chatView.type==='group'&&chatView.groupId===cid))){loadMessages();if(payload.new.sender_id!==me.id)playRecv()}else{if(chatView?.type==='dm')unreadDMs++;else unreadGroups++;renderNav();playRecv();if(document.getElementById('dmListFull'))loadDMList();if(document.getElementById('grpList'))loadGroupList()}}).subscribe()}

async function loadStories(){const el=document.getElementById('storiesBar');if(!el)return;const{data:stories}=await sb.from('stories').select('*,author:profiles!user_id(username,full_name,avatar_url)').gte('created_at',new Date(Date.now()-24*3600000).toISOString()).order('created_at',{ascending:false});if(!stories?.length){el.innerHTML='';return}const byUser={};stories.forEach(s=>{if(!byUser[s.user_id])byUser[s.user_id]={user:s.author,items:[]};byUser[s.user_id].items.push(s)});const arr=Object.values(byUser);let h='<div class="stories-bar" aria-label="Stories"><div class="story-item" onclick="addStoryModal()"><div style="position:relative"><div style="width:56px;height:56px;border-radius:50%;background:var(--card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center"><i class="fas fa-plus" style="color:var(--acc);font-size:18px"></i></div></div><span>Add Story</span></div>';arr.forEach(u=>{h+='<div class="story-item" onclick="viewStories(\''+u.user.id+'\')"><div class="story-ring"><img src="'+avUrl(u.user)+'" style="width:56px;height:56px;object-fit:cover" alt="" loading="lazy"></div><span>'+esc(u.user.username)+'</span></div>'});h+='</div>';el.innerHTML=h}

function renderStoryViewer(){if(!storyViewerData||!storyViewerData.length){closeStoryViewer();return}const s=storyViewerData[storyIdx],u=s.author;const el=document.createElement('div');el.className='story-viewer';el.id='storyViewer';el.onclick=e=>{if(e.target===el||e.target.tagName==='IMG')nextStory()};let prog='<div class="story-progress">';storyViewerData.forEach((_,i)=>{prog+='<div class="story-progress-bar"><div class="story-progress-fill" id="spf-'+i+'" style="width:'+(i<storyIdx?'100':'0')+'%"></div></div>'});prog+='</div>';el.innerHTML=prog+'<div class="story-top"><img class="av av-s" src="'+avUrl(u)+'" alt=""><div><div style="font-weight:600;font-size:13px;color:#fff">'+esc(u?.full_name||u?.username)+'</div><div style="font-size:11px;color:rgba(255,255,255,.6)">'+timeAgo(s.created_at)+'</div></div><button class="bi" style="color:#fff;font-size:18px;margin-left:auto" onclick="event.stopPropagation();closeStoryViewer()" aria-label="Close"><i class="fas fa-xmark"></i></button></div><img src="'+s.image_url+'" alt="Story" style="max-width:100%;max-height:100%;object-fit:contain">';document.body.appendChild(el);const fill=document.getElementById('spf-'+storyIdx);if(fill){let w=0;storyTimer=setInterval(()=>{w+=2;if(w>=100){clearInterval(storyTimer);nextStory()}else fill.style.width=w+'%'},60)}}
function nextStory(){clearInterval(storyTimer);storyIdx++;if(storyIdx>=storyViewerData.length)closeStoryViewer();else{document.getElementById('storyViewer')?.remove();renderStoryViewer()}}
function closeStoryViewer(){clearInterval(storyTimer);storyViewerData=null;storyIdx=0;document.getElementById('storyViewer')?.remove()}
function addStoryModal(){showModal('Add Story',[{t:'Cancel',cls:'bgc bsm',fn:()=>{}},{t:'Post',cls:'bp bsm',fn:async()=>{const f=document.getElementById('storyFileInp')?.files[0];if(!f){toast('Pick an image','er');return}if(f.size>5*1024*1024){toast('Max 5MB','er');return}closeModal();toast('Uploading...','in');const ext=f.name.split('.').pop(),path=me.id+'/'+Date.now()+'.'+ext;const{error}=await sb.storage.from('stories').upload(path,f);if(error){toast('Upload failed','er');return}const{data}=sb.storage.from('stories').getPublicUrl(path);await sb.from('stories').insert({user_id:me.id,image_url:data.publicUrl});toast('Story posted!','ok');loadStories()}}],true,'<div style="margin-bottom:14px"><label class="lbl">Photo</label><input type="file" accept="image/*" id="storyFileInp" class="inp" style="padding:8px"></div><p style="font-size:11px;color:var(--fg2)">Stories disappear after 24 hours.</p>')}

  await refreshFollowCache();
  loadStories();

  const{data:polls}=await sb.from('polls').select('*,poll_options(id,label,sort_order)').in('post_id',pids);

  const optIds=(polls||[]).flatMap(p=>(p.poll_options||[]).map(o=>o.id));
  let myVotes={};if(optIds.length&&me){const{data:vs}=await sb.from('poll_votes').select('poll_option_id').eq('user_id',me.id).in('poll_option_id',optIds);(vs||[]).forEach(v=>{myVotes[v.poll_option_id]=true})}
  const{data:allVotes}=await sb.from('poll_votes').select('poll_option_id').in('poll_option_id',optIds);
  const voteCounts={};(allVotes||[]).forEach(v=>{voteCounts[v.poll_option_id]=(voteCounts[v.poll_option_id]||0)+1});

}

// Follow/unfollow from feed button — updates cache AND DOM instantly
async function toggleFollowFeed(uid,btn){
  if(!me||uid===me.id)return;
  if(amFollowing(uid)){
    // Unfollow
    await sb.from('follows').delete().eq('follower_id',me.id).eq('following_id',uid);
    delete followCache[uid];
    btn.textContent='Follow';btn.className='fbtn nf';
    toast('Unfollowed','in');
  }else{
    // Follow
    const{error}=await sb.from('follows').insert({follower_id:me.id,following_id:uid});
    if(error){toast('Error','er');return}
    followCache[uid]=true;
    btn.textContent='Following';btn.className='fbtn fw';
    toast('Following!','ok');
  }
  // Update ALL follow buttons on page for this user
  document.querySelectorAll('.fbtn').forEach(b=>{
    if(b.closest('[onclick*="'+uid+'"]'))return; // skip if already handled
    if(b.getAttribute('data-fuid')===uid||b.onclick?.toString().includes(uid)){
      // already correct
    }
  });
}

async function viewUser(uid){
  if(me&&uid===me.id){viewingUid=null;view='profile';chatView=null;renderApp();return}
  chatView=null;view='profile';viewingUid=uid;
  // Render immediately so nav updates
  renderApp();
  const fp=document.getElementById('feedPane');
  fp.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner" style="width:28px;height:28px;border-width:3px"></span></div>';
  // Fetch profile + follow status + stats + posts
  const [profRes,follRes,pcRes,fcRes,gcRes,postsRes]=await Promise.all([
    sb.from('profiles').select('*').eq('id',uid).single(),
    me?sb.from('follows').select('follower_id').eq('follower_id',me.id).eq('following_id',uid).single():{data:null},
    sb.from('posts').select('*',{count:'exact',head:true}).eq('user_id',uid),
    sb.from('follows').select('*',{count:'exact',head:true}).eq('following_id',uid),
    sb.from('follows').select('*',{count:'exact',head:true}).eq('follower_id',uid),
    sb.from('posts').select('id,user_id,content,image_url,video_url,created_at,author:profiles!user_id(username,full_name,avatar_url)').eq('user_id',uid).order('created_at',{ascending:false}).limit(50)
  ]);
  const p=profRes.data;const isFoll=!!follRes.data;
  // Update cache
  if(isFoll)followCache[uid]=true;else delete followCache[uid];
  // Build posts with like/comment/poll data
  const posts=postsRes.data||[];
  const pids=posts.map(pp=>pp.id);let ul=[],lc={},cc={};
  if(pids.length&&me){const{data:lks}=await sb.from('likes').select('post_id').eq('user_id',me.id).in('post_id',pids);ul=lks||[];const{data:allL}=await sb.from('likes').select('post_id');(allL||[]).forEach(l=>{lc[l.post_id]=(lc[l.post_id]||0)+1})}
  if(pids.length){const{data:cs}=await sb.from('comments').select('post_id').in('post_id',pids);(cs||[]).forEach(c=>{cc[c.post_id]=(cc[c.post_id]||0)+1})}
  const{data:polls}=await sb.from('polls').select('*,poll_options(id,label,sort_order)').in('post_id',pids);
  const pollMap={};(polls||[]).forEach(pp=>{pollMap[pp.post_id]=pp});
  const optIds=(polls||[]).flatMap(pp=>(pp.poll_options||[]).map(o=>o.id));
  let myVotes={};if(optIds.length&&me){const{data:vs}=await sb.from('poll_votes').select('poll_option_id').eq('user_id',me.id).in('poll_option_id',optIds);(vs||[]).forEach(v=>{myVotes[v.poll_option_id]=true})}
  const{data:allVotes}=await sb.from('poll_votes').select('poll_option_id').in('poll_option_id',optIds);
  const voteCounts={};(allVotes||[]).forEach(v=>{voteCounts[v.poll_option_id]=(voteCounts[v.poll_option_id]||0)+1});
  const enrichedPosts=posts.map(pp=>({...pp,profile:pp.author,liked:ul.some(l=>l.post_id===pp.id),likeCount:lc[pp.id]||0,commentCount:cc[pp.id]||0,poll:pollMap[pp.id]||null,myVotes,voteCounts}));

  // Render the complete profile page
  fp.innerHTML='<div class="feed-center" id="profWrap">'
    +'<div class="prof-h"><div class="prof-banner"></div><div style="padding:0 24px 24px"><div style="display:flex;align-items:flex-end;gap:14px;margin-top:-36px"><img class="av av-xl" src="'+avUrl(p)+'" alt="" style="border:4px solid var(--card)" loading="lazy"><div style="flex:1"></div>'
    +'<button class="fbtn '+(isFoll?'fw':'nf')+'" id="followBtn-'+p.id+'" onclick="toggleFollow(\''+p.id+'\')">'+(isFoll?'Following':'Follow')+'</button>'
    +'</div><h2 style="font-size:18px;font-weight:800;margin-top:12px">'+esc(p.full_name||p.username)+'</h2><p class="hd" style="margin-top:2px">@'+esc(p.username)+'</p><p style="font-size:13px;color:var(--fg2);margin-top:8px;line-height:1.5">'+(esc(p.bio)||'No bio yet.')+'</p>'
    +'<div style="display:flex;gap:18px;margin-top:12px"><span style="font-size:12px"><strong>'+(pcRes.count||0)+'</strong> <span style="color:var(--fg2)">Posts</span></span><span style="font-size:12px"><strong>'+(fcRes.count||0)+'</strong> <span style="color:var(--fg2)">Followers</span></span><span style="font-size:12px"><strong>'+(gcRes.count||0)+'</strong> <span style="color:var(--fg2)">Following</span></span></div>'
    +'</div></div>'
    +'<div id="feedArea"></div></div>';
  renderPosts(enrichedPosts);
}

async function toggleFollow(uid){
  if(!me||me.id===uid)return;
  if(amFollowing(uid)){
    await sb.from('follows').delete().eq('follower_id',me.id).eq('following_id',uid);
    delete followCache[uid];
  }else{
    const{error}=await sb.from('follows').insert({follower_id:me.id,following_id:uid});
    if(error){toast('Error','er');return}
    followCache[uid]=true;
  }
  // Update the follow button
  const b=document.getElementById('followBtn-'+uid);
  if(b){const isF=amFollowing(uid);b.textContent=isF?'Following':'Follow';b.className='fbtn '+(isF?'fw':'nf')}
  // Also update feed buttons for this user
  document.querySelectorAll('.fbtn').forEach(fb=>{
    if(fb.textContent==='Following'||fb.textContent==='Follow'){
      // Check if this button is for the same user by looking at onclick
      const oc=fb.getAttribute('onclick')||'';
      if(oc.includes("'"+uid+"'")){
        const isF=amFollowing(uid);fb.textContent=isF?'Following':'Follow';fb.className='fbtn '+(isF?'fw':'nf');
      }
    }
  });
  if(viewingUid){
    // Refresh stats
    loadProfStats(uid);
  }
}

function toggleCam(){if(!localStream)return;const t=localStream.getVideoTracks()[0];if(t){t.enabled=!t.enabled;const b=document.getElementById('camBtn');b.className='call-btn '+(t.enabled?'on':'off');b.innerHTML=t.enabled?'<i class="fas fa-video"></i>':'<i class="fas fa-video-slash"></i>'}}
async function toggleScreenShare(){try{const s=await navigator.mediaDevices.getDisplayMedia({video:true});const lv=document.getElementById('callLocalVid');if(lv)lv.srcObject=s;s.getVideoTracks()[0].onended=()=>{if(localStream&&activeCall?.isVideo){const lv2=document.getElementById('callLocalVid');if(lv2)lv2.srcObject=localStream}};toast('Screen sharing','in')}catch(e){}}

async function endCall(){if(callTimerInt){clearInterval(callTimerInt);callTimerInt=null}const dur=callTimer;if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null}if(activeCall){const cid=activeCall.convId;const{data:msgs}=await sb.from('messages').select('id,content').eq('conversation_id',cid).eq('sender_id',me.id).order('created_at',{ascending:false}).limit(1);if(msgs?.length&&msgs[0].content.startsWith('[CALL]'))await sb.from('messages').update({content:'[CALL]|'+(activeCall.isVideo?'video':'voice')+'|'+dur}).eq('id',msgs[0].id)}activeCall=null;callTimer=0;document.getElementById('callOverlay')?.remove();playLeave();toast('Call ended'+(dur>0?' — '+fmtTime(dur):''),'ok');loadMessages()}

async function loadGroupChat(area,gid){const{data:grp}=await sb.from('groups').select('*').eq('id',gid).single();const{data:mems}=await sb.from('group_members').select('user_id,role,mem:profiles!user_id(username,full_name,avatar_url)').eq('group_id',gid);const isAdmin=mems?.some(m=>m.user_id===me.id&&m.role==='admin');area.innerHTML='<div class="chat-header"><button class="bi" onclick="chatView={type:\'group\'};renderGroupsFull()" aria-label="Back"><i class="fas fa-arrow-left"></i></button><div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,rgba(212,146,42,.2),rgba(154,112,208,.15));display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-users" style="font-size:13px;color:var(--acc)"></i></div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(grp?.name)+'</div><div class="hd" style="font-size:10px">'+(mems?.length||0)+' members</div></div><button class="bi" title="Voice call" onclick="startCall(\'group\',null,\''+gid+'\',null,false)"><i class="fas fa-phone"></i></button><button class="bi" title="Video call" onclick="startCall(\'group\',null,\''+gid+'\',null,true)"><i class="fas fa-video"></i></button><button class="bi" onclick="showGroupInfo(\''+gid+'\')" aria-label="Info"><i class="fas fa-circle-info"></i></button>'+(isAdmin?'<button class="bi" onclick="showAddMember(\''+gid+'\')" aria-label="Add member"><i class="fas fa-user-plus"></i></button>':'')+'</div><div class="chat-messages" id="chatMsgs"><div style="text-align:center;padding:40px"><span class="spinner"></span></div></div><div class="chat-input-bar"><input class="inp" id="chatInp" placeholder="Message the group..." onkeydown="if(event.key===\'Enter\')sendGroupMsg()" aria-label="Message"><button class="bp bsm" onclick="sendGroupMsg()" style="padding:8px 14px"><i class="fas fa-paper-plane"></i></button></div>';loadMessages();document.getElementById('chatInp')?.focus()}
async function sendGroupMsg(){if(!chatView||chatView.type!=='group')return;const inp=document.getElementById('chatInp');if(!inp||!inp.value.trim())return;await ensureGroupConv(chatView.groupId);await sb.from('messages').insert({conversation_id:chatView.groupId,sender_id:me.id,content:inp.value.trim()});inp.value='';playSend();loadMessages()}
async function showGroupInfo(gid){const{data:grp}=await sb.from('groups').select('*').eq('id',gid).single();const{data:mems}=await sb.from('group_members').select('user_id,role,mem:profiles!user_id(username,full_name,avatar_url)').eq('group_id',gid);const isAdmin=mems?.some(m=>m.user_id===me.id&&m.role==='admin'),isCreator=grp?.created_by===me.id;const ml=(mems||[]).map(m=>'<div class="grp-member"><img class="av av-s" src="'+avUrl(m.mem)+'" alt="" loading="lazy"><div style="flex:1;min-width:0"><span class="un" style="font-size:12px" onclick="closeModal();viewUser(\''+m.user_id+'\')">'+esc(m.mem?.full_name||m.mem?.username)+'</span><span class="hd" style="font-size:10px"> @'+esc(m.mem?.username)+'</span></div><span class="role '+(m.role==='admin'?'role-admin':'role-member')+'">'+m.role+'</span>'+(isAdmin&&m.user_id!==me.id?'<button class="bi" style="font-size:11px;color:var(--red)" onclick="removeFromGroup(\''+gid+'\',\''+m.user_id+'\')" aria-label="Remove"><i class="fas fa-xmark"></i></button>':'')+'</div>').join('');const btns=[{t:'Close',cls:'bgc bsm',fn:()=>{}}];if(isCreator)btns.push({t:'Delete Group',cls:'bp bsm',st:'background:var(--red);color:#fff',fn:async()=>{await sb.from('groups').delete().eq('id',gid);closeModal();chatView={type:'group'};renderGroupsFull();toast('Deleted','ok')}});else if(isAdmin)btns.push({t:'Leave',cls:'bgc bsm',st:'border-color:var(--red);color:var(--red)',fn:async()=>{await sb.from('group_members').delete().eq('group_id',gid).eq('user_id',me.id);closeModal();chatView={type:'group'};renderGroupsFull();toast('Left','ok')}});showModal(grp?.name||'Group',btns,true,'<p style="color:var(--fg2);font-size:12px;margin-bottom:12px">'+(esc(grp?.description)||'No description')+'</p><div style="max-height:240px;overflow-y:auto;border-top:1px solid var(--border);padding-top:8px">'+ml+'</div>')}
async function showAddMember(gid){showModal('Add Member',[{t:'Cancel',cls:'bgc bsm',fn:()=>{}},{t:'Add',cls:'bp bsm',fn:()=>{}}],true,'<div><label class="lbl" for="addMemInp">Username</label><input class="inp" id="addMemInp" placeholder="username"></div>');document.querySelector('[data-mi="1"]').onclick=async()=>{const un=document.getElementById('addMemInp')?.value.trim();if(!un){toast('Enter username','er');return}const{data:u}=await sb.from('profiles').select('*').ilike('username',un).limit(1);if(!u?.length){toast('Not found','er');return}if(u[0].id===me.id){toast('Already member','er');return}const{data:ex}=await sb.from('group_members').select('user_id').eq('group_id',gid).eq('user_id',u[0].id).single();if(ex){toast('Already in group','er');return}await sb.from('group_members').insert({group_id:gid,user_id:u[0].id,role:'member'});closeModal();toast(u[0].username+' added!','ok');const a=document.getElementById('grpChatArea');if(a)loadGroupChat(a,gid)}}

async function loadExplore(){await refreshFollowCache();const el=document.getElementById('feedArea');if(!el)return;el.innerHTML='<div style="margin-bottom:18px"><h2 style="font-size:20px;font-weight:800;margin-bottom:12px">Explore</h2><input class="inp" placeholder="Search users..." id="exploreInp" oninput="doExplore(this.value)" style="padding:12px 16px;font-size:14px" aria-label="Search"></div><div id="exploreResults"><div class="empty-s"><i class="fas fa-compass"></i><p style="font-weight:600">Discover People</p></div></div>';const{data:users}=await sb.from('profiles').select('*').neq('id',me.id).order('created_at',{ascending:false}).limit(8);if(users?.length)document.getElementById('exploreResults').innerHTML='<h3 style="font-size:14px;font-weight:600;color:var(--fg2);margin-bottom:12px">Suggested</h3>'+users.map(u=>{const isF=amFollowing(u.id);return '<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser(\''+u.id+'\')"><img class="av" src="'+avUrl(u)+'" alt="" loading="lazy"><div style="flex:1;min-width:0"><div class="un">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div>'+(u.bio?'<p style="font-size:11px;color:var(--fg2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(u.bio)+'</p>':'')+'</div><button class="fbtn '+(isF?'fw':'nf')+'" onclick="event.stopPropagation();toggleFollowExplore(\''+u.id+'\',this)">'+(isF?'Following':'Follow')+'</button></div>'}).join('')}

async function doExplore(q){if(!q.trim()){loadExplore();return}await refreshFollowCache();const{data:users}=await sb.from('profiles').select('*').or('username.ilike.%'+q+'%,full_name.ilike.%'+q+'%').neq('id',me.id).limit(20);const el=document.getElementById('exploreResults');if(!el)return;if(!users?.length){el.innerHTML='<div class="empty-s"><p>No users found</p></div>';return}el.innerHTML=users.map(u=>{const isF=amFollowing(u.id);return '<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser(\''+u.id+'\')"><img class="av" src="'+avUrl(u)+'" alt="" loading="lazy"><div style="flex:1;min-width:0"><div class="un">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div></div><button class="fbtn '+(isF?'fw':'nf')+'" onclick="event.stopPropagation();toggleFollowExplore(\''+u.id+'\',this)">'+(isF?'Following':'Follow')+'</button></div>'}).join('')}

// Follow from explore — updates cache + button + feed buttons
async function toggleFollowExplore(uid,btn){
  if(!me||uid===me.id)return;
  if(amFollowing(uid)){
    await sb.from('follows').delete().eq('follower_id',me.id).eq('following_id',uid);
    delete followCache[uid];
    toast('Unfollowed','in');
  }else{
    const{error}=await sb.from('follows').insert({follower_id:me.id,following_id:uid});
    if(error){toast('Error','er');return}
    followCache[uid]=true;
    toast('Following!','ok');
  }
  const isF=amFollowing(uid);
  btn.textContent=isF?'Following':'Follow';
  btn.className='fbtn '+(isF?'fw':'nf');
}

let pendingAvatarFile=null;
function previewAvatar(input){const f=input.files[0];if(!f)return;if(f.size>2*1024*1024){toast('Max 2MB','er');input.value='';return}pendingAvatarFile=f;document.getElementById('avatarPreview').src=URL.createObjectURL(f)}
async function saveSettings(){const btn=document.getElementById('saveBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';const fn=document.getElementById('setName').value.trim(),un=document.getElementById('setUser').value.trim().toLowerCase(),bio=document.getElementById('setBio').value.trim();let avu=myProf?.avatar_url||'';if(!un||!/^[a-zA-Z0-9_]+$/.test(un)){toast('Invalid username','er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';return}if(pendingAvatarFile){try{toast('Uploading avatar...','in');const ext=pendingAvatarFile.name.split('.').pop(),path=me.id+'/avatar.'+ext;try{if(myProf?.avatar_url)await sb.storage.from('avatars').remove([myProf.avatar_url.split('/').slice(-2).join('/')])}catch(e){}const{error:upErr}=await sb.storage.from('avatars').upload(path,pendingAvatarFile,{upsert:true});if(upErr){toast('Upload failed','er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';pendingAvatarFile=null;return}const{data}=sb.storage.from('avatars').getPublicUrl(path);avu=data.publicUrl+'?t='+Date.now()}catch(e){toast('Avatar error','er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';pendingAvatarFile=null;return}pendingAvatarFile=null}const{error}=await sb.from('profiles').update({full_name:fn,username:un,bio,avatar_url:avu}).eq('id',me.id);if(error){toast(error.message,'er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';return}myProf={...myProf,full_name:fn,username:un,bio,avatar_url:avu};toast('Profile saved!','ok');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';renderNav()}

function goFeed(){chatView=null;viewingUid=null;view='feed';dmOpen=true;renderApp()}
function goProfile(){chatView=null;viewingUid=null;view='profile';renderApp()}
function goExplore(){chatView=null;viewingUid=null;view='explore';dmOpen=true;renderApp()}
async function handleLogout(){if(activeCall)endCall();await sb.auth.signOut();me=null;myProf=null;chatView=null;view='feed';followCache={};renderAuth()}
async function renderDMChat(){if(!chatView||chatView.type!=='dm')return;const area=document.getElementById('chatArea');if(area)await loadDMChat(area,chatView.convId,chatView.peerId)}
async function renderGroupChat(){if(!chatView||chatView.type!=='group')return;const area=document.getElementById('chatArea');if(area){await ensureGroupConv(chatView.groupId);await loadGroupChat(area,chatView.groupId)}}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(activeCall)endCall();else if(storyViewerData)closeStoryViewer();else closeModal()}});
init();
</script>
</body>
</html>
