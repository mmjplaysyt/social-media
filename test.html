function playSound(f,f2,d){try{const c=new(window.AudioContext||window.webkitAudioContext)(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f2,t+d);g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+d+.1);o.start(t);o.stop(t+d+.1)}catch(e){}}
function startDiscordRing(){stopDiscordRing();callAudioCtx=new(window.AudioContext||window.webkitAudioContext)();let t=callAudioCtx.currentTime+.05;function loop(){if(!inCall)return;const o=callAudioCtx.createOscillator(),g=callAudioCtx.createGain();o.type='sine';o.connect(g);g.connect(callAudioCtx.destination);o.frequency.setValueAtTime(440,t);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.15,t+.01);g.gain.setValueAtTime(.15,t+.15);g.gain.linearRampToValueAtTime(0,t+.2);o.frequency.setValueAtTime(523.25,t+.6);g.gain.linearRampToValueAtTime(.15,t+.61);g.gain.setValueAtTime(.15,t+.75);g.gain.linearRampToValueAtTime(0,t+.8);o.start(t);o.stop(t+1.5);t+=2.0;setTimeout(loop,1800)}loop()}

</div><button class="bi" style="margin-left:auto;font-size:12px" onclick="event.stopPropagation();handleLogout()"><i class="fas fa-right-from-bracket"></i></button></div></div>'}

async function loadFeed(){const el=document.getElementById('feedArea');if(!el)return;el.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner" style="width:28px"></span></div>';try{const{data:posts}=await sb.from('posts').select('id,user_id,content,image_url,video_url,created_at').order('created_at',{ascending:false}).limit(50);if(!posts?.length){el.innerHTML='<div class="empty-s"><i class="fas fa-feather-pointed"></i><p>No posts yet</p></div>';return}const pids=posts.map(p=>p.id);const uids=[...new Set(posts.map(p=>p.user_id))];const[profs,likes,bks,allLks,cmts,pollsRes]=await Promise.all([sb.from('profiles').select('*').in('id',uids),me?sb.from('likes').select('post_id').eq('user_id',me.id).in('post_id',pids):Promise.resolve({data:[]}),me?sb.from('bookmarks').select('post_id').eq('user_id',me.id).in('post_id',pids):Promise.resolve({data:[]}),sb.from('likes').select('post_id').in('post_id',pids),sb.from('comments').select('post_id').in('post_id',pids),sb.from('polls').select('*').in('post_id',pids)]);const optsRes=pollsRes.data?.length?await sb.from('poll_options').select('*').in('poll_id',pollsRes.data.map(p=>p.id)):{data:[]};const votesRes=optsRes.data?.length?await sb.from('poll_votes').select('option_id,user_id').in('option_id',optsRes.data.map(o=>o.id)):{data:[]};let likeMap={},lc={},cc={},bkMap={},pollMap={};(likes.data||[]).forEach(l=>likeMap[l.post_id]=true);(bks.data||[]).forEach(b=>bkMap[b.post_id]=true);(allLks.data||[]).forEach(l=>{lc[l.post_id]=(lc[l.post_id]||0)+1});(cmts.data||[]).forEach(c=>{cc[c.post_id]=(cc[c.post_id]||0)+1});if(pollsRes.data?.length){pollsRes.data.forEach(poll=>{poll.options=(optsRes.data||[]).filter(o=>o.poll_id===poll.id).map(o=>({...o,voted:(votesRes.data||[]).some(v=>v.option_id===o.id&&v.user_id===me.id)}));poll.totalVotes=poll.options.reduce((a,o)=>a+o.votes,0);pollMap[poll.post_id]=poll})}
const profMap={};(profs.data||[]).forEach(p=>profMap[p.id]=p);renderPosts(posts.map(p=>({...p,profile:profMap[p.user_id]||{username:'user'},liked:!!likeMap[p.id],likeCount:lc[p.id]||0,commentCount:cc[p.id]||0,bookmarked:!!bkMap[p.id],poll:pollMap[p.id]})))}catch(e){console.error(e);el.innerHTML='<div class="empty-s"><i class="fas fa-exclamation-triangle"></i><p>Failed to load feed</p></div>'}}

async function loadUserPosts(uid,isOwn){const el=document.getElementById('feedArea');if(!el)return;el.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';try{const postsRes=await sb.from('posts').select('id,user_id,content,image_url,video_url,created_at').eq('user_id',uid).order('created_at',{ascending:false}).limit(50);const posts=postsRes.data;const pids=posts.map(p=>p.id);let likeMap={},lc={},cc={},bkMap={},pollMap={};if(me&&pids.length){const[likes,bks]=await Promise.all([sb.from('likes').select('post_id').eq('user_id',me.id).in('post_id',pids),sb.from('bookmarks').select('post_id').eq('user_id',me.id).in('post_id',pids)]);(likes.data||[]).forEach(l=>likeMap[l.post_id]=true);(bks.data||[]).forEach(b=>bkMap[b.post_id]=true)}let allLks={data:[]},cmts={data:[]},pollsRes={data:[]};if(pids.length){[allLks,cmts,pollsRes]=await Promise.all([sb.from('likes').select('post_id').in('post_id',pids),sb.from('comments').select('post_id').in('post_id',pids),sb.from('polls').select('*').in('post_id',pids)])}(allLks.data||[]).forEach(l=>{lc[l.post_id]=(lc[l.post_id]||0)+1});(cmts.data||[]).forEach(c=>{cc[c.post_id]=(cc[c.post_id]||0)+1});if(pollsRes.data?.length){const optsRes=await sb.from('poll_options').select('*').in('poll_id',pollsRes.data.map(p=>p.id));const votesRes=optsRes.data?.length?await sb.from('poll_votes').select('option_id,user_id').in('option_id',optsRes.data.map(o=>o.id)):{data:[]};pollsRes.data.forEach(poll=>{poll.options=(optsRes.data||[]).filter(o=>o.poll_id===poll.id).map(o=>({...o,voted:(votesRes.data||[]).some(v=>v.option_id===o.id&&v.user_id===me.id)}));poll.totalVotes=poll.options.reduce((a,o)=>a+o.votes,0);pollMap[poll.post_id]=poll})}const profsRes=await sb.from('profiles').select('*').eq('id',uid);const profMap={};(profsRes.data||[]).forEach(p=>profMap[p.id]=p);renderPosts(posts.map(p=>({...p,profile:profMap[p.user_id]||{username:'user'},liked:!!likeMap[p.id],likeCount:lc[p.id]||0,commentCount:cc[p.id]||0,bookmarked:!!bkMap[p.id],poll:pollMap[p.id]})));if(isOwn)loadProfStats(uid)}catch(e){console.error(e)}}

function renderPosts(posts){const el=document.getElementById('feedArea');if(!el||!posts.length){if(el)el.innerHTML='<div class="empty-s"><p>No posts yet</p></div>';return}el.innerHTML=posts.map(p=>{let pollHtml='',mediaHtml='';if(p.poll){const poll=p.poll;pollHtml='<div class="poll-box"><p style="font-weight:600;margin-bottom:8px;font-size:13px">'+esc(poll.question)+'</p>'+(poll.options||[]).map(o=>{const pct=poll.totalVotes?Math.round(o.votes/poll.totalVotes*100):0;return '<div class="poll-opt" onclick="votePoll(\''+o.id+'\',\''+poll.id+'\')"><div class="poll-fill" style="width:'+(o.voted?pct:0)+'%;background:'+(o.voted?'var(--acc)':'var(--acc-s)')+'"></div><div class="poll-txt"><span>'+esc(o.text)+(o.voted?' <i class="fas fa-check" style="color:var(--acc);font-size:10px"></i>':'')+'</span><span style="color:var(--fg2);font-size:11px">'+pct+'%</span></div></div>'}).join('')+'<p style="font-size:11px;color:var(--fg2);margin-top:6px">'+poll.totalVotes+' votes</p></div>'}if(p.image_url)mediaHtml+='<img class="post-img" src="'+p.image_url+'" alt="" onclick="lightbox(\''+p.image_url+'\')" loading="lazy" onerror="this.style.display=\'none\'">';if(p.video_url)mediaHtml+='<video class="post-vid" src="'+p.video_url+'" controls preload="metadata" onerror="this.style.display=\'none\'"></video>';return '<article class="post"><div style="display:flex;gap:10px"><div style="position:relative"><img class="av" src="'+avUrl(p.profile)+'" alt="" onclick="viewUser(\''+p.user_id+'\')" style="cursor:pointer"><div class="av-status status-'+(p.profile?.status==='invisible'?'offline':p.profile?.status||'offline')+'"></div></div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span class="un" onclick="viewUser(\''+p.user_id+'\')">'+esc(p.profile?.full_name||p.profile?.username)+'</span><span class="hd">@'+esc(p.profile?.username)+'</span><span class="ts"> · '+timeAgo(p.created_at)+'</span>'+(me&&me.id===p.user_id?'<button class="bi" style="margin-left:auto;font-size:12px" onclick="delPost(\''+p.id+'\')"><i class="fas fa-trash-can"></i></button>':'')+'</div><div class="pb">'+esc(p.content)+'</div>'+mediaHtml+pollHtml+'<div class="pa"><button class="ab '+(p.liked?'lk':'')+'" onclick="toggleLike(\''+p.id+'\',this)"><i class="fas fa-heart"></i> <span>'+(p.likeCount||'')+'</span></button><button class="ab" onclick="toggleCmt(\''+p.id+'\')"><i class="fas fa-comment"></i> <span>'+(p.commentCount||'')+'</span></button><button class="ab '+(p.bookmarked?'lk':'')+'" onclick="toggleBookmark(\''+p.id+'\',this)"><i class="fas fa-bookmark"></i></button><button class="ab" onclick="sharePost(\''+p.id+'\')"><i class="fas fa-share-from-square"></i></button></div><div class="cmt-sec" id="cmt-'+p.id+'" style="display:none"></div></div></div></article>'}).join('')}

async function toggleLike(pid,btn){if(!me)return;const{data:ex}=await sb.from('likes').select('user_id').eq('user_id',me.id).eq('post_id',pid).single();const s=btn.querySelector('span');if(ex){await sb.from('likes').delete().eq('user_id',me.id).eq('post_id',pid);btn.classList.remove('lk');s.textContent=parseInt(s.textContent||'1')-1||''}else{await sb.from('likes').insert({user_id:me.id,post_id:pid});btn.classList.add('lk');s.textContent=parseInt(s.textContent||'0')+1}}
async function votePoll(oid,pid){if(!me)return;const{data:ex}=await sb.from('poll_votes').select('option_id,poll_options(poll_id)').eq('user_id',me.id).eq('option_id',oid).single();if(ex)await sb.from('poll_votes').delete().eq('user_id',me.id).eq('option_id',oid);else{const{data:myVotes}=await sb.from('poll_votes').select('option_id,poll_options(poll_id)').eq('user_id',me.id);const samePoll=myVotes?.length?myVotes.filter(v=>v.poll_options?.poll_id===pid):[];if(samePoll.length)await sb.from('poll_votes').delete().in('option_id',samePoll.map(v=>v.option_id));await sb.from('poll_votes').insert({user_id:me.id,option_id:oid})}if(view==='feed')loadFeed();else loadUserPosts(viewingUid||me.id)}
async function toggleBookmark(pid,btn){if(!me)return;const{data:ex}=await sb.from('bookmarks').select('post_id').eq('user_id',me.id).eq('post_id',pid).single();if(ex){await sb.from('bookmarks').delete().eq('user_id',me.id).eq('post_id',pid);btn.classList.remove('lk');toast('Unsaved','in')}else{await sb.from('bookmarks').insert({user_id:me.id,post_id:pid});btn.classList.add('lk');toast('Saved!','ok')}}
async function viewBookmarks(){chatView=null;view='bookmarks';renderApp();const{data:bks}=await sb.from('bookmarks').select('post_id').eq('user_id',me.id);if(!bks?.length){document.getElementById('feedArea').innerHTML='<div class="empty-s"><i class="fas fa-bookmark"></i><p>No saved posts yet</p></div>';return}const pids=bks.map(b=>b.post_id);const postsRes=await sb.from('posts').select('id,user_id,content,image_url,video_url,created_at').in('id',pids).order('created_at',{ascending:false});const posts=postsRes.data;const uids=[...new Set(posts.map(p=>p.user_id))];const profsRes=await sb.from('profiles').select('*').in('id',uids);const profMap={};(profsRes.data||[]).forEach(p=>profMap[p.id]=p);renderPosts(posts.map(p=>({...p,profile:profMap[p.user_id]||{username:'user'},bookmarked:true})))}
async function createPost(){const ta=document.getElementById('compT'),content=ta?.value.trim();if(!content&&!showPollUI){toast('Write something','er');return}const btn=document.getElementById('compBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';try{let iu='',vu='';if(imgFile){const path=me.id+'/'+Date.now()+'.'+imgFile.name.split('.').pop();if(!(await sb.storage.from('post-images').upload(path,imgFile)).error)iu=sb.storage.from('post-images').getPublicUrl(path).data.publicUrl}if(vidFile){toast('Uploading video...','in');const path=me.id+'/'+Date.now()+'.'+vidFile.name.split('.').pop();if(!(await sb.storage.from('post-videos').upload(path,vidFile)).error)vu=sb.storage.from('post-videos').getPublicUrl(path).data.publicUrl}const{data:post}=await sb.from('posts').insert({user_id:me.id,content,image_url:iu,video_url:vu}).select().single();if(showPollUI){const q=document.getElementById('pollQ')?.value.trim();const opts=[...document.getElementById('pollOpts').children].map(i=>i.value.trim()).filter(Boolean);if(q&&opts.length>=2){const{data:poll}=await sb.from('polls').insert({post_id:post.id,question:q}).select().single();await sb.from('poll_options').insert(opts.map(t=>({poll_id:poll.id,text:t})))}}ta.value='';imgFile=null;vidFile=null;showPollUI=false;btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Post';document.getElementById('mediaPrev').innerHTML='';document.getElementById('pollPreview').innerHTML='';toast('Posted!','ok');playSound(880,520,.08);loadFeed()}catch(e){toast('Failed: '+e.message,'er');btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Post'}}
async function toggleCmt(pid){const sec=document.getElementById('cmt-'+pid);if(!sec)return;if(sec.style.display==='none'){sec.style.display='block';sec.innerHTML='<div style="padding:8px;text-align:center"><span class="spinner"></span></div>';const{data:cmts}=await sb.from('comments').select('*,sender:profiles!user_id(username,full_name,avatar_url)').eq('post_id',pid).order('created_at',{ascending:true});sec.innerHTML=cmts.map(c=>'<div class="cmt-i"><img class="av av-s" src="'+avUrl(c.sender)+'" alt=""><div style="flex:1"><span class="un" style="font-size:12px">'+esc(c.sender?.full_name||c.sender?.username)+'</span> <span class="hd" style="font-size:10px">'+timeAgo(c.created_at)+'</span><p style="font-size:12px;margin-top:1px">'+esc(c.content)+'</p></div>'+(me&&me.id===c.user_id?'<button class="bi" style="font-size:10px" onclick="delCmt(\''+c.id+'\',\''+pid+'\')"><i class="fas fa-xmark"></i></button>':'')+'</div>').join('')+'<div class="cmt-row"><input id="ci-'+pid+'" placeholder="Reply..." onkeydown="if(event.key===\'Enter\')addCmt(\''+pid+'\')"><button class="bp bsm" onclick="addCmt(\''+pid+'\')" style="padding:7px 12px"><i class="fas fa-paper-plane"></i></button></div>'}else sec.style.display='none'}
async function addCmt(pid){const inp=document.getElementById('ci-'+pid);if(!inp||!inp.value.trim())return;await sb.from('comments').insert({user_id:me.id,post_id:pid,content:inp.value.trim()});inp.value='';toggleCmt(pid);setTimeout(()=>toggleCmt(pid),50)}
async function delCmt(cid,pid){await sb.from('comments').delete().eq('id',cid);toggleCmt(pid);setTimeout(()=>toggleCmt(pid),50)}
async function delPost(pid){showModal('Delete Post','',[{t:'Cancel',cls:'bgc bsm',fn:()=>{}},{t:'Delete',cls:'bp bsm',st:'background:var(--red);color:#fff',fn:async()=>{await sb.from('posts').delete().eq('id',pid);toast('Deleted','ok');if(view==='feed')loadFeed();else loadUserPosts(viewingUid||me.id)}}],true,'<p style="color:var(--fg2);font-size:13px">This cannot be undone.</p>')}
function sharePost(pid){navigator.clipboard.writeText(location.origin+'#post-'+pid).then(()=>toast('Link copied','ok')).catch(()=>{})}
function lightbox(src){const el=document.createElement('div');el.className='img-lb';el.onclick=()=>el.remove();el.innerHTML='<img src="'+src+'" alt="">';document.body.appendChild(el)}

function renderProfHeader(p,isOwn){return '<div class="prof-h"><div class="prof-banner"></div><div style="padding:0 24px 24px"><div style="display:flex;align-items:flex-end;gap:14px;margin-top:-36px"><div style="position:relative"><img class="av av-xl" src="'+avUrl(p)+'" alt="" style="border:4px solid var(--card)"><div class="av-status status-'+(p.status==='invisible'?'offline':p.status||'offline')+'" style="bottom:4px;right:4px;width:16px;height:16px"></div></div><div style="flex:1"></div>'+(isOwn?'<button class="bgc bsm" onclick="goSettings()"><i class="fas fa-pen"></i> Edit</button>':'<button class="fbtn nf" id="followBtn-'+p.id+'" onclick="toggleFollow(\''+p.id+'\')">Follow</button>')+'</div><h2 style="font-size:18px;font-weight:800;margin-top:12px">'+esc(p.full_name||p.username)+'</h2><p class="hd" style="margin-top:2px">@'+esc(p.username)+'</p><p style="font-size:13px;color:var(--fg2);margin-top:8px;line-height:1.5">'+(esc(p.bio)||'No bio yet.')+'</p><div style="display:flex;gap:18px;margin-top:12px"><span id="pc0"><strong>0</strong> <span style="color:var(--fg2)">Posts</span></span><span id="pc1"><strong>0</strong> <span style="color:var(--fg2)">Followers</span></span><span id="pc2"><strong>0</strong> <span style="color:var(--fg2)">Following</span></span></div></div></div>'}
async function loadProfStats(uid){const[pc,fc,gc]=await Promise.all([sb.from('posts').select('*',{count:'exact',head:true}).eq('user_id',uid),sb.from('follows').select('*',{count:'exact',head:true}).eq('following_id',uid),sb.from('follows').select('*',{count:'exact',head:true}).eq('follower_id',uid)]);const e0=document.getElementById('pc0'),e1=document.getElementById('pc1'),e2=document.getElementById('pc2');if(e0)e0.innerHTML='<strong>'+pc.count+'</strong> <span style="color:var(--fg2)">Posts</span>';if(e1)e1.innerHTML='<strong>'+fc.count+'</strong> <span style="color:var(--fg2)">Followers</span>';if(e2)e2.innerHTML='<strong>'+gc.count+'</strong> <span style="color:var(--fg2)">Following</span>'}
async function viewUser(uid){if(me&&uid===me.id){viewingUid=null;view='profile';chatView=null;renderApp();return}chatView=null;view='profile';viewingUid=uid;renderApp();const fp=document.getElementById('feedPane');fp.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner" style="width:28px"></span></div>';const p=await getProf(uid);fp.innerHTML='<div class="feed-center" id="profWrap">'+renderProfHeader(p,false)+'<div id="feedArea"></div></div>';if(me){const{data:ex}=await sb.from('follows').select('follower_id').eq('follower_id',me.id).eq('following_id',uid).single();const b=document.getElementById('followBtn-'+uid);if(b){b.textContent=ex?'Following':'Follow';b.className=ex?'fbtn fw':'fbtn nf'}}loadUserPosts(uid,false)}
async function viewOtherProfile(uid){viewUser(uid)}
async function toggleFollow(uid){if(!me||me.id===uid)return;const b=document.getElementById('followBtn-'+uid);if(!b)return;const{error}=await sb.from('follows').insert({follower_id:me.id,following_id:uid});if(!error){b.textContent='Following';b.className='fbtn fw';toast('Following!','ok')}else{await sb.from('follows').delete().eq('follower_id',me.id).eq('following_id',uid);b.textContent='Follow';b.className='fbtn nf';toast('Unfollowed','in')}if(viewingUid)loadProfStats(viewingUid)}

// CHATS & MESSAGING
function renderDMPanel(){return '<div style="padding:14px 14px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)"><h3 style="font-size:15px;font-weight:700">Messages</h3><div style="display:flex;gap:4px"><button class="bi" onclick="goDMs()"><i class="fas fa-expand"></i></button><button class="bi" onclick="closeDMPanel()"><i class="fas fa-xmark"></i></button></div></div><div style="padding:8px 10px"><input class="inp" style="font-size:12px;padding:8px 12px" placeholder="Search users..." id="dmSearch" oninput="searchDMUsers(this.value)"></div><div class="dm-list" id="dmList"></div>'}
function closeDMPanel(){dmOpen=false;chatView=null;renderApp()}
async function goDMs(){chatView={type:'dm'};view='feed';renderApp();renderDMFull()}
function renderDMFull(){document.getElementById('mainArea').innerHTML='<div style="display:flex;width:100%;height:100%"><div style="width:300px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0"><div style="padding:14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)"><button class="bi" onclick="chatView=null;renderApp()"><i class="fas fa-arrow-left"></i></button><h3 style="font-size:15px;font-weight:700">Messages</h3><button class="bi" style="margin-left:auto" onclick="newDMModal()"><i class="fas fa-pen-to-square"></i></button></div><div style="padding:8px 10px"><input class="inp" style="font-size:12px;padding:8px 12px" placeholder="Search..." id="dmFullSearch" oninput="searchDMUsers(this.value)"></div><div class="dm-list" id="dmListFull"></div></div><div id="dmChatArea" style="flex:1;display:flex;flex-direction:column;background:var(--bg)"><div class="empty-s" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center"><i class="fas fa-comment-dots"></i><p style="font-weight:600;margin-bottom:4px">Your Messages</p></div></div></div></div>';loadDMList()}
async function loadDMList(){const{data:parts}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',me.id);if(!parts?.length){const el=document.getElementById('dmListFull')||document.getElementById('dmList');if(el)el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px">No conversations</p></div>';return}const cids=parts.map(p=>p.conversation_id);const[otherParts,msgs]=await Promise.all([sb.from('conversation_participants').select('conversation_id,user_id,peer:profiles!user_id(username,full_name,avatar_url,status)').in('conversation_id',cids).neq('user_id',me.id),sb.from('messages').select('*').in('conversation_id',cids).order('created_at',{ascending:false})]);const lastMsg={};(msgs.data||[]).forEach(m=>{if(!lastMsg[m.conversation_id])lastMsg[m.conversation_id]=m});const convMap={};(otherParts.data||[]).forEach(p=>{convMap[p.conversation_id]=p});const list=parts.map(p=>{const o=convMap[p.conversation_id],l=lastMsg[p.conversation_id];if(!o)return null;return{cid:p.conversation_id,peer:o,last:l}}).filter(Boolean).sort((a,b)=>new Date(b.last?.created_at||0)-new Date(a.last?.created_at||0));const el=document.getElementById('dmListFull')||document.getElementById('dmList');if(!el)return;el.innerHTML=list.map(c=>'<div class="dm-item '+(chatView?.convId===c.cid?'on':'')+'" onclick="openDM(\''+c.cid+'\',\''+c.peer.user_id+'\')"><div style="position:relative"><img class="av av-s" src="'+avUrl(c.peer.peer)+'" alt=""><div class="av-status status-'+(c.peer.peer?.status==='invisible'?'offline':c.peer.peer?.status||'offline')+'" style="width:10px;height:10px;bottom:-2px;right:-2px;border-width:2px"></div></div><div style="min-width:0;flex:1"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(c.peer.peer?.full_name||c.peer.peer?.username)+'</div><div class="hd" style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(c.last?esc(c.last.content):'No messages')+'</div></div>'+(c.last?'<span class="ts">'+timeAgo(c.last.created_at)+'</span>':'')+'</div>').join('')}
function searchDMUsers(q){if(!q.trim())return loadDMList();const sq=sanitizeSearch(q);sb.from('profiles').select('*').or('username.ilike.%'+sq+'%,full_name.ilike.%'+sq+'%').neq('id',me.id).limit(10).then(({data})=>{const el=document.getElementById('dmListFull')||document.getElementById('dmList');if(!el||!data?.length){if(el)el.innerHTML='<div style="padding:12px;color:var(--fg2);font-size:12px;text-align:center">No users found</div>';return}el.innerHTML=data.map(u=>'<div class="dm-item" onclick="startDMWith(\''+u.id+'\')"><img class="av av-s" src="'+avUrl(u)+'" alt=""><div><div><div style="font-weight:600;font-size:13px">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div></div></div>').join('')})}
async function newDMModal(){showModal('New Message',[{t:'Cancel',cls:'bgc bsm',fn:()=>{}}],true,'<div><label class="lbl">Username</label><input class="inp" id="newDmInp" placeholder="username"></div>');document.querySelector('[data-mi="0"]').onclick=async()=>{const v=document.getElementById('newDmInp')?.value.trim();if(!v)return;closeModal();const{data:u}=await sb.from('profiles').select('*').ilike('username',v).neq('id',me.id).limit(1);if(!u?.length){toast('User not found','er');return}startDMWith(u[0].id)}}
async function startDMWith(uid){if(uid===me.id)return;const[mc,tc]=await Promise.all([sb.from('conversation_participants').select('conversation_id').eq('user_id',me.id),sb.from('conversation_participants').select('conversation_id').eq('user_id',uid)]);const mids=(mc.data||[]).map(c=>c.conversation_id),tids=(tc.data||[]).map(c=>c.conversation_id);const ex=mids.find(c=>tids.includes(c));if(ex){openDM(ex,uid);return}const{data:conv}=await sb.from('conversations').insert({}).select().single();await sb.from('conversation_participants').insert([{conversation_id:conv.id,user_id:me.id},{conversation_id:conv.id,user_id:uid}]);openDM(conv.id,uid);toast('Conversation started','ok')}
async function openDM(cid,peerId){chatView={type:'dm',convId:cid,peerId};unreadDMs=0;updateNavBadges();const area=document.getElementById('dmChatArea');if(area){area.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';loadDMChat(area,cid,peerId)}else{renderDMFull();setTimeout(()=>{const a=document.getElementById('dmChatArea');if(a)loadDMChat(a,cid,peerId)},50)}loadDMList()}
async function loadDMChat(area,cid,peerId){const peer=await getProf(peerId);area.innerHTML='<div class="chat-header"><button class="bi" onclick="chatView={type:\'dm\'};renderDMFull()"><i class="fas fa-arrow-left"></i></button><div style="position:relative"><img class="av" src="'+avUrl(peer)+'" alt=""><div class="av-status status-'+(peer.status==='invisible'?'offline':peer.status||'offline')+'"></div></div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px">'+esc(peer.full_name||peer.username)+'</div><div class="hd" style="font-size:10px">@'+esc(peer.username)+'</div></div><button class="bi" onclick="startCall(false)"><i class="fas fa-phone"></i></button><button class="bi" onclick="startCall(true)"><i class="fas fa-video"></i></button></div><div class="chat-messages" id="chatMsgs"></div><div class="chat-input-bar"><input class="inp" id="chatInp" placeholder="Type a message..." onkeydown="if(event.key===\'Enter\')sendMsg()"><button class="bp bsm" onclick="sendMsg()" style="padding:8px 14px"><i class="fas fa-paper-plane"></i></button></div>';loadMessages();document.getElementById('chatInp')?.focus()}
async function sendMsg(){if(!chatView)return;const inp=document.getElementById('chatInp');if(!inp||!inp.value.trim())return;const cid=chatView.type==='dm'?chatView.convId:chatView.groupId;const text=inp.value.trim();inp.value='';try{await sb.from('messages').insert({conversation_id:cid,sender_id:me.id,content:text});playSound(880,520,.08);loadMessages()}catch(e){toast('Send failed','er');inp.value=text}}
function startCall(isVideo=false){if(inCall)return;inCall=true;startDiscordRing();const area=document.getElementById('chatArea');const el=document.createElement('div');el.className='call-ui';el.id='callUI';el.innerHTML='<img src="'+defAv('U')+'" style="width:100px;height:100px;border-radius:50%;border:4px solid rgba(255,255,255,.2)"><p style="font-size:18px;font-weight:700;margin-top:90px;color:#fff">Calling...</p><div class="call-actions"><button class="call-btn call-mute"><i class="fas fa-microphone"></i></button>'+(isVideo?'<button class="call-btn call-mute"><i class="fas fa-video"></i></button>':'')+'<button class="call-btn call-end" onclick="endCall()"><i class="fas fa-phone-slash"></i></button></div>';area.appendChild(el)}
function endCall(){stopDiscordRing();document.getElementById('callUI')?.remove();inCall=false;toast('Call ended','in')}
async function loadMessages(){if(!chatView)return;const cid=chatView.type==='dm'?chatView.convId:chatView.groupId;const{data:msgs}=await sb.from('messages').select('*,sender:profiles!sender_id(username,full_name,avatar_url),message_reactions(emoji,user_id)').eq('conversation_id',cid).order('created_at',{ascending:true}).limit(100);const el=document.getElementById('chatMsgs');if(!el)return;if(!msgs?.length){el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px">Say hello!</p></div>';return}let html='',lastDate='';msgs.forEach(m=>{const d=new Date(m.created_at).toLocaleDateString();if(d!==lastDate){lastDate=d;html+='<div class="msg-date-divider"><span>'+(d===new Date().toLocaleDateString()?'Today':d)+'</span></div>'}const isMe=m.sender_id===me.id;const reactions={};(m.message_reactions||[]).forEach(r=>{if(!reactions[r.emoji])reactions[r.emoji]={count:0,active:false};reactions[r.emoji].count++;if(r.user_id===me.id)reactions[r.emoji].active=true});const reactHtml=Object.keys(reactions).length?'<div class="msg-reactions">'+Object.entries(reactions).map(([e,d])=>'<span class="reaction-pill '+(d.active?'active':'')+'" onclick="toggleReaction(\''+m.id+'\',\''+e+'\')">'+e+' '+d.count+'</span>').join('')+'</div>':'';html+='<div class="msg-wrap '+(isMe?'self':'')+'"><div class="msg-bubble '+(isMe?'msg-self':'msg-other')+'><div class="msg-actions"><button class="msg-act" onclick="showReactMenu(event,\''+m.id+'\')"><i class="fas fa-face-smile"></i></button>'+(chatView.type==='group'?'<button class="msg-act" onclick="pinMsg(\''+m.id+'\')"><i class="fas fa-thumbtack"></i></button>':'')+'</div><div style="font-size:11px;font-weight:600;color:var(--acc);margin-bottom:2px">'+(isMe?'You':esc(m.sender?.username||'user'))+'</div><div>'+esc(m.content)+'</div><div class="msg-meta">'+timeAgo(m.created_at)+(m.is_pinned?' <i class="fas fa-thumbtack" style="font-size:9px;color:var(--acc)"></i>':'')+'</div>'+reactHtml+'</div></div></div>'});el.innerHTML=html;el.scrollTop=el.scrollHeight}
async function toggleReaction(mid,emoji){const{data:ex}=await sb.from('message_reactions').select('user_id').eq('message_id',mid).eq('user_id',me.id).eq('emoji',emoji).single();if(ex)await sb.from('message_reactions').delete().eq('message_id',mid).eq('user_id',me.id).eq('emoji',emoji);else await sb.from('message_reactions').insert({message_id:mid,user_id:me.id,emoji});loadMessages()}
function showReactMenu(e,mid){e.stopPropagation();document.getElementById('reactMenu')?.remove();const menu=document.createElement('div');menu.id='reactMenu';menu.style.cssText='position:fixed;z-index:250;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px;display:flex;gap:4px;box-shadow:0 8px 24px rgba(0,0,0,.6);left:'+e.clientX+'px;top:'+e.clientY+'px';['👍','❤️','😂','🔥','👀','😮'].forEach(em=>{const b=document.createElement('button');b.style.cssText='background:none;border:none;font-size:20px;cursor:pointer;padding:4px;border-radius:6px';b.textContent=em;b.onmouseover=()=>b.style.background='var(--acc-s)';b.onmouseout=()=>b.style.background='none';b.onclick=()=>{toggleReaction(mid,em);menu.remove()};menu.appendChild(b)});document.body.appendChild(menu);setTimeout(()=>document.addEventListener('click',function rm(){menu.remove();document.removeEventListener('click',rm)}),10)}
async function pinMsg(mid){const{data:m}=await sb.from('messages').select('is_pinned').eq('id',mid).single();await sb.from('messages').update({is_pinned:!m.is_pinned}).eq('id',mid);loadMessages()}
async function goGroups(){chatView={type:'group'};view='feed';renderApp();renderGroupsFull()}
function renderGroupsFull(){document.getElementById('mainArea').innerHTML='<div style="display:flex;width:100%;height:100%"><div style="width:300px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0"><div style="padding:14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)"><button class="bi" onclick="chatView=null;renderApp()"><i class="fas fa-arrow-left"></i></button><h3 style="font-size:15px;font-weight:700">Groups</h3><button class="bi" style="margin-left:auto" onclick="createGroupModal()"><i class="fas fa-plus"></i></button></div><div class="dm-list" id="grpList"></div></div><div id="grpChatArea" style="flex:1;display:flex;flex-direction:column;background:var(--bg)"><div class="empty-s" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center"><i class="fas fa-users"></i></div></div></div></div>';loadGroupList()}
async function loadGroupList(){const{data:mems}=await sb.from('group_members').select('group_id,role,groups(id,name,description,created_at)').eq('user_id',me.id);const el=document.getElementById('grpList');if(!el)return;el.innerHTML=(mems.data||[]).sort((a,b)=>new Date(b.groups?.created_at||0)-new Date(a.groups?.created_at||0)).map(m=>'<div class="dm-item '+(chatView?.groupId===m.group_id?'on':'')+'" onclick="openGroup(\''+m.group_id+'\')"><div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,rgba(232,160,53,.2),rgba(167,123,223,.2));display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-users" style="font-size:13px;color:var(--acc)"></i></div><div style="min-width:0;flex:1"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(m.groups?.name)+'</div><div class="hd" style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(esc(m.groups?.description)||'No description')+'</div></div>'+(m.role==='admin'?'<span class="role-admin" style="font-size:9px">Admin</span>':'')+'</div>').join('')||'<div class="empty-s" style="padding:20px"><p style="font-size:12px">No groups</p></div>'}
async function createGroupModal(){showModal('Create Group',[{t:'Cancel',cls:'bgc bsm',fn:()=>{}},{t:'Create',cls:'bp bsm',fn:()=>{}}],true,'<div style="margin-bottom:14px"><label class="lbl">Group Name</label><input class="inp" id="newGrpName" maxlength="40"></div><div><label class="lbl">Description</label><input class="inp" id="newGrpDesc" maxlength="100"></div>');document.querySelector('[data-mi="1"]').onclick=async()=>{const n=document.getElementById('newGrpName')?.value.trim();if(!n){toast('Name required','er');return}const d=document.getElementById('newGrpDesc')?.value.trim()||'';const{data:g}=await sb.from('groups').insert({name:n,description:d,created_by:me.id}).select().single();await sb.from('group_members').insert({group_id:g.id,user_id:me.id,role:'admin'});await sb.from('conversations').upsert({id:g.id},{onConflict:'id'});closeModal();toast('Group created!','ok');loadGroupList();openGroup(g.id)}}
async function openGroup(gid){chatView={type:'group',groupId:gid};unreadGroups=0;updateNavBadges();await sb.from('conversations').upsert({id:gid},{onConflict:'id'});const area=document.getElementById('grpChatArea');if(area){area.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';loadGroupChat(area,gid)}else{renderGroupsFull();setTimeout(()=>{const a=document.getElementById('grpChatArea');if(a)loadGroupChat(a,gid)},50)}loadGroupList()}
async function loadGroupChat(area,gid){const[grp,mems]=await Promise.all([sb.from('groups').select('*').eq('id',gid).single(),sb.from('group_members').select('user_id,role,mem:profiles!user_id(username,full_name,avatar_url)').eq('group_id',gid)]);const isAdmin=mems.data?.some(m=>m.user_id===me.id&&m.role==='admin');area.innerHTML='<div class="chat-header"><button class="bi" onclick="chatView={type:\'group\'};renderGroupsFull()"><i class="fas fa-arrow-left"></i></button><div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,rgba(232,160,53,.2),rgba(167,123,223,.2));display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-users" style="font-size:13px;color:var(--acc)"></i></div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(grp.data?.name)+'</div><div class="hd" style="font-size:10px">'+(mems.data?.length||0)+' members</div></div><button class="bi" onclick="startCall(false)"><i class="fas fa-phone"></i></button><button class="bi" onclick="showGroupInfo(\''+gid+'\')"><i class="fas fa-circle-info"></i></button>'+(isAdmin?'<button class="bi" onclick="showAddMember(\''+gid+'\')"><i class="fas fa-user-plus"></i></button>':'')+'</div><div class="chat-messages" id="chatMsgs"></div><div class="chat-input-bar"><input class="inp" id="chatInp" placeholder="Message..." onkeydown="if(event.key===\'Enter\')sendMsg()"><button class="bp bsm" onclick="sendMsg()" style="padding:8px 14px"><i class="fas fa-paper-plane"></i></button></div>';loadMessages();document.getElementById('chatInp')?.focus()}
async function showGroupInfo(gid){const[grp,mems]=await Promise.all([sb.from('groups').select('*').eq('id',gid).single(),sb.from('group_members').select('user_id,role,mem:profiles!user_id(username,full_name,avatar_url)').eq('group_id',gid)]);const isAdmin=mems.data?.some(m=>m.user_id===me.id&&m.role==='admin'),isCreator=grp.data?.created_by===me.id;const ml=(mems.data||[]).map(m=>'<div class="grp-member"><img class="av av-s" src="'+avUrl(m.mem)+'" alt=""><div style="flex:1"><span class="un" style="font-size:12px" onclick="closeModal();viewUser(\''+m.user_id+'\')">'+esc(m.mem?.full_name||m.mem?.username)+'</span></div><span class="'+(m.role==='admin'?'role-admin':'role-member')+'">'+m.role+'</span>'+(isAdmin&&m.user_id!==me.id?'<button class="bi" style="font-size:11px;color:var(--red)" onclick="removeFromGroup(\''+gid+'\',\''+m.user_id+'\')"><i class="fas fa-xmark"></i></button>':'')+'</div>').join('');const btns=[{t:'Close',cls:'bgc bsm',fn:()=>{}}];if(isCreator)btns.push({t:'Delete',cls:'bp bsm',st:'background:var(--red);color:#fff',fn:async()=>{await sb.from('groups').delete().eq('id',gid);closeModal();chatView={type:'group'};renderGroupsFull()}});else if(isAdmin)btns.push({t:'Leave',cls:'bgc bsm',st:'border-color:var(--red);color:var(--red)',fn:async()=>{await sb.from('group_members').delete().eq('group_id',gid).eq('user_id',me.id);closeModal();chatView={type:'group'};renderGroupsFull()}});showModal(grp.data?.name||'Group',btns,true,'<div style="max-height:240px;overflow-y:auto;border-top:1px solid var(--border);padding-top:8px">'+ml+'</div>')}
async function showAddMember(gid){showModal('Add Member',[{t:'Cancel',cls:'bgc bsm',fn:()=>{}}],true,'<div><label class="lbl">Username</label><input class="inp" id="addMemInp" placeholder="username"></div>');document.querySelector('[data-mi="0"]').onclick=async()=>{const un=document.getElementById('addMemInp')?.value.trim();if(!un)return;const{data:u}=await sb.from('profiles').select('*').ilike('username',un).limit(1);if(!u?.length){toast('Not found','er');return}await sb.from('group_members').insert({group_id:gid,user_id:u[0].id,role:'member'});closeModal();toast(u[0].username+' added!','ok');const a=document.getElementById('grpChatArea');if(a)loadGroupChat(a,gid)}}
async function removeFromGroup(gid,uid){await sb.from('group_members').delete().eq('group_id',gid).eq('user_id',uid);toast('Removed','ok');closeModal();const a=document.getElementById('grpChatArea');if(a)loadGroupChat(a,gid)}

async function loadExplore(){const el=document.getElementById('feedArea');if(!el)return;el.innerHTML='<div style="margin-bottom:18px"><h2 style="font-size:20px;font-weight:800;margin-bottom:12px">Explore</h2><input class="inp" placeholder="Search users..." id="exploreInp" oninput="doExplore(this.value)" style="padding:12px 16px;font-size:14px"></div><div id="exploreResults"></div>';const{data:users}=await sb.from('profiles').select('*').neq('id',me.id).order('created_at',{ascending:false}).limit(8);if(users?.length)document.getElementById('exploreResults').innerHTML='<h3 style="font-size:14px;font-weight:600;color:var(--fg2);margin-bottom:12px">Suggested</h3>'+users.map(u=>'<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser(\''+u.id+'\')"><div style="position:relative"><img class="av" src="'+avUrl(u)+'" alt=""><div class="av-status status-'+(u.status==='invisible'?'offline':u.status||'offline')+'" style="width:10px;height:10px;bottom:0;right:0"></div></div><div style="flex:1;min-width:0"><div class="un">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div></div><button class="fbtn nf" onclick="event.stopPropagation();toggleFollow(\''+u.id+'\')">Follow</button></div></div>').join('')}
async function doExplore(q){if(!q.trim()){loadExplore();return}const sq=sanitizeSearch(q);const{data:users}=await sb.from('profiles').select('*').or('username.ilike.%'+sq+'%,full_name.ilike.%'+sq+'%').neq('id',me.id).limit(20);const el=document.getElementById('exploreResults');if(!el)return;el.innerHTML=(users||[]).map(u=>'<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser(\''+u.id+'\')"><img class="av" src="'+avUrl(u)+'" alt=""><div style="flex:1;min-width:0"><div class="un">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div></div><button class="fbtn nf" onclick="event.stopPropagation();toggleFollow(\''+u.id+'\')">Follow</button></div></div>').join('')||'<div class="empty-s"><p>No users found</p></div>'}
async function goSettings(){chatView=null;view='settings';renderApp();document.getElementById('mainArea').innerHTML='<div class="feed-pane"><div class="feed-center"><h2 style="font-size:20px;font-weight:800;margin-bottom:20px">Settings</h2><div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px"><h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Edit Profile</h3><div style="display:flex;align-items:center;gap:16px;margin-bottom:20px"><div class="avatar-upload" onclick="document.getElementById(\'avatarFileInput\').click()"><img class="av av-xl" id="avatarPreview" src="'+avUrl(myProf)+'" alt=""><div class="av-overlay"><i class="fas fa-camera" style="color:#fff;font-size:20px"></i></div></div><input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="previewAvatar(this)"><div style="flex:1"><p style="font-size:12px;color:var(--fg2)">Click avatar to upload</p></div></div></div><div style="margin-bottom:14px"><label class="lbl">Display Name</label><input class="inp" id="setName" value="'+esc(myProf?.full_name||'')+'" maxlength="50"></div><div style="margin-bottom:14px"><label class="lbl">Username</label><input class="inp" id="setUser" value="'+esc(myProf?.username||'')+'" maxlength="20" pattern="[a-zA-Z0-9_]+"></div><div style="margin-bottom:14px"><label class="lbl">Bio</label><textarea class="inp" id="setBio" maxlength="160" style="resize:none;min-height:60px;font-size:13px">'+esc(myProf?.bio||'')+'</textarea></div><div style="margin-bottom:14px"><label class="lbl">Status</label><select class="status-sel" id="setStatus"><option value="online" '+(myStatus==='online'?'selected':'')+'>Online</option><option value="idle" '+(myStatus==='idle'?'selected':'')+'>Idle</option><option value="dnd" '+(myStatus==='dnd'?'selected':'')+'>Do Not Disturb</option><option value="invisible" '+(myStatus==='invisible'?'selected':'')+'>Invisible</option></select></div><button class="bp" id="saveBtn" onclick="saveSettings()"><i class="fas fa-check"></i> Save Changes</button></div><div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px"><button class="bgc" style="border-color:var(--red);color:var(--red)" onclick="handleLogout()"><i class="fas fa-right-from-bracket"></i> Sign Out</button></div></div></div></div></div>'}
function previewAvatar(input){const file=input.files[0];if(!file||file.size>2*1024*1024){input.value='';return}pendingAvatarFile=file;document.getElementById('avatarPreview').src=URL.createObjectURL(file)}
async function saveSettings(){const btn=document.getElementById('saveBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';const fn=document.getElementById('setName').value.trim(),un=document.getElementById('setUser').value.trim().toLowerCase(),bio=document.getElementById('setBio').value.trim(),status=document.getElementById('setStatus').value;let avu=myProf?.avatar_url||'';if(!un||!/^[a-zA-Z0-9_]+$/.test(un)){btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';return}if(pendingAvatarFile){try{const path=me.id+'/avatar.'+pendingAvatarFile.name.split('.').pop();if(!(await sb.storage.from('avatars').upload(path,pendingAvatarFile,{upsert:true})).error)throw new Error('Upload failed');avu=sb.storage.from('avatars').getPublicUrl(path).data.publicUrl+'?t='+Date.now();pendingAvatarFile=null}catch(e){btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';pendingAvatarFile=null;return}}try{await sb.from('profiles').update({full_name:fn,username:un,bio,avatar_url:avu,status}).eq('id',me.id);myProf={...myProf,full_name:fn,username:un,bio,avatar_url:avu,status};myStatus=status;toast('Saved!','ok');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';updateNavProfile()}catch(e){toast(e.message,'er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes'}}

function goFeed(){chatView=null;viewingUid=null;view='feed';dmOpen=true;renderApp()}
function goProfile(){chatView=null;viewingUid=null;view='profile';renderApp()}
function goExplore(){chatView=null;viewingUid=null;view='explore';dmOpen=true;renderApp()}
async function handleLogout(){await setUserStatus('offline');await sb.auth.signOut();me=null;myProf=null;chatView=null;view='feed';renderAuth()}
async function renderDMChat(){if(!chatView||chatView.type!=='dm')return;const area=document.getElementById('chatArea');if(area){area.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';await loadDMChat(area,chatView.convId,chatView.peerId)}}
async function renderGroupChat(){if(!chatView||chatView.type!=='group')return;const area=document.getElementById('chatArea');if(area){area.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';await sb.from('conversations').upsert({id:chatView.groupId},{onConflict:'id'});await loadGroupChat(area,chatView.groupId)}}
init();
</script>
