<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMJ Social</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Sora:wght@200;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
    --bg: #12121c; --bg2: #171724; --bg3: #1c1c2e; 
    --card: #1f1f32; --card-h: #24243a;
    --border: #2b2b44; --border-h: #3a3a58;
    --fg: #eaeaf2; --fg2: #a0a0bc; --fg3: #6a6a88;
    --acc: #e8a035; --acc-h: #f0b855; 
    --acc-s: rgba(232, 160, 53, 0.12);
    --red: #e84057; --grn: #35c78a; --pur: #a77bdf; --blu: #5b9ef5;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; color: inherit; }
body { font-family:'Space Grotesk',sans-serif; background:var(--bg); color:var(--fg); height:100vh; overflow:hidden; -webkit-font-smoothing:antialiased; }
h1,h2,h3 { font-family:'Sora',sans-serif; }

/* Background Glow */
body::before { content:''; position:fixed; top:-20%; right:-10%; width:600px; height:600px; background:radial-gradient(circle, rgba(232,160,53,0.05) 0%, transparent 65%); pointer-events:none; z-index:0; }
body::after { content:''; position:fixed; bottom:-15%; left:-10%; width:700px; height:700px; background:radial-gradient(circle, rgba(90,158,245,0.03) 0%, transparent 65%); pointer-events:none; z-index:0; }

::-webkit-scrollbar { width:6px } ::-webkit-scrollbar-track { background:transparent } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px }

/* UI Elements */
.toast-box { position:fixed; top:16px; right:16px; z-index:9999; display:flex; flex-direction:column; gap:6px; pointer-events:none }
.toast { padding:12px 18px; border-radius:10px; font-size:13px; font-weight:500; background:var(--card); border:1px solid var(--border); box-shadow:0 8px 32px rgba(0,0,0,.5); animation:tI .3s ease,tO .3s 2.7s forwards; max-width:340px; pointer-events:auto }
.toast.ok { border-left:3px solid var(--grn) } .toast.er { border-left:3px solid var(--red) } .toast.in { border-left:3px solid var(--acc) }
@keyframes tI { from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1} } @keyframes tO { to{transform:translateX(100%);opacity:0} }

.inp { width:100%; padding:11px 14px; background:var(--bg2); border:1px solid var(--border); border-radius:9px; color:var(--fg); font-family:inherit; font-size:13px; outline:none; transition:all .2s }
.inp:focus { border-color:var(--acc); box-shadow:0 0 0 3px var(--acc-s) } .inp::placeholder { color:var(--fg3) }
.lbl { display:block; font-size:11px; font-weight:600; color:var(--fg2); margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px }
.bp { background:linear-gradient(135deg,var(--acc),#d4912e); color:#0a0a0a; font-weight:700; border:none; border-radius:9px; padding:10px 20px; cursor:pointer; font-size:13px; font-family:inherit; transition:all .15s; display:inline-flex; align-items:center; gap:7px; box-shadow:0 2px 12px rgba(232,160,53,.2) }
.bp:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(232,160,53,.35) } .bp:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none }
.bgc { background:var(--bg3); color:var(--fg2); font-weight:500; border:1px solid var(--border); border-radius:9px; padding:9px 16px; cursor:pointer; font-size:13px; font-family:inherit; transition:all .15s }
.bgc:hover { border-color:var(--border-h); color:var(--fg) } .bsm { padding:7px 14px; font-size:12px; border-radius:7px }
.bi { background:none; border:none; color:var(--fg3); cursor:pointer; padding:6px; border-radius:7px; transition:all .12s; font-size:14px } .bi:hover { color:var(--fg); background:var(--acc-s) }
.spinner { width:20px; height:20px; border:3px solid var(--border); border-top-color:var(--acc); border-radius:50%; animation:sp .6s linear infinite; display:inline-block } @keyframes sp { to{transform:rotate(360deg)} }
.empty-s { text-align:center; padding:40px 16px; color:var(--fg3) } .empty-s i { font-size:36px; margin-bottom:12px; display:block; opacity:.3 }
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px }
.modal-b { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:28px; max-width:480px; width:100%; box-shadow:0 24px 64px rgba(0,0,0,.5) }

/* Layout */
.app-grid { display:grid; grid-template-columns:240px 1fr; height:100vh; position:relative; z-index:2 }
.nav-bar { border-right:1px solid var(--border); padding:20px 14px; display:flex; flex-direction:column; background:var(--bg2) }
.ni { display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:10px; cursor:pointer; transition:all .12s; font-weight:500; color:var(--fg2); font-size:13px; white-space:nowrap }
.ni:hover { background:var(--acc-s); color:var(--fg) } .ni.on { background:var(--acc-s); color:var(--acc) } .ni i { width:18px; text-align:center; font-size:15px }
.ni .badge { margin-left:auto; background:var(--red); color:#fff; font-size:10px; font-weight:700; padding:1px 6px; border-radius:10px }
.main-area { display:flex; overflow:hidden; position:relative; background:var(--bg) }
.feed-pane { flex:1; overflow-y:auto; padding:24px 20px; min-width:0 } .feed-center { max-width:600px; margin:0 auto }
.dm-pane { width:360px; border-left:1px solid var(--border); display:flex; flex-direction:column; background:var(--bg2); flex-shrink:0 }
.dm-list { flex:1; overflow-y:auto; padding:8px } .dm-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; cursor:pointer; transition:all .12s }
.dm-item:hover { background:rgba(232,160,53,.06) } .dm-item.on { background:var(--acc-s); border-left:2px solid var(--acc) }

/* Chat */
.chat-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; background:var(--bg2); flex-shrink:0 }
.chat-messages { flex:1; overflow-y:auto; padding:16px 18px; display:flex; flex-direction:column; gap:8px; background:var(--bg) }
.chat-input-bar { padding:12px 18px; border-top:1px solid var(--border); display:flex; gap:8px; background:var(--bg2); flex-shrink:0 }
.msg-wrap { display:flex; gap:6px } .msg-wrap.self { flex-direction:row-reverse }
.msg-bubble { max-width:72%; padding:10px 14px; border-radius:14px; font-size:13px; line-height:1.5; word-break:break-word; animation:msgIn .15s ease; position:relative; background:var(--card); border:1px solid var(--border) }
@keyframes msgIn { from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)} }
.msg-self { background:rgba(232,160,53,.12); border-color:rgba(232,160,53,.2) }
.msg-meta { font-size:10px; color:var(--fg3); margin-top:3px }
.msg-actions { position:absolute; top:-10px; display:none; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:2px; box-shadow:0 4px 12px rgba(0,0,0,.4) }
.msg-wrap.self .msg-actions { right:0 } .msg-wrap:not(.self) .msg-actions { left:0 } .msg-wrap:hover .msg-actions { display:flex }
.msg-act { padding:4px 6px; border-radius:4px; cursor:pointer; font-size:12px; background:none; border:none; color:var(--fg3) } .msg-act:hover { background:var(--acc-s); color:var(--acc) }
.msg-date-divider { text-align:center; font-size:11px; color:var(--fg3); padding:12px 0; position:relative } .msg-date-divider span { background:var(--bg); padding:0 12px; position:relative; z-index:1 } .msg-date-divider::before { content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:var(--border) }

/* Posts */
.comp { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:18px } 
.comp textarea { width:100%; background:none; border:none; color:var(--fg); font-family:inherit; font-size:14px; resize:none; outline:none; min-height:64px; line-height:1.6 } .comp textarea::placeholder { color:var(--fg3) }
.post { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:14px; transition:all .15s; animation:pI .3s ease }
.post:hover { border-color:var(--border-h); background:var(--card-h) } @keyframes pI { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
.post-img { width:100%; border-radius:10px; margin-top:8px; max-height:380px; object-fit:cover; cursor:pointer }
.pa { display:flex; gap:2px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border) }
.ab { display:flex; align-items:center; gap:5px; padding:5px 11px; border-radius:7px; cursor:pointer; border:none; background:none; color:var(--fg3); font-size:12px; font-weight:500; font-family:inherit; transition:all .12s }
.ab:hover { background:var(--acc-s); color:var(--fg) } .ab.lk { color:var(--red) } .ab.lk:hover { background:rgba(232,64,87,.08) }
.cmt-sec { margin-top:8px; padding-top:8px; border-top:1px solid var(--border) } .cmt-i { display:flex; gap:8px; padding:6px 0 }
.cmt-row { display:flex; gap:6px; margin-top:6px; align-items:center } .cmt-row input { flex:1; padding:8px 12px; background:var(--bg); border:1px solid var(--border); border-radius:18px; color:var(--fg); font-family:inherit; font-size:12px; outline:none } .cmt-row input:focus { border-color:var(--acc) }

/* Profile */
.av { width:38px; height:38px; border-radius:50%; object-fit:cover; border:2px solid var(--border); flex-shrink:0; background:var(--card) } .av-s { width:28px; height:28px } .av-xl { width:88px; height:88px; border-width:3px }
.av-status { position:absolute; bottom:-2px; right:-2px; width:12px; height:12px; border-radius:50%; border:2px solid var(--card) }
.status-online { background:var(--grn) } .status-idle { background:#f0b232 } .status-dnd { background:var(--red) } .status-offline { background:var(--fg3) }
.un { font-weight:700; font-size:14px; color:var(--fg); cursor:pointer; transition:color .12s } .un:hover { color:var(--acc) }
.hd { font-size:12px; color:var(--fg2) } .ts { font-size:11px; color:var(--fg3) } .pb { margin-top:8px; font-size:14px; line-height:1.6; white-space:pre-wrap; word-break:break-word }
.prof-h { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:18px }
.prof-banner { height:130px; background:linear-gradient(135deg,rgba(232,160,53,.15),rgba(90,158,245,.08),rgba(167,123,223,.08)); position:relative; overflow:hidden }
.fbtn { padding:6px 16px; border-radius:18px; font-size:11px; font-weight:700; cursor:pointer; border:none; font-family:inherit; transition:all .15s }
.fbtn.fw { background:var(--bg); color:var(--fg2); border:1px solid var(--border) } .fbtn.fw:hover { border-color:var(--red); color:var(--red) }
.fbtn.nf { background:var(--acc); color:#09090b } .fbtn.nf:hover { background:var(--acc-h) }
.avatar-upload { position:relative; cursor:pointer; display:inline-block } .avatar-upload:hover .av-overlay { opacity:1 }
.av-overlay { position:absolute; inset:0; border-radius:50%; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .2s }

/* Polls */
.poll-box { margin-top:10px; background:var(--bg2); border-radius:10px; padding:12px; border:1px solid var(--border) }
.poll-opt { position:relative; margin-bottom:8px; cursor:pointer; overflow:hidden; border-radius:6px; border:1px solid var(--border) } .poll-opt:hover { border-color:var(--fg3) }
.poll-fill { position:absolute; left:0; top:0; bottom:0; background:var(--acc-s); transition:width .3s ease; border-radius:6px }
.poll-txt { position:relative; padding:8px 12px; font-size:13px; display:flex; justify-content:space-between; z-index:1 }

/* Auth */
.auth-w { height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; background:var(--bg); position:relative; overflow:hidden }
.auth-w::before { content:''; position:absolute; width:500px; height:500px; background:radial-gradient(circle,rgba(232,160,53,.08),transparent 70%); top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none }
.auth-c { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:40px; max-width:420px; width:100%; box-shadow:0 24px 64px rgba(0,0,0,.5); position:relative; z-index:2 }
.atab { padding:9px 18px; cursor:pointer; font-weight:600; font-size:14px; color:var(--fg3); background:none; border:none; font-family:inherit; border-bottom:2px solid transparent; transition:all .15s } .atab.on { color:var(--acc); border-bottom-color:var(--acc) } .atab:hover:not(.on) { color:var(--fg2) }
.setup-ov { position:fixed; inset:0; z-index:100; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:20px; overflow-y:auto }
.setup-b { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:36px; max-width:600px; width:100%; box-shadow:0 24px 64px rgba(0,0,0,.5) }
.sql-c { background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:12px; font-family:'Courier New',monospace; font-size:10px; color:var(--fg3); max-height:160px; overflow-y:auto; white-space:pre-wrap; user-select:all }
.status-sel { background:var(--bg2); border:1px solid var(--border); color:var(--fg); padding:8px; border-radius:8px; font-family:inherit; outline:none }

@media(max-width:800px){ .app-grid{grid-template-columns:1fr} .nav-bar{display:none} .dm-pane{width:100%;position:absolute;inset:0;z-index:40;border:none} }
@media(prefers-reduced-motion:reduce){ *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important} }
</style>

const SQL=`CREATE TABLE IF NOT EXISTS profiles(id UUID REFERENCES auth.users ON DELETE CASCADE PRIMARY KEY, username TEXT UNIQUE NOT NULL, full_name TEXT DEFAULT '', avatar_url TEXT DEFAULT '', bio TEXT DEFAULT '', status TEXT DEFAULT 'offline', created_at TIMESTAMPTZ DEFAULT now());

CREATE TABLE IF NOT EXISTS comments(id UUID DEFAULT gen_random_uuid() PRIMARY KEY, user_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL, post_id UUID REFERENCES posts(id) ON DELETE CASCADE NOT NULL, content TEXT NOT NULL, created_at TIMESTAMPTZ DEFAULT now());

CREATE TABLE IF NOT EXISTS conversations(id UUID DEFAULT gen_random_uuid() PRIMARY KEY, created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS conversation_participants(conversation_id UUID REFERENCES conversations(id) ON DELETE CASCADE, user_id UUID REFERENCES profiles(id) ON DELETE CASCADE, PRIMARY KEY(conversation_id, user_id));
CREATE TABLE IF NOT EXISTS messages(id UUID DEFAULT gen_random_uuid() PRIMARY KEY, conversation_id UUID REFERENCES conversations(id) ON DELETE CASCADE NOT NULL, sender_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL, content TEXT NOT NULL, is_pinned BOOLEAN DEFAULT false, created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS message_reactions(message_id UUID REFERENCES messages(id) ON DELETE CASCADE, user_id UUID REFERENCES profiles(id) ON DELETE CASCADE, emoji TEXT NOT NULL, PRIMARY KEY(message_id, user_id, emoji));
CREATE TABLE IF NOT EXISTS groups(id UUID DEFAULT gen_random_uuid() PRIMARY KEY, name TEXT NOT NULL, description TEXT DEFAULT '', created_by UUID REFERENCES profiles(id) ON DELETE CASCADE, created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS group_members(group_id UUID REFERENCES groups(id) ON DELETE CASCADE, user_id UUID REFERENCES profiles(id) ON DELETE CASCADE, role TEXT DEFAULT 'member', PRIMARY KEY(group_id, user_id));
CREATE TABLE IF NOT EXISTS polls(id UUID DEFAULT gen_random_uuid() PRIMARY KEY, post_id UUID REFERENCES posts(id) ON DELETE CASCADE NOT NULL, question TEXT NOT NULL, created_at TIMESTAMPTZ DEFAULT now());

function toast(m,t='in'){const b=document.getElementById('toastBox'),e=document.createElement('div');e.className='toast '+t;e.textContent=m;b.appendChild(e);setTimeout(()=>e.remove(),3100)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function timeAgo(d){const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'d';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function defAv(n){const c=(n||'U').charAt(0).toUpperCase(),cols=['#e8a035','#e84057','#35c78a','#5b9ef5','#a77bdf','#e87835'],col=cols[(n||'U').charCodeAt(0)%cols.length];return"data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect width="80" height="80" rx="40" fill="'+col+'"/><text x="50%" y="54%" text-anchor="middle" dy=".1em" font-family="sans-serif" font-size="30" font-weight="700" fill="#fff">'+c+'</text></svg>')}
function avUrl(p){return p&&p.avatar_url?p.avatar_url:defAv(p?p.username:'U')}

function sanitizeSearch(q){if(!q)return'';return q.replace(/[%_]/g,'\\$&')}
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function playSound(f1,f2,d){try{const c=getAudioCtx(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(f1,t);o.frequency.exponentialRampToValueAtTime(f2,t+d);g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+d+.1);o.start(t);o.stop(t+d+.1)}catch(e){}}

async function init(){
    try {
        sb=window.supabase.createClient(SB_URL,SB_KEY);
        // Check if tables exist
        const{error}=await sb.from('profiles').select('id').limit(1);
        if(error){renderSetup();return}
        
        const{data:{session}}=await sb.auth.getSession();
        if(session){
            me=session.user;
            await ensureProfile(me);
            await loadProf(me.id);
            renderApp();
            setupRT();
            setUserStatus('online');
            window.addEventListener('beforeunload',()=>setUserStatus('offline'));
            return;
        }
        renderAuth();
    } catch(e) {
        renderSetup();
    }
}

async function ensureProfile(user){
    try{
        const{data:ex}=await sb.from('profiles').select('id').eq('id',user.id).single();
        if(ex)return;
        const un=user.user_metadata?.username||user.email?.split('@')[0]||'user';
        await sb.from('profiles').upsert({id:user.id,username:un.toLowerCase(),full_name:user.user_metadata?.full_name||''},{onConflict:'id'});
    }catch(e){console.error(e)}
}

async function handleAuth(e){
    e.preventDefault();const btn=document.getElementById('aBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
    const email=document.getElementById('aE').value.trim(),pass=document.getElementById('aP').value;
    try{
        let r;
        if(authM==='signup'){
            const un=document.getElementById('aU').value.trim().toLowerCase(),fn=document.getElementById('aN').value.trim();
            r=await sb.auth.signUp({email,password:pass,options:{data:{username:un,full_name:fn}}});
            if(r.error)throw r.error;if(r.data.user&&!r.data.session){toast('Check email to confirm, then sign in.','in');authM='login';renderAuth();return}
        }else{r=await sb.auth.signInWithPassword({email,password:pass});if(r.error)throw r.error}
        me=r.data.user;await new Promise(r=>setTimeout(r,800));await ensureProfile(me);await loadProf(me.id);
        toast('Welcome!','ok');renderApp();setupRT();setUserStatus('online');
    }catch(err){toast(err.message||'Auth failed','er');btn.disabled=false;btn.innerHTML=authM==='login'?'<i class="fas fa-arrow-right"></i> Sign In':'<i class="fas fa-user-plus"></i> Create Account'}
}

function setupRT(){
    sb.channel('mmj-rt')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},()=>{if(view==='feed'&&!chatView)loadFeed()})
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},payload=>{
        const cid=payload.new.conversation_id;
        if(chatView&&((chatView.type==='dm'&&chatView.convId===cid)||(chatView.type==='group'&&chatView.groupId===cid))){
            loadMessages();if(payload.new.sender_id!==me.id)playSound(587,784,.1)
        }else{
            if(chatView?.type==='dm')unreadDMs++;else unreadGroups++;
            renderNav();playSound(587,784,.1);
            if(document.getElementById('dmListFull'))loadDMList()
        }
    }).subscribe();
}

async function loadFeed(){
    const el = document.getElementById('feedArea');
    if(!el) return;
    el.innerHTML = '<div class="empty-s"><span class="spinner" style="width:28px;height:28px"></span><p style="margin-top:12px">Loading feed...</p></div>';
    
    try {
        const{data:posts,error}=await sb.from('posts').select('id,user_id,content,image_url,created_at,author:profiles!user_id(username,full_name,avatar_url)').order('created_at',{ascending:false}).limit(50);
        if(error) throw error;
        if(!posts?.length){el.innerHTML='<div class="empty-s"><i class="fas fa-feather-pointed"></i><p>No posts yet. Be the first to post!</p></div>';return}
        
        const pids=posts.map(p=>p.id);let ul=[],lc={},cc={},bks={};
        if(pids.length&&me){
            const{data:lks}=await sb.from('likes').select('post_id').eq('user_id',me.id).in('post_id',pids);ul=lks||[];
            const{data:allL}=await sb.from('likes').select('post_id');(allL||[]).forEach(l=>{lc[l.post_id]=(lc[l.post_id]||0)+1});
            const{data:bk}=await sb.from('bookmarks').select('post_id').eq('user_id',me.id).in('post_id',pids);(bk||[]).forEach(b=>{bks[b.post_id]=true});
        }
        if(pids.length){const{data:cs}=await sb.from('comments').select('post_id').in('post_id',pids);(cs||[]).forEach(c=>{cc[c.post_id]=(cc[c.post_id]||0)+1})}
        renderPosts(posts.map(p=>({...p,profile:p.author,liked:ul.some(l=>l.post_id===p.id),likeCount:lc[p.id]||0,commentCount:cc[p.id]||0,bookmarked:!!bks[p.id]})));
    } catch(e) {
        console.error(e);
        el.innerHTML = '<div class="empty-s"><i class="fas fa-exclamation-triangle" style="color:var(--red)"></i><p>Failed to load feed</p></div>';
    }
}

        const{data:posts}=await sb.from('posts').select('id,user_id,content,image_url,created_at,author:profiles!user_id(username,full_name,avatar_url)').eq('user_id',uid).order('created_at',{ascending:false}).limit(50);
        const pids=posts.map(p=>p.id);let ul=[],lc={},cc={},bks={};
        if(pids.length&&me){const{data:lks}=await sb.from('likes').select('post_id').eq('user_id',me.id).in('post_id',pids);ul=lks||[];const{data:allL}=await sb.from('likes').select('post_id');(allL||[]).forEach(l=>{lc[l.post_id]=(lc[l.post_id]||0)+1});const{data:bk}=await sb.from('bookmarks').select('post_id').eq('user_id',me.id).in('post_id',pids);(bk||[]).forEach(b=>{bks[b.post_id]=true})}
        if(pids.length){const{data:cs}=await sb.from('comments').select('post_id').in('post_id',pids);(cs||[]).forEach(c=>{cc[c.post_id]=(cc[c.post_id]||0)+1})}
        renderPosts(posts.map(p=>({...p,profile:p.author,liked:ul.some(l=>l.post_id===p.id),likeCount:lc[p.id]||0,commentCount:cc[p.id]||0,bookmarked:!!bks[p.id]})));

async function toggleBookmark(pid,btn){if(!me)return;try{const{data:ex}=await sb.from('bookmarks').select('post_id').eq('user_id',me.id).eq('post_id',pid).single();if(ex){await sb.from('bookmarks').delete().eq('user_id',me.id).eq('post_id',pid);btn.classList.remove('lk')}else{await sb.from('bookmarks').insert({user_id:me.id,post_id:pid});btn.classList.add('lk');toast('Saved!','ok')}}catch(e){}}
async function createPost(){const ta=document.getElementById('compT'),content=ta?.value.trim();if(!content&&!showPollUI){toast('Write something','er');return}const btn=document.getElementById('compBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';try{let iu='';if(imgFile){const ext=imgFile.name.split('.').pop(),path=me.id+'/'+Date.now()+'.'+ext;const{error}=await sb.storage.from('post-images').upload(path,imgFile);if(!error)iu=sb.storage.from('post-images').getPublicUrl(path).data.publicUrl}const{data:post}=await sb.from('posts').insert({user_id:me.id,content,image_url:iu}).select().single();ta.value='';imgFile=null;showPollUI=false;btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Post';document.getElementById('imgPrev').innerHTML='';document.getElementById('pollPreview').innerHTML='';toast('Posted!','ok');playSound(880,520,.08);loadFeed()}catch(e){toast('Failed: '+e.message,'er');btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Post'}}
function handleImg(e){const f=e.target.files[0];if(!f)return;if(f.size>5*1024*1024){toast('Max 5MB','er');return}imgFile=f;const url=URL.createObjectURL(f);document.getElementById('imgPrev').innerHTML='<div style="position:relative;border-radius:8px;overflow:hidden;margin-top:8px"><img src="'+url+'" style="width:100%;max-height:180px;object-fit:cover;border-radius:8px" alt=""><button onclick="event.stopPropagation();rmImg()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer"><i class="fas fa-xmark"></i></button></div>'}

function renderDMFull(){document.getElementById('mainArea').innerHTML='<div style="display:flex;width:100%;height:100%"><div style="width:300px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0"><div style="padding:14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)"><button class="bi" onclick="chatView=null;renderApp()"><i class="fas fa-arrow-left"></i></button><h3 style="font-size:15px;font-weight:700">Messages</h3><button class="bi" style="margin-left:auto" onclick="newDMModal()"><i class="fas fa-pen-to-square"></i></button></div><div style="padding:8px 10px"><input class="inp" style="font-size:12px;padding:8px 12px" placeholder="Search..." id="dmFullSearch" oninput="searchDMUsers(this.value)"></div><div class="dm-list" id="dmListFull"></div></div><div id="dmChatArea" style="flex:1;display:flex;flex-direction:column;background:var(--bg)"><div class="empty-s" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center"><i class="fas fa-comment-dots"></i><p style="font-weight:600;margin-bottom:4px">Your Messages</p><p style="font-size:12px">Select or start a conversation</p></div></div></div>';loadDMList()}
async function loadDMList(){const el=(document.getElementById('dmListFull')||document.getElementById('dmList'));if(!el)return;el.innerHTML='<div class="empty-s" style="padding:20px"><span class="spinner"></span></div>';try{const{data:parts}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',me.id);if(!parts?.length){el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px">No conversations yet</p></div>';return}const cids=parts.map(p=>p.conversation_id);const{data:otherParts}=await sb.from('conversation_participants').select('conversation_id,user_id,peer:profiles!user_id(username,full_name,avatar_url,status)').in('conversation_id',cids).neq('user_id',me.id);const{data:msgs}=await sb.from('messages').select('*').in('conversation_id',cids).order('created_at',{ascending:false});const lastMsg={};(msgs||[]).forEach(m=>{if(!lastMsg[m.conversation_id])lastMsg[m.conversation_id]=m});const convMap={};(otherParts||[]).forEach(p=>{convMap[p.conversation_id]=p});const list=parts.map(p=>{const o=convMap[p.conversation_id],l=lastMsg[p.conversation_id];if(!o)return null;return{cid:p.conversation_id,peer:o,last:l}}).filter(Boolean).sort((a,b)=>new Date(b.last?.created_at||0)-new Date(a.last?.created_at||0));el.innerHTML=list.map(c=>'<div class="dm-item '+(chatView?.convId===c.cid?'on':'')+'" onclick="openDM(\''+c.cid+'\',\''+c.peer.user_id+'\')"><div style="position:relative"><img class="av av-s" src="'+avUrl(c.peer.peer)+'" alt=""><div class="av-status status-'+(c.peer.peer?.status==='invisible'?'offline':c.peer.peer?.status||'offline')+'" style="width:10px;height:10px;bottom:-2px;right:-2px;border-width:2px"></div></div><div style="min-width:0;flex:1"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(c.peer.peer?.full_name||c.peer.peer?.username)+'</div><div class="hd" style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(c.last?esc(c.last.content):'No messages')+'</div></div></div>').join('')}catch(e){el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px">Failed to load</p></div>'}}
function searchDMUsers(q){if(!q.trim())return loadDMList();const sq=sanitizeSearch(q);sb.from('profiles').select('*').or('username.ilike.%'+sq+'%,full_name.ilike.%'+sq+'%').neq('id',me.id).limit(10).then(({data})=>{const el=document.getElementById('dmListFull')||document.getElementById('dmList');if(!el||!data?.length){if(el)el.innerHTML='<div style="padding:12px;color:var(--fg3);font-size:12px;text-align:center">No users found</div>';return}el.innerHTML=data.map(u=>'<div class="dm-item" onclick="startDMWith(\''+u.id+'\')"><img class="av av-s" src="'+avUrl(u)+'" alt=""><div><div style="font-weight:600;font-size:13px">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div></div></div>').join('')})}
async function newDMModal(){showModal('New Message',[{t:'Cancel',cls:'bgc bsm',fn:()=>{}}],true,'<div><label class="lbl">Username</label><input class="inp" id="newDmInp" placeholder="username"></div>');document.querySelector('[data-mi="0"]').onclick=async()=>{const v=document.getElementById('newDmInp')?.value.trim();if(!v)return;closeModal();const{data:u}=await sb.from('profiles').select('*').ilike('username',v).neq('id',me.id).limit(1);if(!u?.length){toast('User not found','er');return}startDMWith(u[0].id)}}
async function startDMWith(uid){if(uid===me.id){toast('Cannot message yourself','er');return}try{const{data:mc}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',me.id);const{data:tc}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',uid);const mids=(mc||[]).map(c=>c.conversation_id),tids=(tc||[]).map(c=>c.conversation_id);const ex=mids.find(c=>tids.includes(c));if(ex){openDM(ex,uid);return}const{data:conv}=await sb.from('conversations').insert({}).select().single();await sb.from('conversation_participants').insert([{conversation_id:conv.id,user_id:me.id},{conversation_id:conv.id,user_id:uid}]);openDM(conv.id,uid);toast('Conversation started','ok')}catch(e){toast('Failed','er')}}
async function openDM(cid,peerId){chatView={type:'dm',convId:cid,peerId};unreadDMs=0;renderNav();const area=document.getElementById('dmChatArea');if(area){loadDMChat(area,cid,peerId)}else{renderDMFull();setTimeout(()=>{const a=document.getElementById('dmChatArea');if(a)loadDMChat(a,cid,peerId)},50)}loadDMList()}
async function loadDMChat(area,cid,peerId){const peer=await getProf(peerId);area.innerHTML='<div class="chat-header"><button class="bi" onclick="chatView={type:\'dm\'};renderDMFull()"><i class="fas fa-arrow-left"></i></button><div style="position:relative"><img class="av" src="'+avUrl(peer)+'" alt=""><div class="av-status status-'+(peer.status==='invisible'?'offline':peer.status||'offline')+'"></div></div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px">'+esc(peer.full_name||peer.username)+'</div><div class="hd" style="font-size:10px">@'+esc(peer.username)+'</div></div></div><div class="chat-messages" id="chatMsgs"><div class="empty-s" style="padding:20px"><span class="spinner"></span></div></div><div class="chat-input-bar"><input class="inp" id="chatInp" placeholder="Type a message..." onkeydown="if(event.key===\'Enter\')sendDM()"><button class="bp bsm" onclick="sendDM()" style="padding:8px 14px"><i class="fas fa-paper-plane"></i></button></div>';loadMessages();document.getElementById('chatInp')?.focus()}
async function sendDM(){if(!chatView)return;const inp=document.getElementById('chatInp');if(!inp||!inp.value.trim())return;await sb.from('messages').insert({conversation_id:chatView.convId,sender_id:me.id,content:inp.value.trim()});inp.value='';playSound(880,520,.08);loadMessages()}

// ── MESSAGES (RENDERING FIX) ──
async function loadMessages(){
    const el=document.getElementById('chatMsgs');
    if(!el || !chatView) return;
    
    const cid=chatView.type==='dm'?chatView.convId:chatView.groupId;
    el.innerHTML = '<div class="empty-s" style="padding:20px"><span class="spinner"></span></div>';
    
    try {
        const{data:msgs}=await sb.from('messages').select('*,sender:profiles!sender_id(username,full_name,avatar_url)').eq('conversation_id',cid).order('created_at',{ascending:true}).limit(100);
        if(!msgs?.length){el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px">No messages yet. Say hello!</p></div>';return}
        
        let html='',lastDate='';
        msgs.forEach(m=>{
            const d=new Date(m.created_at).toLocaleDateString();
            if(d!==lastDate){lastDate=d;html+='<div class="msg-date-divider"><span>'+(d===new Date().toLocaleDateString()?'Today':d)+'</span></div>'}
            const isMe=m.sender_id===me.id;
            html+='<div class="msg-wrap '+(isMe?'self':'')+'"><div class="msg-bubble '+(isMe?'msg-self':'')+'"><div class="msg-actions"><button class="msg-act" onclick="showReactMenu(event,\''+m.id+'\')"><i class="fas fa-face-smile"></i></button>'+(chatView.type==='group'?'<button class="msg-act" onclick="pinMsg(\''+m.id+'\')"><i class="fas fa-thumbtack"></i></button>':'')+'</div><div style="font-size:11px;font-weight:600;color:var(--acc);margin-bottom:2px">'+(isMe?'You':esc(m.sender?.username||'user'))+'</div><div>'+esc(m.content)+'</div><div class="msg-meta">'+timeAgo(m.created_at)+(m.is_pinned?' <i class="fas fa-thumbtack" style="font-size:9px;color:var(--acc)"></i>':'')+'</div></div></div>'
        });
        el.innerHTML=html;el.scrollTop=el.scrollHeight;
    } catch(e) {
        el.innerHTML = '<div class="empty-s" style="padding:20px"><p>Failed to load messages</p></div>';
    }
}

async function toggleReaction(mid,emoji){try{const{data:ex}=await sb.from('message_reactions').select('user_id').eq('message_id',mid).eq('user_id',me.id).eq('emoji',emoji).single();if(ex)await sb.from('message_reactions').delete().eq('message_id',mid).eq('user_id',me.id).eq('emoji',emoji);else await sb.from('message_reactions').insert({message_id:mid,user_id:me.id,emoji});loadMessages()}catch(e){}}
function showReactMenu(e,mid){e.stopPropagation();const existing=document.getElementById('reactMenu');if(existing)existing.remove();const menu=document.createElement('div');menu.id='reactMenu';menu.style.cssText='position:fixed;z-index:250;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px;display:flex;gap:4px;box-shadow:0 8px 24px rgba(0,0,0,.6);left:'+e.clientX+'px;top:'+e.clientY+'px';['👍','❤️','😂','🔥','👀','😮'].forEach(em=>{const b=document.createElement('button');b.style.cssText='background:none;border:none;font-size:20px;cursor:pointer;padding:4px;border-radius:6px';b.textContent=em;b.onmouseover=()=>b.style.background='var(--acc-s)';b.onmouseout=()=>b.style.background='none';b.onclick=()=>{toggleReaction(mid,em);menu.remove()};menu.appendChild(b)});document.body.appendChild(menu);setTimeout(()=>document.addEventListener('click',function rm(){menu.remove();document.removeEventListener('click',rm)}),10)}
async function pinMsg(mid){try{const{data:m}=await sb.from('messages').select('is_pinned').eq('id',mid).single();await sb.from('messages').update({is_pinned:!m.is_pinned}).eq('id',mid);toast(m.is_pinned?'Unpinned':'Pinned!','ok');loadMessages()}catch(e){}}

async function createGroupModal(){showModal('Create Group',[{t:'Cancel',cls:'bgc bsm',fn:()=>{}},{t:'Create',cls:'bp bsm',fn:()=>{}}],true,'<div style="margin-bottom:14px"><label class="lbl">Group Name</label><input class="inp" id="newGrpName" placeholder="My Group" maxlength="40"></div><div><label class="lbl">Description</label><input class="inp" id="newGrpDesc" placeholder="About this group" maxlength="100"></div>');document.querySelector('[data-mi="1"]').onclick=async()=>{const n=document.getElementById('newGrpName')?.value.trim();if(!n){toast('Name required','er');return}const d=document.getElementById('newGrpDesc')?.value.trim()||'';const{data:g}=await sb.from('groups').insert({name:n,description:d,created_by:me.id}).select().single();await sb.from('group_members').insert({group_id:g.id,user_id:me.id,role:'admin'});await sb.from('conversations').upsert({id:g.id},{onConflict:'id'});closeModal();toast('Group created!','ok');loadGroupList();openGroup(g.id)}}
async function openGroup(gid){chatView={type:'group',groupId:gid};unreadGroups=0;renderNav();await sb.from('conversations').upsert({id:gid},{onConflict:'id'});const area=document.getElementById('grpChatArea');if(area){loadGroupChat(area,gid)}else{renderGroupsFull();setTimeout(()=>{const a=document.getElementById('grpChatArea');if(a)loadGroupChat(a,gid)},50)}loadGroupList()}
async function loadGroupChat(area,gid){const{data:grp}=await sb.from('groups').select('*').eq('id',gid).single();const{data:mems}=await sb.from('group_members').select('user_id,role,mem:profiles!user_id(username,full_name,avatar_url)').eq('group_id',gid);const isAdmin=mems?.some(m=>m.user_id===me.id&&m.role==='admin');area.innerHTML='<div class="chat-header"><button class="bi" onclick="chatView={type:\'group\'};renderGroupsFull()"><i class="fas fa-arrow-left"></i></button><div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,rgba(232,160,53,.2),rgba(90,158,245,.2));display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-users" style="font-size:13px;color:var(--acc)"></i></div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(grp?.name)+'</div><div class="hd" style="font-size:10px">'+(mems?.length||0)+' members</div></div><button class="bi" onclick="showGroupInfo(\''+gid+'\')"><i class="fas fa-circle-info"></i></button>'+(isAdmin?'<button class="bi" onclick="showAddMember(\''+gid+'\')"><i class="fas fa-user-plus"></i></button>':'')+'</div><div class="chat-messages" id="chatMsgs"><div class="empty-s" style="padding:20px"><span class="spinner"></span></div></div><div class="chat-input-bar"><input class="inp" id="chatInp" placeholder="Message the group..." onkeydown="if(event.key===\'Enter\')sendGroupMsg()"><button class="bp bsm" onclick="sendGroupMsg()" style="padding:8px 14px"><i class="fas fa-paper-plane"></i></button></div>';loadMessages();document.getElementById('chatInp')?.focus()}
async function sendGroupMsg(){if(!chatView||chatView.type!=='group')return;const inp=document.getElementById('chatInp');if(!inp||!inp.value.trim())return;await sb.from('messages').insert({conversation_id:chatView.groupId,sender_id:me.id,content:inp.value.trim()});inp.value='';playSound(880,520,.08);loadMessages()}
async function showGroupInfo(gid){const{data:grp}=await sb.from('groups').select('*').eq('id',gid).single();const{data:mems}=await sb.from('group_members').select('user_id,role,mem:profiles!user_id(username,full_name,avatar_url)').eq('group_id',gid);const isAdmin=mems?.some(m=>m.user_id===me.id&&m.role==='admin'),isCreator=grp?.created_by===me.id;const ml=(mems||[]).map(m=>'<div style="display:flex;align-items:center;gap:8px;padding:6px 0"><img class="av av-s" src="'+avUrl(m.mem)+'" alt=""><div style="flex:1"><span class="un" style="font-size:12px" onclick="closeModal();viewUser(\''+m.user_id+'\')">'+esc(m.mem?.full_name||m.mem?.username)+'</span><span class="hd" style="font-size:10px"> @'+esc(m.mem?.username)+'</span></div><span class="'+(m.role==='admin'?'role-admin':'role-member')+'" style="font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600;background:'+(m.role==='admin'?'rgba(232,160,53,.15);color:var(--acc)':'var(--bg3);color:var(--fg3)')+'">'+m.role+'</span>'+(isAdmin&&m.user_id!==me.id?'<button class="bi" style="font-size:11px;color:var(--red)" onclick="removeFromGroup(\''+gid+'\',\''+m.user_id+'\')"><i class="fas fa-xmark"></i></button>':'')+'</div>').join('');const btns=[{t:'Close',cls:'bgc bsm',fn:()=>{}}];if(isCreator)btns.push({t:'Delete Group',cls:'bp bsm',st:'background:var(--red);color:#fff',fn:async()=>{await sb.from('groups').delete().eq('id',gid);closeModal();chatView={type:'group'};renderGroupsFull();toast('Deleted','ok')}});showModal(grp?.name||'Group',btns,true,'<p style="color:var(--fg2);font-size:12px;margin-bottom:12px">'+(esc(grp?.description)||'No description')+'</p><div style="max-height:240px;overflow-y:auto;border-top:1px solid var(--border);padding-top:8px">'+ml+'</div>')}
async function showAddMember(gid){showModal('Add Member',[{t:'Cancel',cls:'bgc bsm',fn:()=>{}}],true,'<div><label class="lbl">Username</label><input class="inp" id="addMemInp" placeholder="username"></div>');document.querySelector('[data-mi="0"]').onclick=async()=>{const un=document.getElementById('addMemInp')?.value.trim();if(!un)return;const{data:u}=await sb.from('profiles').select('*').ilike('username',un).limit(1);if(!u?.length){toast('Not found','er');return}if(u[0].id===me.id)return;const{data:ex}=await sb.from('group_members').select('user_id').eq('group_id',gid).eq('user_id',u[0].id).single();if(ex){toast('Already in group','er');return}await sb.from('group_members').insert({group_id:gid,user_id:u[0].id,role:'member'});closeModal();toast(u[0].username+' added!','ok');const a=document.getElementById('grpChatArea');if(a)loadGroupChat(a,gid)}}
async function removeFromGroup(gid,uid){await sb.from('group_members').delete().eq('group_id',gid).eq('user_id',uid);toast('Removed','ok');closeModal();const a=document.getElementById('grpChatArea');if(a)loadGroupChat(a,gid)}
async function renderGroupChat(){if(!chatView||chatView.type!=='group')return;const area=document.getElementById('chatArea');if(area){await sb.from('conversations').upsert({id:chatView.groupId},{onConflict:'id'});await loadGroupChat(area,chatView.groupId)}}

// ── EXPLORE & SETTINGS ──
async function loadExplore(){const el=document.getElementById('feedArea');if(!el)return;el.innerHTML='<div style="margin-bottom:18px"><h2 style="font-size:20px;font-weight:800;margin-bottom:12px">Explore</h2><input class="inp" placeholder="Search users..." id="exploreInp" oninput="doExplore(this.value)" style="padding:12px 16px;font-size:14px"></div><div id="exploreResults"></div>';const{data:users}=await sb.from('profiles').select('*').neq('id',me.id).order('created_at',{ascending:false}).limit(8);if(users?.length)document.getElementById('exploreResults').innerHTML='<h3 style="font-size:14px;font-weight:600;color:var(--fg2);margin-bottom:12px">Suggested</h3>'+users.map(u=>'<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser(\''+u.id+'\')"><img class="av" src="'+avUrl(u)+'" alt=""><div style="flex:1;min-width:0"><div class="un">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div>'+(u.bio?'<p style="font-size:11px;color:var(--fg2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(u.bio)+'</p>':'')+'</div><button class="fbtn nf" onclick="event.stopPropagation();toggleFollow(\''+u.id+'\')">Follow</button></div>').join('')}
async function doExplore(q){if(!q.trim()){loadExplore();return}const sq=sanitizeSearch(q);const{data:users}=await sb.from('profiles').select('*').or('username.ilike.%'+sq+'%,full_name.ilike.%'+sq+'%').neq('id',me.id).limit(20);const el=document.getElementById('exploreResults');if(!el)return;if(!users?.length){el.innerHTML='<div class="empty-s"><p>No users found</p></div>';return}el.innerHTML=users.map(u=>'<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser(\''+u.id+'\')"><img class="av" src="'+avUrl(u)+'" alt=""><div style="flex:1;min-width:0"><div class="un">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div></div><button class="fbtn nf" onclick="event.stopPropagation();toggleFollow(\''+u.id+'\')">Follow</button></div>').join('')}

async function goSettings(){chatView=null;view='settings';renderApp();const fp=document.getElementById('mainArea');fp.innerHTML='<div class="feed-pane"><div class="feed-center"><h2 style="font-size:20px;font-weight:800;margin-bottom:20px">Settings</h2><div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px"><h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Edit Profile</h3><div style="display:flex;align-items:center;gap:16px;margin-bottom:20px"><div class="avatar-upload" onclick="document.getElementById(\'avatarFileInput\').click()"><img class="av av-xl" id="avatarPreview" src="'+avUrl(myProf)+'" alt=""><div class="av-overlay"><i class="fas fa-camera" style="color:#fff;font-size:20px"></i></div></div><input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="previewAvatar(this)"><div style="flex:1"><p style="font-size:12px;color:var(--fg2)">Click avatar to upload</p></div></div><div style="margin-bottom:14px"><label class="lbl">Display Name</label><input class="inp" id="setName" value="'+esc(myProf?.full_name||'')+'" maxlength="50"></div><div style="margin-bottom:14px"><label class="lbl">Username</label><input class="inp" id="setUser" value="'+esc(myProf?.username||'')+'" maxlength="20" pattern="[a-zA-Z0-9_]+"></div><div style="margin-bottom:14px"><label class="lbl">Bio</label><textarea class="inp" id="setBio" maxlength="160" style="resize:none;min-height:60px;font-size:13px">'+esc(myProf?.bio||'')+'</textarea></div><div style="margin-bottom:14px"><label class="lbl">Status</label><select class="status-sel" id="setStatus"><option value="online" '+(myStatus==='online'?'selected':'')+'>Online</option><option value="idle" '+(myStatus==='idle'?'selected':'')+'>Idle</option><option value="dnd" '+(myStatus==='dnd'?'selected':'')+'>Do Not Disturb</option><option value="invisible" '+(myStatus==='invisible'?'selected':'')+'>Invisible</option></select></div><button class="bp" id="saveBtn" onclick="saveSettings()"><i class="fas fa-check"></i> Save Changes</button></div><div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px"><h3 style="font-size:15px;font-weight:700;margin-bottom:8px;color:var(--red)">Danger Zone</h3><p style="font-size:12px;color:var(--fg2);margin-bottom:14px">Sign out</p><button class="bgc" style="border-color:var(--red);color:var(--red)" onclick="handleLogout()"><i class="fas fa-right-from-bracket"></i> Sign Out</button></div></div></div>'}
let pendingAvatarFile=null;
function previewAvatar(input){const file=input.files[0];if(!file)return;if(file.size>2*1024*1024){toast('Max 2MB','er');input.value='';return}pendingAvatarFile=file;document.getElementById('avatarPreview').src=URL.createObjectURL(file)}
async function saveSettings(){const btn=document.getElementById('saveBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';const fn=document.getElementById('setName').value.trim();const un=document.getElementById('setUser').value.trim().toLowerCase();const bio=document.getElementById('setBio').value.trim();const status=document.getElementById('setStatus').value;let avu=myProf?.avatar_url||'';if(!un||!/^[a-zA-Z0-9_]+$/.test(un)){toast('Invalid username','er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';return}if(pendingAvatarFile){try{const ext=pendingAvatarFile.name.split('.').pop();const path=me.id+'/avatar.'+ext;const{error:upErr}=await sb.storage.from('avatars').upload(path,pendingAvatarFile,{upsert:true});if(upErr){toast('Upload failed: '+upErr.message,'er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';pendingAvatarFile=null;return}avu=sb.storage.from('avatars').getPublicUrl(path).data.publicUrl+'?t='+Date.now();pendingAvatarFile=null}catch(e){toast('Avatar error','er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';pendingAvatarFile=null;return}}try{await sb.from('profiles').update({full_name:fn,username:un,bio,avatar_url:avu,status}).eq('id',me.id);myProf={...myProf,full_name:fn,username:un,bio,avatar_url:avu,status};myStatus=status;toast('Saved!','ok');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';renderNav()}catch(e){toast(e.message,'er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes'}}

// ── ROUTING ──
function goFeed(){chatView=null;viewingUid=null;view='feed';dmOpen=true;renderApp()}
function goProfile(){chatView=null;viewingUid=null;view='profile';renderApp()}
function goExplore(){chatView=null;viewingUid=null;view='explore';dmOpen=true;renderApp()}
async function handleLogout(){await setUserStatus('offline');await sb.auth.signOut();me=null;myProf=null;chatView=null;view='feed';renderAuth()}

init();
</script>
</body>
