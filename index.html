// Utils
function toast(m,t='in'){const b=document.getElementById('toastBox'),e=document.createElement('div');e.className='toast '+t;e.textContent=m;b.appendChild(e);setTimeout(()=>e.remove(),3100)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function timeAgo(d){const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'d';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function defAv(n){const c=(n||'U').charAt(0).toUpperCase(),cols=['#e8a035','#e84057','#35c78a','#5b9ef5','#a77bdf','#e87835'],col=cols[(n||'U').charCodeAt(0)%cols.length];return"data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect width="80" height="80" rx="40" fill="'+col+'"/><text x="50%" y="54%" text-anchor="middle" dy=".1em" font-family="sans-serif" font-size="30" font-weight="700" fill="#fff">'+c+'</text></svg>')}

function sanitizeSearch(q){if(!q)return'';return q.replace(/[%_]/g,'\\$&')}
function playSound(f,f2,d){try{const c=new(window.AudioContext||window.webkitAudioContext)(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f2,t+d);g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+d+.1);o.start(t);o.stop(t+d+.1)}catch(e){}}

// DISCORD-LIKE RINGTONE ENGINE
function startDiscordRing() {
    stopDiscordRing();
    callAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let time = callAudioCtx.currentTime + 0.05;
    
    function scheduleRing(startTime) {
        const osc = callAudioCtx.createOscillator();
        const gain = callAudioCtx.createGain();
        osc.type = 'sine';
        osc.connect(gain);
        gain.connect(callAudioCtx.destination);
        
        // Ring 1
        osc.frequency.setValueAtTime(440, startTime);
        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(0.15, startTime + 0.01);
        gain.gain.setValueAtTime(0.15, startTime + 0.15);
        gain.gain.linearRampToValueAtTime(0, startTime + 0.2);
        
        // Pause
        osc.frequency.setValueAtTime(0, startTime + 0.4);
        gain.gain.setValueAtTime(0, startTime + 0.4);
        
        // Ring 2
        osc.frequency.setValueAtTime(523.25, startTime + 0.6);
        gain.gain.linearRampToValueAtTime(0.15, startTime + 0.61);
        gain.gain.setValueAtTime(0.15, startTime + 0.75);
        gain.gain.linearRampToValueAtTime(0, startTime + 0.8);
        
        osc.start(startTime);
        osc.stop(startTime + 1.5);
        return startTime + 2.0; // Total loop time
    }

    let nextTime = time;
    function loop() {
        if (!inCall) return;
        nextTime = scheduleRing(nextTime);
        setTimeout(loop, 1800);
    }
    loop();
}

function stopDiscordRing() {
    if (callAudioCtx) {
        callAudioCtx.close().catch(()=>{});
        callAudioCtx = null;
    }
}

// Safe Feed Loading
async function loadFeed(){
    const el = document.getElementById('feedArea');
    el.innerHTML = '<div style="text-align:center;padding:40px"><span class="spinner" style="width:28px"></span></div>';
    try {
        const {data: posts, error} = await sb.from('posts').select('id, user_id, content, image_url, video_url, created_at').order('created_at', {ascending: false}).limit(50);
        if (error) throw error;
        if (!posts?.length) { el.innerHTML = '<div class="empty-s"><i class="fas fa-feather-pointed"></i><p>No posts yet</p></div>'; return; }
        const uids = [...new Set(posts.map(p => p.user_id))];
        const {data: profs} = await sb.from('profiles').select('*').in('id', uids);
        const pids = posts.map(p => p.id);
        let likeMap={}, cmtMap={}, bkMap={}, pollMap={};
        if(me){const{data: lks} = await sb.from('likes').select('post_id').eq('user_id', me.id).in('post_id', pids);(lks||[]).forEach(l => likeMap[l.post_id] = true);const{data: bks} = await sb.from('bookmarks').select('post_id').eq('user_id', me.id).in('post_id', pids);(bks||[]).forEach(b => bkMap[b.post_id] = true)}
        const {data: allLks} = await sb.from('likes').select('post_id').in('post_id', pids);let lc={}; (allLks||[]).forEach(l => { lc[l.post_id] = (lc[l.post_id]||0) + 1; });
        const {data: cmts} = await sb.from('comments').select('post_id').in('post_id', pids);let cc={}; (cmts||[]).forEach(c => { cc[c.post_id] = (cc[c.post_id]||0) + 1; });
        const {data: polls} = await sb.from('polls').select('*').in('post_id', pids);
        if(polls?.length){const pollIds = polls.map(p=>p.id);const {data: opts} = await sb.from('poll_options').select('*').in('poll_id', pollIds);const optIds = opts.map(o=>o.id);const {data: votes} = await sb.from('poll_votes').select('option_id, user_id').in('option_id', optIds);polls.forEach(poll => {let myVotes = new Set();(votes||[]).filter(v=>v.user_id===me.id).forEach(v=>myVotes.add(v.option_id));poll.options = (opts||[]).filter(o=>o.poll_id===poll.id).map(o=>({...o, voted: myVotes.has(o.id)}));poll.totalVotes = poll.options.reduce((a,o)=>a+o.votes, 0)});polls.forEach(p => pollMap[p.post_id] = p)}
        const profMap = {}; (profs||[]).forEach(p => profMap[p.id] = p);
        renderPosts(posts.map(p => ({...p, profile: profMap[p.user_id] || {username:'user'}, liked: !!likeMap[p.id], likeCount: lc[p.id]||0, commentCount: cc[p.id]||0, bookmarked: !!bkMap[p.id], poll: pollMap[p.id]})));
    } catch(e) { console.error(e); el.innerHTML = '<div class="empty-s"><i class="fas fa-exclamation-triangle"></i><p>Failed to load feed</p></div>'; }
}

async function loadUserPosts(uid, isOwn){
    const el = document.getElementById('feedArea'); if(!el) return;
    el.innerHTML = '<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';
    try {
        const {data: posts} = await sb.from('posts').select('id, user_id, content, image_url, video_url, created_at').eq('user_id', uid).order('created_at', {ascending: false}).limit(50);
        const {data: profs} = await sb.from('profiles').select('*').eq('id', uid); const pids = posts.map(p => p.id);
        let likeMap={}, lc={}, cc={}, bkMap={}, pollMap={};
        if(me){const{data:lks}=await sb.from('likes').select('post_id').eq('user_id',me.id).in('post_id',pids);(lks||[]).forEach(l=>likeMap[l.post_id]=true);const{data:bks}=await sb.from('bookmarks').select('post_id').eq('user_id',me.id).in('post_id',pids);(bks||[]).forEach(b=>bkMap[b.post_id]=true)}
        const{data:allLks}=await sb.from('likes').select('post_id').in('post_id',pids);(allLks||[]).forEach(l=>{lc[l.post_id]=(lc[l.post_id]||0)+1});
        const{data:cmts}=await sb.from('comments').select('post_id').in('post_id',pids);(cmts||[]).forEach(c=>{cc[c.post_id]=(cc[c.post_id]||0)+1});
        const{data:polls}=await sb.from('polls').select('*').in('post_id',pids);
        if(polls?.length){const pollIds=polls.map(p=>p.id);const{data:opts}=await sb.from('poll_options').select('*').in('poll_id',pollIds);const optIds=opts.map(o=>o.id);const{data:votes}=await sb.from('poll_votes').select('option_id,user_id').in('option_id',optIds);polls.forEach(poll=>{let myVotes=new Set();(votes||[]).filter(v=>v.user_id===me.id).forEach(v=>myVotes.add(v.option_id));poll.options=(opts||[]).filter(o=>o.poll_id===poll.id).map(o=>({...o,voted:myVotes.has(o.id)}));poll.totalVotes=poll.options.reduce((a,o)=>a+o.votes,0)});polls.forEach(p=>pollMap[p.post_id]=p)}
        const profMap={};(profs||[]).forEach(p=>profMap[p.id]=p);
        renderPosts(posts.map(p=>({...p,profile:profMap[p.user_id]||{username:'user'},liked:!!likeMap[p.id],likeCount:lc[p.id]||0,commentCount:cc[p.id]||0,bookmarked:!!bkMap[p.id],poll:pollMap[p.id]})));
        if(isOwn)loadProfStats(uid);
    } catch(e) { console.error(e); }
}

function renderPosts(posts){
    const el=document.getElementById('feedArea'); if(!el)return;
    if(!posts.length){el.innerHTML='<div class="empty-s"><p>No posts yet</p></div>';return}
    el.innerHTML=posts.map(p=>{
        let pollHtml='';
        if(p.poll){const poll=p.poll;pollHtml='<div class="poll-box"><p style="font-weight:600;margin-bottom:8px;font-size:13px">'+esc(poll.question)+'</p>'+(poll.options||[]).map(o=>{const pct=poll.totalVotes?Math.round(o.votes/poll.totalVotes*100):0;return '<div class="poll-opt" onclick="votePoll(\''+o.id+'\',\''+poll.id+'\')"><div class="poll-fill" style="width:'+(o.voted?pct:0)+'%;background:'+(o.voted?'var(--acc)':'var(--acc-s)')+'"></div><div class="poll-txt"><span>'+esc(o.text)+(o.voted?' <i class="fas fa-check" style="color:var(--acc);font-size:10px"></i>':'')+'</span><span style="color:var(--fg2);font-size:11px">'+pct+'%</span></div></div>'}).join('')+'<p style="font-size:11px;color:var(--fg2);margin-top:6px">'+poll.totalVotes+' votes</p></div>'}
        let mediaHtml='';
        if(p.image_url)mediaHtml+='<img class="post-img" src="'+p.image_url+'" alt="" onclick="lightbox(\''+p.image_url+'\')" loading="lazy" onerror="this.style.display=\'none\'">';
        if(p.video_url)mediaHtml+='<video class="post-vid" src="'+p.video_url+'" controls preload="metadata" onerror="this.style.display=\'none\'"></video>';
        return '<article class="post"><div style="display:flex;gap:10px"><div style="position:relative"><img class="av" src="'+avUrl(p.profile)+'" alt="" onclick="viewUser(\''+p.user_id+'\')" style="cursor:pointer"><div class="av-status status-'+(p.profile?.status==='invisible'?'offline':p.profile?.status||'offline')+'"></div></div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span class="un" onclick="viewUser(\''+p.user_id+'\')">'+esc(p.profile?.full_name||p.profile?.username)+'</span><span class="hd">@'+esc(p.profile?.username)+'</span><span class="ts"> · '+timeAgo(p.created_at)+'</span>'+(me&&me.id===p.user_id?'<button class="bi" style="margin-left:auto;font-size:12px" onclick="delPost(\''+p.id+'\')"><i class="fas fa-trash-can"></i></button>':'')+'</div><div class="pb">'+esc(p.content)+'</div>'+mediaHtml+pollHtml+'<div class="pa"><button class="ab '+(p.liked?'lk':'')+'" onclick="toggleLike(\''+p.id+'\',this)"><i class="fas fa-heart"></i> <span>'+(p.likeCount||'')+'</span></button><button class="ab" onclick="toggleCmt(\''+p.id+'\')"><i class="fas fa-comment"></i> <span>'+(p.commentCount||'')+'</span></button><button class="ab '+(p.bookmarked?'lk':'')+'" onclick="toggleBookmark(\''+p.id+'\',this)"><i class="fas fa-bookmark"></i></button><button class="ab" onclick="sharePost(\''+p.id+'\')"><i class="fas fa-share-from-square"></i></button></div><div class="cmt-sec" id="cmt-'+p.id+'" style="display:none"></div></div></div></article>'
    }).join('');
}

async function votePoll(oid,pid){if(!me)return;try{const{data:ex}=await sb.from('poll_votes').select('option_id,poll_options(poll_id)').eq('user_id',me.id).eq('option_id',oid).single();if(ex){await sb.from('poll_votes').delete().eq('user_id',me.id).eq('option_id',oid)}else{const{data:myVotes}=await sb.from('poll_votes').select('option_id,poll_options(poll_id)').eq('user_id',me.id);const samePoll=(myVotes||[]).filter(v=>v.poll_options?.poll_id===pid);if(samePoll.length)await sb.from('poll_votes').delete().in('option_id',samePoll.map(v=>v.option_id));await sb.from('poll_votes').insert({user_id:me.id,option_id:oid});await sb.from('poll_options').update({votes:ex?0:1}).eq('id',oid)}if(view==='feed')loadFeed();else loadUserPosts(viewingUid||me.id)}catch(e){toast('Failed','er')}}

async function loadDMList(){try{const{data:parts}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',me.id);if(!parts?.length){const el=document.getElementById('dmListFull')||document.getElementById('dmList');if(el)el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px">No conversations yet</p></div>';return}const cids=parts.map(p=>p.conversation_id);const{data:otherParts}=await sb.from('conversation_participants').select('conversation_id,user_id,peer:profiles!user_id(username,full_name,avatar_url,status)').in('conversation_id',cids).neq('user_id',me.id);const{data:msgs}=await sb.from('messages').select('*').in('conversation_id',cids).order('created_at',{ascending:false});const lastMsg={};msgs?.forEach(m=>{if(!lastMsg[m.conversation_id])lastMsg[m.conversation_id]=m});const convMap={};(otherParts||[]).forEach(p=>{convMap[p.conversation_id]=p});const list=parts.map(p=>{const o=convMap[p.conversation_id],l=lastMsg[p.conversation_id];if(!o)return null;return{cid:p.conversation_id,peer:o,last:l}}).filter(Boolean).sort((a,b)=>new Date(b.last?.created_at||0)-new Date(a.last?.created_at||0));const el=document.getElementById('dmListFull')||document.getElementById('dmList');if(!el)return;el.innerHTML=list.map(c=>'<div class="dm-item '+(chatView?.convId===c.cid?'on':'')+'" onclick="openDM(\''+c.cid+'\',\''+c.peer.user_id+'\')"><div style="position:relative"><img class="av av-s" src="'+avUrl(c.peer.peer)+'" alt=""><div class="av-status status-'+(c.peer.peer?.status==='invisible'?'offline':c.peer.peer?.status||'offline')+'" style="width:10px;height:10px;bottom:-2px;right:-2px;border-width:2px"></div></div><div style="min-width:0;flex:1"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(c.peer.peer?.full_name||c.peer.peer?.username)+'</div><div class="hd" style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(c.last?esc(c.last.content):'No messages')+'</div></div>'+(c.last?'<span class="ts">'+timeAgo(c.last.created_at)+'</span>':'')+'</div>').join('')}catch(e){}}
function searchDMUsers(q){if(!q.trim())return loadDMList();const sq=sanitizeSearch(q);sb.from('profiles').select('*').or('username.ilike.%'+sq+'%,full_name.ilike.%'+sq+'%').neq('id',me.id).limit(10).then(({data})=>{const el=document.getElementById('dmListFull')||document.getElementById('dmList');if(!el||!data?.length){if(el)el.innerHTML='<div style="padding:12px;color:var(--fg2);font-size:12px;text-align:center">No users found</div>';return}el.innerHTML=data.map(u=>'<div class="dm-item" onclick="startDMWith(\''+u.id+'\')"><img class="av av-s" src="'+avUrl(u)+'" alt=""><div><div style="font-weight:600;font-size:13px">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div></div></div>').join('')})}

async function loadDMChat(area,cid,peerId){const peer=await getProf(peerId);area.innerHTML='<div class="chat-header"><button class="bi" onclick="chatView={type:\'dm\'};renderDMFull()"><i class="fas fa-arrow-left"></i></button><div style="position:relative"><img class="av" src="'+avUrl(peer)+'" alt=""><div class="av-status status-'+(peer.status==='invisible'?'offline':peer.status||'offline')+'"></div></div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px">'+esc(peer.full_name||peer.username)+'</div><div class="hd" style="font-size:10px">@'+esc(peer.username)+'</div></div><button class="bi" onclick="startCall(false)"><i class="fas fa-phone"></i></button><button class="bi" onclick="startCall(true)"><i class="fas fa-video"></i></button></div><div class="chat-messages" id="chatMsgs"></div><div class="chat-input-bar"><input class="inp" id="chatInp" placeholder="Type a message..." onkeydown="if(event.key===\'Enter\')sendMsg()"><button class="bp bsm" onclick="sendMsg()" style="padding:8px 14px"><i class="fas fa-paper-plane"></i></button></div>';loadMessages();document.getElementById('chatInp')?.focus()}

// UNIFIED SEND MESSAGE (FIX FOR DMs & GROUPS)
async function sendMsg(){
    if(!chatView)return;
    const inp=document.getElementById('chatInp');
    if(!inp||!inp.value.trim())return;
    const cid = chatView.type==='dm' ? chatView.convId : chatView.groupId;
    const text = inp.value.trim();
    inp.value = ''; // Clear immediately for snappy UI
    
    try {
        const {error} = await sb.from('messages').insert({
            conversation_id: cid,
            sender_id: me.id,
            content: text
        });
        if(error) throw error;
        playSound(880,520,.08);
        loadMessages(); // Refresh chat
    } catch(e) {
        toast('Failed to send: ' + e.message, 'er');
        inp.value = text; // Put text back on failure
    }
}

// Messages, Reactions, Pins
async function loadMessages(){if(!chatView)return;const cid=chatView.type==='dm'?chatView.convId:chatView.groupId;try{const{data:msgs}=await sb.from('messages').select('*,sender:profiles!sender_id(username,full_name,avatar_url),message_reactions(emoji, user_id)').eq('conversation_id',cid).order('created_at',{ascending:true}).limit(100);const el=document.getElementById('chatMsgs');if(!el)return;if(!msgs?.length){el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px">No messages yet. Say hello!</p></div>';return}let html='',lastDate='';const pinned=msgs.filter(m=>m.is_pinned);if(pinned.length&&chatView.type==='group')html+='<div class="pinned-bar" onclick="showPinned(\''+cid+'\')"><i class="fas fa-thumbtack"></i> '+pinned.length+' Pinned Message'+(pinned.length>1?'s':'')+'</div>';msgs.forEach(m=>{const d=new Date(m.created_at).toLocaleDateString();if(d!==lastDate){lastDate=d;html+='<div class="msg-date-divider"><span>'+(d===new Date().toLocaleDateString()?'Today':d)+'</span></div>'}const isMe=m.sender_id===me.id;const reactions={};(m.message_reactions||[]).forEach(r=>{if(!reactions[r.emoji])reactions[r.emoji]={count:0,active:false};reactions[r.emoji].count++;if(r.user_id===me.id)reactions[r.emoji].active=true});const reactHtml=Object.keys(reactions).length?'<div class="msg-reactions">'+Object.entries(reactions).map(([e,d])=>'<span class="reaction-pill '+(d.active?'active':'')+'" onclick="toggleReaction(\''+m.id+'\',\''+e+'\')">'+e+' '+d.count+'</span>').join('')+'</div>':'';html+='<div class="msg-wrap '+(isMe?'self':'')+'"><div class="msg-bubble '+(isMe?'msg-self':'msg-other')+'"><div class="msg-actions"><button class="msg-act" onclick="showReactMenu(event,\''+m.id+'\')"><i class="fas fa-face-smile"></i></button>'+(chatView.type==='group'?'<button class="msg-act" onclick="pinMsg(\''+m.id+'\')"><i class="fas fa-thumbtack"></i></button>':'')+'</div><div style="font-size:11px;font-weight:600;color:var(--acc);margin-bottom:2px">'+(isMe?'You':esc(m.sender?.username||'user'))+'</div><div>'+esc(m.content)+'</div><div class="msg-meta">'+timeAgo(m.created_at)+(m.is_pinned?' <i class="fas fa-thumbtack" style="font-size:9px;color:var(--acc)"></i>':'')+'</div>'+reactHtml+'</div></div>'});el.innerHTML=html;el.scrollTop=el.scrollHeight}catch(e){}}
async function toggleReaction(mid,emoji){try{const{data:ex}=await sb.from('message_reactions').select('user_id').eq('message_id',mid).eq('user_id',me.id).eq('emoji',emoji).single();if(ex)await sb.from('message_reactions').delete().eq('message_id',mid).eq('user_id',me.id).eq('emoji',emoji);else await sb.from('message_reactions').insert({message_id:mid,user_id:me.id,emoji});loadMessages()}catch(e){}}
function showReactMenu(e,mid){e.stopPropagation();document.getElementById('reactMenu')?.remove();const menu=document.createElement('div');menu.id='reactMenu';menu.style.cssText='position:fixed;z-index:250;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px;display:flex;gap:4px;box-shadow:0 8px 24px rgba(0,0,0,.6);left:'+e.clientX+'px;top:'+e.clientY+'px';['👍','❤️','😂','🔥','👀','😮'].forEach(em=>{const b=document.createElement('button');b.style.cssText='background:none;border:none;font-size:20px;cursor:pointer;padding:4px;border-radius:6px';b.textContent=em;b.onmouseover=()=>b.style.background='var(--acc-s)';b.onmouseout=()=>b.style.background='none';b.onclick=()=>{toggleReaction(mid,em);menu.remove()};menu.appendChild(b)});document.body.appendChild(menu);setTimeout(()=>document.addEventListener('click',function rm(){menu.remove();document.removeEventListener('click',rm)}),10)}
async function pinMsg(mid){try{const{data:m}=await sb.from('messages').select('is_pinned').eq('id',mid).single();await sb.from('messages').update({is_pinned:!m.is_pinned}).eq('id',mid);toast(m.is_pinned?'Unpinned':'Pinned!','ok');loadMessages()}catch(e){}}

function renderGroupsFull(){document.getElementById('mainArea').innerHTML='<div style="display:flex;width:100%;height:100%"><div style="width:300px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0"><div style="padding:14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)"><button class="bi" onclick="chatView=null;renderApp()"><i class="fas fa-arrow-left"></i></button><h3 style="font-size:15px;font-weight:700">Groups</h3><button class="bi" style="margin-left:auto" onclick="createGroupModal()"><i class="fas fa-plus"></i></button></div><div class="dm-list" id="grpList"></div></div><div id="grpChatArea" style="flex:1;display:flex;flex-direction:column;background:var(--bg)"><div class="empty-s" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center"><i class="fas fa-users"></i><p style="font-weight:600;margin-bottom:4px">Your Groups</p></div></div></div>';loadGroupList()}
async function loadGroupList(){const{data:mems}=await sb.from('group_members').select('group_id,role,groups(id,name,description,created_at)').eq('user_id',me.id);const el=document.getElementById('grpList');if(!el)return;if(!mems?.length){el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px">No groups yet</p></div>';return}el.innerHTML=mems.sort((a,b)=>new Date(b.groups?.created_at||0)-new Date(a.groups?.created_at||0)).map(m=>'<div class="dm-item '+(chatView?.groupId===m.group_id?'on':'')+'" onclick="openGroup(\''+m.group_id+'\')"><div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,rgba(232,160,53,.2),rgba(167,123,223,.2));display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-users" style="font-size:13px;color:var(--acc)"></i></div><div style="min-width:0;flex:1"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(m.groups?.name)+'</div><div class="hd" style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(esc(m.groups?.description)||'No description')+'</div></div>'+(m.role==='admin'?'<span class="role-admin" style="font-size:9px">Admin</span>':'')+'</div>').join('')}
async function createGroupModal(){showModal('Create Group',[{t:'Cancel',cls:'bgc bsm',fn:()=>{}},{t:'Create',cls:'bp bsm',fn:()=>{}}],true,'<div style="margin-bottom:14px"><label class="lbl">Group Name</label><input class="inp" id="newGrpName" placeholder="My Group" maxlength="40"></div><div><label class="lbl">Description</label><input class="inp" id="newGrpDesc" placeholder="About this group" maxlength="100"></div>');document.querySelector('[data-mi="1"]').onclick=async()=>{const n=document.getElementById('newGrpName')?.value.trim();if(!n){toast('Name required','er');return}const d=document.getElementById('newGrpDesc')?.value.trim()||'';const{data:g}=await sb.from('groups').insert({name:n,description:d,created_by:me.id}).select().single();await sb.from('group_members').insert({group_id:g.id,user_id:me.id,role:'admin'});await sb.from('conversations').upsert({id:g.id},{onConflict:'id'});closeModal();toast('Group created!','ok');loadGroupList();openGroup(g.id)}}
async function openGroup(gid){chatView={type:'group',groupId:gid};unreadGroups=0;renderNav();await sb.from('conversations').upsert({id:gid},{onConflict:'id'});const area=document.getElementById('grpChatArea');if(area){area.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';loadGroupChat(area,gid)}else{renderGroupsFull();setTimeout(()=>{const a=document.getElementById('grpChatArea');if(a)loadGroupChat(a,gid)},50)}loadGroupList()}
async function loadGroupChat(area,gid){const{data:grp}=await sb.from('groups').select('*').eq('id',gid).single();const{data:mems}=await sb.from('group_members').select('user_id,role,mem:profiles!user_id(username,full_name,avatar_url)').eq('group_id',gid);const isAdmin=mems?.some(m=>m.user_id===me.id&&m.role==='admin');area.innerHTML='<div class="chat-header"><button class="bi" onclick="chatView={type:\'group\'};renderGroupsFull()"><i class="fas fa-arrow-left"></i></button><div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,rgba(232,160,53,.2),rgba(167,123,223,.2));display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-users" style="font-size:13px;color:var(--acc)"></i></div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(grp?.name)+'</div><div class="hd" style="font-size:10px">'+(mems?.length||0)+' members</div></div><button class="bi" onclick="startCall(false)"><i class="fas fa-phone"></i></button><button class="bi" onclick="showGroupInfo(\''+gid+'\')"><i class="fas fa-circle-info"></i></button>'+(isAdmin?'<button class="bi" onclick="showAddMember(\''+gid+'\')"><i class="fas fa-user-plus"></i></button>':'')+'</div><div class="chat-messages" id="chatMsgs"></div><div class="chat-input-bar"><input class="inp" id="chatInp" placeholder="Message the group..." onkeydown="if(event.key===\'Enter\')sendMsg()"><button class="bp bsm" onclick="sendMsg()" style="padding:8px 14px"><i class="fas fa-paper-plane"></i></button></div>';loadMessages();document.getElementById('chatInp')?.focus()}
async function showGroupInfo(gid){const{data:grp}=await sb.from('groups').select('*').eq('id',gid).single();const{data:mems}=await sb.from('group_members').select('user_id,role,mem:profiles!user_id(username,full_name,avatar_url)').eq('group_id',gid);const isAdmin=mems?.some(m=>m.user_id===me.id&&m.role==='admin'),isCreator=grp?.created_by===me.id;const ml=(mems||[]).map(m=>'<div class="grp-member"><img class="av av-s" src="'+avUrl(m.mem)+'" alt=""><div style="flex:1"><span class="un" style="font-size:12px" onclick="closeModal();viewUser(\''+m.user_id+'\')">'+esc(m.mem?.full_name||m.mem?.username)+'</span><span class="hd" style="font-size:10px"> @'+esc(m.mem?.username)+'</span></div><span class="'+(m.role==='admin'?'role-admin':'role-member')+'">'+m.role+'</span>'+(isAdmin&&m.user_id!==me.id?'<button class="bi" style="font-size:11px;color:var(--red)" onclick="removeFromGroup(\''+gid+'\',\''+m.user_id+'\')"><i class="fas fa-xmark"></i></button>':'')+'</div>').join('');const btns=[{t:'Close',cls:'bgc bsm',fn:()=>{}}];if(isCreator)btns.push({t:'Delete Group',cls:'bp bsm',st:'background:var(--red);color:#fff',fn:async()=>{await sb.from('groups').delete().eq('id',gid);closeModal();chatView={type:'group'};renderGroupsFull();toast('Deleted','ok')}});else if(isAdmin)btns.push({t:'Leave',cls:'bgc bsm',st:'border-color:var(--red);color:var(--red)',fn:async()=>{await sb.from('group_members').delete().eq('group_id',gid).eq('user_id',me.id);closeModal();chatView={type:'group'};renderGroupsFull()}});showModal(grp?.name||'Group',btns,true,'<p style="color:var(--fg2);font-size:12px;margin-bottom:12px">'+(esc(grp?.description)||'No description')+'</p><div style="max-height:240px;overflow-y:auto;border-top:1px solid var(--border);padding-top:8px">'+ml+'</div>')}
async function showAddMember(gid){showModal('Add Member',[{t:'Cancel',cls:'bgc bsm',fn:()=>{}}],true,'<div><label class="lbl">Username</label><input class="inp" id="addMemInp" placeholder="username"></div>');document.querySelector('[data-mi="0"]').onclick=async()=>{const un=document.getElementById('addMemInp')?.value.trim();if(!un)return;const{data:u}=await sb.from('profiles').select('*').ilike('username',un).limit(1);if(!u?.length){toast('Not found','er');return}if(u[0].id===me.id)return;const{data:ex}=await sb.from('group_members').select('user_id').eq('group_id',gid).eq('user_id',u[0].id).single();if(ex){toast('Already in group','er');return}await sb.from('group_members').insert({group_id:gid,user_id:u[0].id,role:'member'});closeModal();toast(u[0].username+' added!','ok');const a=document.getElementById('grpChatArea');if(a)loadGroupChat(a,gid)}}
async function removeFromGroup(gid,uid){await sb.from('group_members').delete().eq('group_id',gid).eq('user_id',uid);toast('Removed','ok');closeModal();const a=document.getElementById('grpChatArea');if(a)loadGroupChat(a,gid)}
async function showAddMember(gid){
    showModal('Add Member',[
        {t:'Cancel', cls:'bgc bsm', fn:()=>{ closeModal(); }},
        {t:'Add Member', cls:'bp bsm', fn:()=>{}}
    ], true, 
    '<div style="margin-bottom:12px"><label class="lbl">Username</label><input class="inp" id="addMemInp" placeholder="Enter username..." onkeydown="if(event.key===\'Enter\')document.querySelector(\'[data-mi=\\\'1\\\']\').click()"></div><p style="font-size:11px;color:var(--fg2)">Search by username to add a member</p>'
    );
    
    // Assign handler to the "Add Member" button (index 1)
    document.querySelector('[data-mi="1"]').onclick = async() => {
        const un = document.getElementById('addMemInp')?.value.trim().toLowerCase();
        if(!un) {
            toast('Please enter a username', 'er');
            return;
        }
        
        try {
            // Use proper ilike with wildcards for partial matching
            const {data: u, error: searchErr} = await sb.from('profiles')
                .select('*')
                .ilike('username', '%' + un + '%')
                .neq('id', me.id)
                .limit(5);
            
            if(searchErr) throw searchErr;
            
            if(!u || u.length === 0) {
                toast('User not found', 'er');
                return;
            }
            
            // If multiple matches, try exact match first
            let targetUser = u.find(user => user.username.toLowerCase() === un) || u[0];
            
            if(targetUser.id === me.id) {
                toast('Cannot add yourself', 'er');
                return;
            }
            
            // Check if already in group
            const {data: ex, error: checkErr} = await sb.from('group_members')
                .select('user_id')
                .eq('group_id', gid)
                .eq('user_id', targetUser.id)
                .maybeSingle();
            
            if(checkErr) throw checkErr;
            
            if(ex) {
                toast(targetUser.username + ' is already in the group', 'er');
                return;
            }
            
            // Add to group
            const {error: insertErr} = await sb.from('group_members')
                .insert({group_id: gid, user_id: targetUser.id, role: 'member'});
            
            if(insertErr) throw insertErr;
            
            closeModal();
            toast(targetUser.username + ' added to group!', 'ok');
            
            // Refresh the group chat
            const a = document.getElementById('grpChatArea');
            if(a) await loadGroupChat(a, gid);
            loadGroupList();
            
        } catch(e) {
            console.error('Add member error:', e);
            toast('Failed to add member: ' + (e.message || 'Unknown error'), 'er');
        }
    };
}
// Explore
async function loadExplore(){const el=document.getElementById('feedArea');if(!el)return;el.innerHTML='<div style="margin-bottom:18px"><h2 style="font-size:20px;font-weight:800;margin-bottom:12px">Explore</h2><input class="inp" placeholder="Search users..." id="exploreInp" oninput="doExplore(this.value)" style="padding:12px 16px;font-size:14px"></div><div id="exploreResults"></div>';const{data:users}=await sb.from('profiles').select('*').neq('id',me.id).order('created_at',{ascending:false}).limit(8);if(users?.length)document.getElementById('exploreResults').innerHTML='<h3 style="font-size:14px;font-weight:600;color:var(--fg2);margin-bottom:12px">Suggested</h3>'+users.map(u=>'<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser(\''+u.id+'\')"><div style="position:relative"><img class="av" src="'+avUrl(u)+'" alt=""><div class="av-status status-'+(u.status==='invisible'?'offline':u.status||'offline')+'" style="width:10px;height:10px;bottom:0;right:0"></div></div><div style="flex:1;min-width:0"><div class="un">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div>'+(u.bio?'<p style="font-size:11px;color:var(--fg2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(u.bio)+'</p>':'')+'</div><button class="fbtn nf" onclick="event.stopPropagation();toggleFollow(\''+u.id+'\')">Follow</button></div>').join('')}
async function doExplore(q){if(!q.trim()){loadExplore();return}const sq=sanitizeSearch(q);const{data:users}=await sb.from('profiles').select('*').or('username.ilike.%'+sq+'%,full_name.ilike.%'+sq+'%').neq('id',me.id).limit(20);const el=document.getElementById('exploreResults');if(!el)return;if(!users?.length){el.innerHTML='<div class="empty-s"><p>No users found</p></div>';return}el.innerHTML=users.map(u=>'<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser(\''+u.id+'\')"><img class="av" src="'+avUrl(u)+'" alt=""><div style="flex:1;min-width:0"><div class="un">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div></div><button class="fbtn nf" onclick="event.stopPropagation();toggleFollow(\''+u.id+'\')">Follow</button></div>').join('')}

// Settings
async function goSettings(){chatView=null;view='settings';renderApp();const fp=document.getElementById('mainArea');fp.innerHTML='<div class="feed-pane"><div class="feed-center"><h2 style="font-size:20px;font-weight:800;margin-bottom:20px">Settings</h2><div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px"><h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Edit Profile</h3><div style="display:flex;align-items:center;gap:16px;margin-bottom:20px"><div class="avatar-upload" onclick="document.getElementById(\'avatarFileInput\').click()"><img class="av av-xl" id="avatarPreview" src="'+avUrl(myProf)+'" alt=""><div class="av-overlay"><i class="fas fa-camera" style="color:#fff;font-size:20px"></i></div></div><input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="previewAvatar(this)"><div style="flex:1"><p style="font-size:12px;color:var(--fg2)">Click avatar to upload</p><p style="font-size:11px;color:var(--border);margin-top:2px">JPG, PNG — max 2MB</p></div></div><div style="margin-bottom:14px"><label class="lbl">Display Name</label><input class="inp" id="setName" value="'+esc(myProf?.full_name||'')+'" maxlength="50"></div><div style="margin-bottom:14px"><label class="lbl">Username</label><input class="inp" id="setUser" value="'+esc(myProf?.username||'')+'" maxlength="20" pattern="[a-zA-Z0-9_]+"></div><div style="margin-bottom:14px"><label class="lbl">Bio</label><textarea class="inp" id="setBio" maxlength="160" style="resize:none;min-height:60px;font-size:13px">'+esc(myProf?.bio||'')+'</textarea></div><div style="margin-bottom:14px"><label class="lbl">Status</label><select class="status-sel" id="setStatus"><option value="online" '+(myStatus==='online'?'selected':'')+'>Online</option><option value="idle" '+(myStatus==='idle'?'selected':'')+'>Idle</option><option value="dnd" '+(myStatus==='dnd'?'selected':'')+'>Do Not Disturb</option><option value="invisible" '+(myStatus==='invisible'?'selected':'')+'>Invisible</option></select></div><button class="bp" id="saveBtn" onclick="saveSettings()"><i class="fas fa-check"></i> Save Changes</button></div><div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px"><h3 style="font-size:15px;font-weight:700;margin-bottom:8px;color:var(--red)">Danger Zone</h3><p style="font-size:12px;color:var(--fg2);margin-bottom:14px">Sign out of your account</p><button class="bgc" style="border-color:var(--red);color:var(--red)" onclick="handleLogout()"><i class="fas fa-right-from-bracket"></i> Sign Out</button></div></div></div>'}
let pendingAvatarFile=null;
function previewAvatar(input){const file=input.files[0];if(!file)return;if(file.size>2*1024*1024){toast('Max 2MB for avatar','er');input.value='';return}pendingAvatarFile=file;document.getElementById('avatarPreview').src=URL.createObjectURL(file)}
async function saveSettings(){const btn=document.getElementById('saveBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';const fn=document.getElementById('setName').value.trim();const un=document.getElementById('setUser').value.trim().toLowerCase();const bio=document.getElementById('setBio').value.trim();const status=document.getElementById('setStatus').value;let avu=myProf?.avatar_url||'';if(!un||!/^[a-zA-Z0-9_]+$/.test(un)){toast('Invalid username','er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';return}if(pendingAvatarFile){try{toast('Uploading avatar...','in');const ext=pendingAvatarFile.name.split('.').pop();const path=me.id+'/avatar.'+ext;const{error:upErr}=await sb.storage.from('avatars').upload(path,pendingAvatarFile,{upsert:true});if(upErr){toast('Upload failed: '+upErr.message,'er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';pendingAvatarFile=null;return}avu=sb.storage.from('avatars').getPublicUrl(path).data.publicUrl+'?t='+Date.now();pendingAvatarFile=null}catch(e){toast('Avatar error','er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';pendingAvatarFile=null;return}}try{await sb.from('profiles').update({full_name:fn,username:un,bio,avatar_url:avu,status}).eq('id',me.id);myProf={...myProf,full_name:fn,username:un,bio,avatar_url:avu,status};myStatus=status;toast('Saved!','ok');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';renderNav()}catch(e){toast(e.message,'er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes'}}
