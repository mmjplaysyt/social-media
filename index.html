:root{--bg:#09090b;--bg2:#0f0f13;--card:#16161c;--border:#27273a;--fg:#f0eeea;--fg2:#9090a8;--acc:#e8a035;--acc-h:#f0b855;--acc-s:rgba(232,160,53,.08);--red:#e84057;--grn:#35c78a;--pur:#a77bdf}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;color:inherit}
html{background:var(--bg)}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

.toast-box{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;background:var(--card);border:1px solid var(--border);box-shadow:0 8px 28px rgba(0,0,0,.6);animation:tI .3s ease,tO .3s 2.7s forwards;max-width:340px;pointer-events:auto;color:var(--fg)}
.toast.ok{border-left:3px solid var(--grn)}.toast.er{border-left:3px solid var(--red)}.toast.in{border-left:3px solid var(--acc)}
@keyframes tI{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes tO{to{transform:translateX(100%);opacity:0}}
.inp{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--acc)}.inp::placeholder{color:#606078}
.lbl{display:block;font-size:11px;font-weight:600;color:var(--fg2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.bp{background:var(--acc);color:#09090b;font-weight:700;border:none;border-radius:9px;padding:10px 20px;cursor:pointer;font-size:13px;font-family:'Space Grotesk',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:7px}

.bgc{background:transparent;color:var(--fg2);font-weight:500;border:1px solid var(--border);border-radius:9px;padding:9px 16px;cursor:pointer;font-size:13px;font-family:'Space Grotesk',sans-serif;transition:all .15s}

.bsm{padding:7px 14px;font-size:12px;border-radius:7px}
.bi{background:none;border:none;color:var(--fg2);cursor:pointer;padding:6px;border-radius:7px;transition:all .12s;font-size:14px}
.bi:hover{color:var(--fg);background:var(--acc-s)}
.auth-w{height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}

.atab{padding:9px 18px;cursor:pointer;font-weight:600;font-size:14px;color:var(--fg2);background:none;border:none;font-family:'Space Grotesk',sans-serif;border-bottom:2px solid transparent;transition:all .15s}
.atab.on{color:var(--acc);border-bottom-color:var(--acc)}.atab:hover:not(.on){color:var(--fg)}
.setup-ov{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}

.app-grid{display:grid;grid-template-columns:220px 1fr;height:100vh}

.pb{margin-top:8px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word;color:var(--fg)}

.ab{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;cursor:pointer;border:none;background:none;color:var(--fg2);font-size:12px;font-weight:500;font-family:'Space Grotesk',sans-serif;transition:all .12s}

.cmt-row input:focus{border-color:var(--acc)}
.prof-banner{height:130px;background:linear-gradient(135deg,rgba(232,160,53,.1),rgba(167,123,223,.05));position:relative;overflow:hidden}
.prof-h{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:18px}
.fbtn{padding:6px 16px;border-radius:18px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:'Space Grotesk',sans-serif;transition:all .15s}
.fbtn.fw{background:var(--bg);color:var(--fg2);border:1px solid var(--border)}.fbtn.fw:hover{border-color:var(--red);color:var(--red)}
.fbtn.nf{background:var(--acc);color:#09090b}.fbtn.nf:hover{background:var(--acc-h)}
.grp-member{display:flex;align-items:center;gap:8px;padding:6px 0}
.grp-member .role{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600}
.role-admin{background:rgba(232,160,53,.15);color:var(--acc)}.role-member{background:var(--acc-s);color:var(--fg2)}
.img-lb{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:30px}
.img-lb img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:mF .15s}
.modal-b{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:440px;width:100%;animation:mS .2s}
@keyframes mF{from{opacity:0}to{opacity:1}}@keyframes mS{from{transform:scale(.96) translateY(6px)}to{transform:scale(1) translateY(0)}}
.spinner{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.empty-s{text-align:center;padding:40px 16px;color:var(--fg2)}.empty-s i{font-size:36px;margin-bottom:12px;display:block;opacity:.2}
.avatar-upload{position:relative;cursor:pointer;display:inline-block}
.avatar-upload:hover .av-overlay{opacity:1}
.av-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
@media(max-width:800px){.app-grid{grid-template-columns:1fr}.nav-bar{display:none}.dm-pane{width:100%;position:absolute;inset:0;z-index:40;border:none}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>

const SQL=`CREATE TABLE IF NOT EXISTS profiles(id UUID REFERENCES auth.users ON DELETE CASCADE PRIMARY KEY,username TEXT UNIQUE NOT NULL,full_name TEXT DEFAULT '',avatar_url TEXT DEFAULT '',bio TEXT DEFAULT '',created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS posts(id UUID DEFAULT gen_random_uuid() PRIMARY KEY,user_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,content TEXT NOT NULL CHECK(char_length(content)>0),image_url TEXT DEFAULT '',created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS likes(user_id UUID REFERENCES profiles(id) ON DELETE CASCADE,post_id UUID REFERENCES posts(id) ON DELETE CASCADE,PRIMARY KEY(user_id,post_id),created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS comments(id UUID DEFAULT gen_random_uuid() PRIMARY KEY,user_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,post_id UUID REFERENCES posts(id) ON DELETE CASCADE NOT NULL,content TEXT NOT NULL CHECK(char_length(content)>0),created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS follows(follower_id UUID REFERENCES profiles(id) ON DELETE CASCADE,following_id UUID REFERENCES profiles(id) ON DELETE CASCADE,PRIMARY KEY(follower_id,following_id));
CREATE TABLE IF NOT EXISTS conversations(id UUID DEFAULT gen_random_uuid() PRIMARY KEY,created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS conversation_participants(conversation_id UUID REFERENCES conversations(id) ON DELETE CASCADE,user_id UUID REFERENCES profiles(id) ON DELETE CASCADE,PRIMARY KEY(conversation_id,user_id));
CREATE TABLE IF NOT EXISTS messages(id UUID DEFAULT gen_random_uuid() PRIMARY KEY,conversation_id UUID REFERENCES conversations(id) ON DELETE CASCADE NOT NULL,sender_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,content TEXT NOT NULL CHECK(char_length(content)>0),created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS groups(id UUID DEFAULT gen_random_uuid() PRIMARY KEY,name TEXT NOT NULL,description TEXT DEFAULT '',avatar_url TEXT DEFAULT '',created_by UUID REFERENCES profiles(id) ON DELETE CASCADE,created_at TIMESTAMPTZ DEFAULT now());
CREATE TABLE IF NOT EXISTS group_members(group_id UUID REFERENCES groups(id) ON DELETE CASCADE,user_id UUID REFERENCES profiles(id) ON DELETE CASCADE,role TEXT DEFAULT 'member' CHECK(role IN('admin','member')),PRIMARY KEY(group_id,user_id));
ALTER TABLE profiles ENABLE ROW LEVEL SECURITY;ALTER TABLE posts ENABLE ROW LEVEL SECURITY;ALTER TABLE likes ENABLE ROW LEVEL SECURITY;ALTER TABLE comments ENABLE ROW LEVEL SECURITY;ALTER TABLE follows ENABLE ROW LEVEL SECURITY;ALTER TABLE conversations ENABLE ROW LEVEL SECURITY;ALTER TABLE conversation_participants ENABLE ROW LEVEL SECURITY;ALTER TABLE messages ENABLE ROW LEVEL SECURITY;ALTER TABLE groups ENABLE ROW LEVEL SECURITY;ALTER TABLE group_members ENABLE ROW LEVEL SECURITY;
CREATE POLICY "ps" ON profiles FOR SELECT USING(true);CREATE POLICY "pi" ON profiles FOR INSERT WITH CHECK(auth.uid()=id);CREATE POLICY "pu" ON profiles FOR UPDATE USING(auth.uid()=id);
CREATE POLICY "pos" ON posts FOR SELECT USING(true);CREATE POLICY "poi" ON posts FOR INSERT WITH CHECK(auth.uid()=user_id);CREATE POLICY "pod" ON posts FOR DELETE USING(auth.uid()=user_id);
CREATE POLICY "ls" ON likes FOR SELECT USING(true);CREATE POLICY "li" ON likes FOR INSERT WITH CHECK(auth.uid()=user_id);CREATE POLICY "ld" ON likes FOR DELETE USING(auth.uid()=user_id);
CREATE POLICY "cs" ON comments FOR SELECT USING(true);CREATE POLICY "ci" ON comments FOR INSERT WITH CHECK(auth.uid()=user_id);CREATE POLICY "cd" ON comments FOR DELETE USING(auth.uid()=user_id);
CREATE POLICY "fs" ON follows FOR SELECT USING(true);CREATE POLICY "fi" ON follows FOR INSERT WITH CHECK(auth.uid()=follower_id);CREATE POLICY "fd" ON follows FOR DELETE USING(auth.uid()=follower_id);
CREATE POLICY "cvs" ON conversations FOR SELECT USING(true);CREATE POLICY "cvi" ON conversations FOR INSERT WITH CHECK(true);
CREATE POLICY "cps" ON conversation_participants FOR SELECT USING(true);CREATE POLICY "cpi" ON conversation_participants FOR INSERT WITH CHECK(true);CREATE POLICY "cpd" ON conversation_participants FOR DELETE USING(true);
CREATE POLICY "ms" ON messages FOR SELECT USING(true);CREATE POLICY "mi" ON messages FOR INSERT WITH CHECK(auth.uid()=sender_id);CREATE POLICY "md" ON messages FOR DELETE USING(auth.uid()=sender_id);
CREATE POLICY "gs" ON groups FOR SELECT USING(true);CREATE POLICY "gi" ON groups FOR INSERT WITH CHECK(auth.uid()=created_by);CREATE POLICY "gu" ON groups FOR UPDATE USING(true);CREATE POLICY "gd" ON groups FOR DELETE USING(auth.uid()=created_by);
CREATE POLICY "gms" ON group_members FOR SELECT USING(true);CREATE POLICY "gmi" ON group_members FOR INSERT WITH CHECK(true);CREATE POLICY "gmd" ON group_members FOR DELETE USING(true);
CREATE OR REPLACE FUNCTION public.handle_new_user() RETURNS TRIGGER AS $$ BEGIN INSERT INTO public.profiles(id,username,full_name) VALUES(NEW.id,COALESCE(NEW.raw_user_meta_data->>'username',split_part(NEW.email,'@',1)),COALESCE(NEW.raw_user_meta_data->>'full_name','')); RETURN NEW; END; $$ LANGUAGE plpgsql SECURITY DEFINER;

function toast(m,t='in'){const b=document.getElementById('toastBox'),e=document.createElement('div');e.className='toast '+t;e.textContent=m;b.appendChild(e);setTimeout(()=>e.remove(),3100)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function timeAgo(d){const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'d';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function defAv(n){const c=(n||'U').charAt(0).toUpperCase(),cols=['#e8a035','#e84057','#35c78a','#5b9ef5','#a77bdf','#e87835'],col=cols[(n||'U').charCodeAt(0)%cols.length];return"data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect width="80" height="80" rx="40" fill="'+col+'"/><text x="50%" y="54%" text-anchor="middle" dy=".1em" font-family="sans-serif" font-size="30" font-weight="700" fill="#fff">'+c+'</text></svg>')}

// Sanitize search input to prevent SQL injection
function sanitizeSearch(query) {
  if (!query) return '';
  return query.replace(/[%_]/g, '\\$&');
}

async function init(){
  try{
    sb=window.supabase.createClient(SB_URL,SB_KEY);
    const{error}=await sb.from('profiles').select('id').limit(1);
    if(error){renderSetup();return}
    const{data:{session}}=await sb.auth.getSession();
    if(session){me=session.user;await ensureProfile(me);await loadProf(me.id);renderApp();setupRT();return}
    renderAuth();
  }catch(e){renderSetup()}
}

async function ensureProfile(user){
  try {
    const{data:ex}=await sb.from('profiles').select('id').eq('id',user.id).single();
    if(ex)return;
    const un=user.user_metadata?.username||user.email?.split('@')[0]||'user';
    await sb.from('profiles').upsert({id:user.id,username:un.toLowerCase(),full_name:user.user_metadata?.full_name||''},{onConflict:'id'});
  } catch (error) {
    console.error('Error ensuring profile:', error);
  }
}

async function handleAuth(e){
  e.preventDefault();const btn=document.getElementById('aBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  const email=document.getElementById('aE').value.trim(),pass=document.getElementById('aP').value;
  try{
    let r;
    if(authM==='signup'){
      const un=document.getElementById('aU').value.trim().toLowerCase(),fn=document.getElementById('aN').value.trim();
      r=await sb.auth.signUp({email,password:pass,options:{data:{username:un,full_name:fn}}});
      if(r.error)throw r.error;if(r.data.user&&!r.data.session){toast('Check email to confirm, then sign in.','in');authM='login';renderAuth();return}
    }else{r=await sb.auth.signInWithPassword({email,password:pass});if(r.error)throw r.error}
    me=r.data.user;await new Promise(r=>setTimeout(r,1000));await ensureProfile(me);await loadProf(me.id);
    toast('Welcome to MMJ Social!','ok');renderApp();setupRT();
  }catch(err){toast(err.message||'Auth failed','er');btn.disabled=false;btn.innerHTML=authM==='login'?'<i class="fas fa-arrow-right"></i> Sign In':'<i class="fas fa-user-plus"></i> Create Account'}
}

function setupRT(){
  sb.channel('mmj-rt')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},()=>{if(view==='feed'&&!chatView)loadFeed()})
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},payload=>{
      const cid=payload.new.conversation_id;
      if(chatView&&((chatView.type==='dm'&&chatView.convId===cid)||(chatView.type==='group'&&chatView.groupId===cid))){loadMessages();if(payload.new.sender_id!==me.id)playRecvSound()}
      else{if(chatView?.type==='dm')unreadDMs++;else unreadGroups++;renderNav();playRecvSound();if(document.getElementById('dmListFull'))loadDMList();if(document.getElementById('grpList'))loadGroupList()}
    }).subscribe();
}

async function loadFeed(){
  try {
    const{data:posts,error}=await sb.from('posts').select('id,user_id,content,image_url,created_at,author:profiles!user_id(username,full_name,avatar_url)').order('created_at',{ascending:false}).limit(50);
    if(error){toast('Feed error: '+error.message,'er');return}
    if(!posts?.length){document.getElementById('feedArea').innerHTML='<div class="empty-s"><i class="fas fa-feather-pointed"></i><p>No posts yet</p></div>';return}
    const pids=posts.map(p=>p.id);let ul=[],lc={},cc={};
    if(pids.length&&me){const{data:lks}=await sb.from('likes').select('post_id').eq('user_id',me.id).in('post_id',pids);ul=lks||[];const{data:allL}=await sb.from('likes').select('post_id');(allL||[]).forEach(l=>{lc[l.post_id]=(lc[l.post_id]||0)+1})}
    if(pids.length){const{data:cs}=await sb.from('comments').select('post_id').in('post_id',pids);(cs||[]).forEach(c=>{cc[c.post_id]=(cc[c.post_id]||0)+1})}
    renderPosts(posts.map(p=>({...p,profile:p.author,liked:ul.some(l=>l.post_id===p.id),likeCount:lc[p.id]||0,commentCount:cc[p.id]||0})));
  } catch (error) {
    console.error('Error loading feed:', error);
    toast('Failed to load feed', 'er');
  }
}

async function loadUserPosts(uid,isOwn){
  try {
    const{data:posts,error}=await sb.from('posts').select('id,user_id,content,image_url,created_at,author:profiles!user_id(username,full_name,avatar_url)').eq('user_id',uid).order('created_at',{ascending:false}).limit(50);
    if(error){toast('Error: '+error.message,'er');return}
    const pids=posts.map(p=>p.id);let ul=[],lc={},cc={};
    if(pids.length&&me){const{data:lks}=await sb.from('likes').select('post_id').eq('user_id',me.id).in('post_id',pids);ul=lks||[];const{data:allL}=await sb.from('likes').select('post_id');(allL||[]).forEach(l=>{lc[l.post_id]=(lc[l.post_id]||0)+1})}
    if(pids.length){const{data:cs}=await sb.from('comments').select('post_id').in('post_id',pids);(cs||[]).forEach(c=>{cc[c.post_id]=(cc[c.post_id]||0)+1})}
    renderPosts(posts.map(p=>({...p,profile:p.author,liked:ul.some(l=>l.post_id===p.id),likeCount:lc[p.id]||0,commentCount:cc[p.id]||0})));
    if(isOwn)loadProfStats(uid);
  } catch (error) {
    console.error('Error loading user posts:', error);
    toast('Failed to load posts', 'er');
  }
}

async function loadProfStats(uid){
  try {
    const{count:pc}=await sb.from('posts').select('*',{count:'exact',head:true}).eq('user_id',uid);
    const{count:fc}=await sb.from('follows').select('*',{count:'exact',head:true}).eq('following_id',uid);
    const{count:gc}=await sb.from('follows').select('*',{count:'exact',head:true}).eq('follower_id',uid);
    const e0=document.getElementById('pc0'),e1=document.getElementById('pc1'),e2=document.getElementById('pc2');
    if(e0)e0.innerHTML='<strong>'+pc+'</strong> <span style="color:var(--fg2)">Posts</span>';
    if(e1)e1.innerHTML='<strong>'+fc+'</strong> <span style="color:var(--fg2)">Followers</span>';
    if(e2)e2.innerHTML='<strong>'+gc+'</strong> <span style="color:var(--fg2)">Following</span>';
  } catch (error) {
    console.error('Error loading profile stats:', error);

async function toggleLike(pid,btn){
  if(!me)return;
  try {
    const{data:ex}=await sb.from('likes').select('user_id').eq('user_id',me.id).eq('post_id',pid).single();
    if(ex){
      await sb.from('likes').delete().eq('user_id',me.id).eq('post_id',pid);
      btn.classList.remove('lk');const s=btn.querySelector('span');s.textContent=parseInt(s.textContent||'1')-1||''
    }else{
      await sb.from('likes').insert({user_id:me.id,post_id:pid});
      btn.classList.add('lk');const s=btn.querySelector('span');s.textContent=parseInt(s.textContent||'0')+1
    }
  } catch (error) {
    console.error('Error toggling like:', error);
    toast('Failed to update like', 'er');
  }
}

async function toggleCmt(pid){
  const sec=document.getElementById('cmt-'+pid);
  if(!sec)return;
  if(sec.style.display==='none'){
    sec.style.display='block';sec.innerHTML='<div style="padding:8px;text-align:center"><span class="spinner"></span></div>';
    try {
      const{data:cmts}=await sb.from('comments').select('*,sender:profiles!user_id(username,full_name,avatar_url)').eq('post_id',pid).order('created_at',{ascending:true});
      sec.innerHTML=cmts.map(c=>'<div class="cmt-i"><img class="av av-s" src="'+avUrl(c.sender)+'" alt=""><div style="flex:1"><span class="un" style="font-size:12px">'+esc(c.sender?.full_name||c.sender?.username)+'</span> <span class="hd" style="font-size:10px">'+timeAgo(c.created_at)+'</span><p style="font-size:12px;margin-top:1px;color:var(--fg)">'+esc(c.content)+'</p></div>'+(me&&me.id===c.user_id?'<button class="bi" style="font-size:10px" onclick="delCmt(\''+c.id+'\',\''+pid+'\')"><i class="fas fa-xmark"></i></button>':'')+'</div>').join('')+'<div class="cmt-row"><input id="ci-'+pid+'" placeholder="Reply..." onkeydown="if(event.key===\'Enter\')addCmt(\''+pid+'\')"><button class="bp bsm" onclick="addCmt(\''+pid+'\')" style="padding:7px 12px"><i class="fas fa-paper-plane"></i></button></div>'
    } catch (error) {
      console.error('Error loading comments:', error);
      sec.innerHTML='<div style="padding:8px;text-align:center;color:var(--fg2)">Failed to load comments</div>';
    }
  }else sec.style.display='none'

async function addCmt(pid){
  const inp=document.getElementById('ci-'+pid);
  if(!inp||!inp.value.trim())return;
  try {
    await sb.from('comments').insert({user_id:me.id,post_id:pid,content:inp.value.trim()});
    inp.value='';toggleCmt(pid);setTimeout(()=>toggleCmt(pid),80)
  } catch (error) {
    console.error('Error adding comment:', error);
    toast('Failed to add comment', 'er');
  }
}

async function delCmt(cid,pid){
  try {
    await sb.from('comments').delete().eq('id',cid);
    toast('Deleted','ok');toggleCmt(pid);setTimeout(()=>toggleCmt(pid),80)
  } catch (error) {
    console.error('Error deleting comment:', error);
    toast('Failed to delete comment', 'er');
  }
}

async function createPost(){
  const ta=document.getElementById('compT'),content=ta?.value.trim();
  if(!content){toast('Write something','er');return}
  const btn=document.getElementById('compBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  try {
    await ensureProfile(me);await loadProf(me.id);
    let iu='';
    if(imgFile){
      try{
        const ext=imgFile.name.split('.').pop(),path=me.id+'/'+Date.now()+'.'+ext;
        const{error}=await sb.storage.from('post-images').upload(path,imgFile);
        if(!error){const{data}=sb.storage.from('post-images').getPublicUrl(path);iu=data.publicUrl}
      }catch(e){console.error('Error uploading image:', e)}
    }
    const{error}=await sb.from('posts').insert({user_id:me.id,content,image_url:iu});
    if(error){toast('Failed: '+error.message,'er');btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Post';return}
    ta.value='';imgFile=null;imgPrev=null;btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Post';
    document.getElementById('imgPrev').innerHTML='';toast('Posted!','ok');loadFeed()
  } catch (error) {
    console.error('Error creating post:', error);
    toast('Failed to create post', 'er');
    btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Post';
  }
}

function handleImg(e){
  const f=e.target.files[0];
  if(!f)return;
  if(f.size>5*1024*1024){toast('Max 5MB','er');return}
  imgFile=f;imgPrev=URL.createObjectURL(f);

function renderDMFull(){

  loadDMList()

async function loadDMList(){
  try {
    const{data:parts}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',me.id);
    if(!parts?.length){
      const el=document.getElementById('dmListFull')||document.getElementById('dmList');
      if(el)el.innerHTML='<div class="empty-s" style="padding:20px"><i class="fas fa-comment-dots"></i><p style="font-size:12px">No conversations yet</p></div>';
      return
    }
    const cids=parts.map(p=>p.conversation_id);
    const{data:otherParts}=await sb.from('conversation_participants').select('conversation_id,user_id,peer:profiles!user_id(username,full_name,avatar_url)').in('conversation_id',cids).neq('user_id',me.id);
    const{data:msgs}=await sb.from('messages').select('*').in('conversation_id',cids).order('created_at',{ascending:false});
    const lastMsg={};msgs?.forEach(m=>{if(!lastMsg[m.conversation_id])lastMsg[m.conversation_id]=m});
    const convMap={};(otherParts||[]).forEach(p=>{convMap[p.conversation_id]=p});
    const list=parts.map(p=>{const o=convMap[p.conversation_id],l=lastMsg[p.conversation_id];if(!o)return null;return{cid:p.conversation_id,peer:o,last:l}}).filter(Boolean).sort((a,b)=>new Date(b.last?.created_at||0)-new Date(a.last?.created_at||0));
    const el=document.getElementById('dmListFull')||document.getElementById('dmList');
    if(!el)return;
    if(!list.length){el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px">No conversations</p></div>';return}
    el.innerHTML=list.map(c=>'<div class="dm-item '+(chatView?.convId===c.cid?'on':'')+'" onclick="openDM(\''+c.cid+'\',\''+c.peer.user_id+'\')"><img class="av av-s" src="'+avUrl(c.peer.peer)+'" alt=""><div style="min-width:0;flex:1"><div style="font-weight:600;font-size:13px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(c.peer.peer?.full_name||c.peer.peer?.username)+'</div><div class="last-msg">'+(c.last?esc(c.last.content):'No messages')+'</div></div>'+(c.last?'<span class="ts">'+timeAgo(c.last.created_at)+'</span>':'')+'</div>').join('')
  } catch (error) {
    console.error('Error loading DM list:', error);
    const el=document.getElementById('dmListFull')||document.getElementById('dmList');
    if(el)el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px">Failed to load conversations</p></div>';
  }
}

function searchDMUsers(q){
  if(!q.trim())return loadDMList();
  // Sanitize input to prevent SQL injection
  const sanitizedQ = sanitizeSearch(q);
  sb.from('profiles').select('*').or('username.ilike.%'+sanitizedQ+'%,full_name.ilike.%'+sanitizedQ+'%').neq('id',me.id).limit(10).then(({data})=>{
    const el=document.getElementById('dmListFull')||document.getElementById('dmList');
    if(!el||!data?.length){if(el)el.innerHTML='<div style="padding:12px;color:var(--fg2);font-size:12px;text-align:center">No users found</div>';return}
    el.innerHTML=data.map(u=>'<div class="dm-item" onclick="startDMWith(\''+u.id+'\')"><img class="av av-s" src="'+avUrl(u)+'" alt=""><div><div style="font-weight:600;font-size:13px;color:var(--fg)">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div></div></div>').join('')
  }).catch(error => {
    console.error('Error searching DM users:', error);
    const el=document.getElementById('dmListFull')||document.getElementById('dmList');
    if(el)el.innerHTML='<div style="padding:12px;color:var(--fg2);font-size:12px;text-align:center">Search failed</div>';
  })
}

async function startDMWith(uid){
  if(uid===me.id){toast('Cannot message yourself','er');return}
  try {
    const{data:mc}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',me.id);
    const{data:tc}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',uid);
    const mids=(mc||[]).map(c=>c.conversation_id),tids=(tc||[]).map(c=>c.conversation_id);
    const ex=mids.find(c=>tids.includes(c));
    if(ex){openDM(ex,uid);return}
    const{data:conv}=await sb.from('conversations').insert({}).select().single();
    await sb.from('conversation_participants').insert([{conversation_id:conv.id,user_id:me.id},{conversation_id:conv.id,user_id:uid}]);
    openDM(conv.id,uid);toast('Conversation started','ok')
  } catch (error) {
    console.error('Error starting DM:', error);
    toast('Failed to start conversation', 'er');
  }
}

  if(area){area.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';loadDMChat(area,cid,peerId)}

async function sendDM(){
  if(!chatView)return;
  const inp=document.getElementById('chatInp');
  if(!inp||!inp.value.trim())return;
  try {
    await sb.from('messages').insert({conversation_id:chatView.convId,sender_id:me.id,content:inp.value.trim()});
    inp.value='';playSendSound();loadMessages()
  } catch (error) {
    console.error('Error sending DM:', error);
    toast('Failed to send message', 'er');
  }
}

async function loadMessages(){
  if(!chatView)return;
  const cid=chatView.type==='dm'?chatView.convId:chatView.groupId;
  try {
    const{data:msgs}=await sb.from('messages').select('*,sender:profiles!sender_id(username,full_name,avatar_url)').eq('conversation_id',cid).order('created_at',{ascending:true}).limit(100);
    const el=document.getElementById('chatMsgs');
    if(!el)return;
    if(!msgs?.length){el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px">No messages yet. Say hello!</p></div>';return}
    let html='',lastDate='';
    msgs.forEach(m=>{
      const d=new Date(m.created_at).toLocaleDateString();
      if(d!==lastDate){lastDate=d;html+='<div class="msg-date-divider"><span>'+(d===new Date().toLocaleDateString()?'Today':d)+'</span></div>'}
      const isMe=m.sender_id===me.id;
      html+='<div style="display:flex;gap:6px;'+(isMe?'flex-direction:row-reverse':'')+'"><div class="msg-bubble '+(isMe?'msg-self':'msg-other')+'"><div>'+esc(m.content)+'</div><div class="msg-meta" style="text-align:'+(isMe?'right':'left')+'">'+(isMe?'You':esc(m.sender?.username||'user'))+' · '+timeAgo(m.created_at)+'</div></div></div>'
    });
    el.innerHTML=html;el.scrollTop=el.scrollHeight
  } catch (error) {
    console.error('Error loading messages:', error);
    const el=document.getElementById('chatMsgs');
    if(el)el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px">Failed to load messages</p></div>';
  }
}

}

async function showGroupInfo(gid){
  try {
    const{data:grp}=await sb.from('groups').select('*').eq('id',gid).single();
    const{data:mems}=await sb.from('group_members').select('user_id,role,mem:profiles!user_id(username,full_name,avatar_url)').eq('group_id',gid);
    const isAdmin=mems?.some(m=>m.user_id===me.id&&m.role==='admin'),isCreator=grp?.created_by===me.id;
    const ml=(mems||[]).map(m=>'<div class="grp-member"><img class="av av-s" src="'+avUrl(m.mem)+'" alt=""><div style="flex:1;min-width:0"><span class="un" style="font-size:12px" onclick="closeModal();viewUser(\''+m.user_id+'\')">'+esc(m.mem?.full_name||m.mem?.username)+'</span><span class="hd" style="font-size:10px"> @'+esc(m.mem?.username)+'</span></div><span class="role '+(m.role==='admin'?'role-admin':'role-member')+'">'+m.role+'</span>'+(isAdmin&&m.user_id!==me.id?'<button class="bi" style="font-size:11px;color:var(--red)" onclick="removeFromGroup(\''+gid+'\',\''+m.user_id+'\')"><i class="fas fa-xmark"></i></button>':'')+'</div>').join('');
    const btns=[{t:'Close',cls:'bgc bsm',fn:()=>{}}];
    if(isCreator)btns.push({t:'Delete Group',cls:'bp bsm',st:'background:var(--red);color:#fff',fn:async()=>{
      try {
        await sb.from('groups').delete().eq('id',gid);
        closeModal();chatView={type:'group'};renderGroupsFull();toast('Deleted','ok')
      } catch (error) {
        console.error('Error deleting group:', error);
        toast('Failed to delete group', 'er');
      }
    }});
    else if(isAdmin)btns.push({t:'Leave',cls:'bgc bsm',st:'border-color:var(--red);color:var(--red)',fn:async()=>{
      try {
        await sb.from('group_members').delete().eq('group_id',gid).eq('user_id',me.id);
        closeModal();chatView={type:'group'};renderGroupsFull();toast('Left','ok')
      } catch (error) {
        console.error('Error leaving group:', error);
        toast('Failed to leave group', 'er');
      }
    }});
    showModal(grp?.name||'Group',btns,true,'<p style="color:var(--fg2);font-size:12px;margin-bottom:12px">'+(esc(grp?.description)||'No description')+'</p><div style="max-height:240px;overflow-y:auto;border-top:1px solid var(--border);padding-top:8px">'+ml+'</div>')
  } catch (error) {
    console.error('Error showing group info:', error);
    toast('Failed to load group info', 'er');
  }
}

async function showAddMember(gid){
  showModal('Add Member',[{t:'Cancel',cls:'bgc bsm',fn:()=>{}},{t:'Add',cls:'bp bsm',fn:()=>{}}],true,'<div><label class="lbl">Username</label><input class="inp" id="addMemInp" placeholder="username"></div>');
  document.querySelector('[data-mi="1"]').onclick=async()=>{
    const un=document.getElementById('addMemInp')?.value.trim();
    if(!un){toast('Enter username','er');return}
    try {
      const{data:u}=await sb.from('profiles').select('*').ilike('username',un).limit(1);
      if(!u?.length){toast('Not found','er');return}
      if(u[0].id===me.id){toast('Already member','er');return}
      const{data:ex}=await sb.from('group_members').select('user_id').eq('group_id',gid).eq('user_id',u[0].id).single();
      if(ex){toast('Already in group','er');return}
      await sb.from('group_members').insert({group_id:gid,user_id:u[0].id,role:'member'});
      closeModal();toast(u[0].username+' added!','ok');
      const a=document.getElementById('grpChatArea');
      if(a)loadGroupChat(a,gid)
    } catch (error) {
      console.error('Error adding member:', error);
      toast('Failed to add member', 'er');
    }
  }
}

async function removeFromGroup(gid,uid){
  try {
    await sb.from('group_members').delete().eq('group_id',gid).eq('user_id',uid);
    toast('Removed','ok');closeModal();
    const a=document.getElementById('grpChatArea');
    if(a)loadGroupChat(a,gid)
  } catch (error) {
    console.error('Error removing member:', error);
    toast('Failed to remove member', 'er');
  }
}

// ── Explore ───────────────────────────────────────────
async function loadExplore(){
  const el=document.getElementById('feedArea');
  if(!el)return;
  el.innerHTML='<div style="margin-bottom:18px"><h2 style="font-size:20px;font-weight:800;margin-bottom:12px;color:var(--fg)">Explore</h2><input class="inp" placeholder="Search users..." id="exploreInp" oninput="doExplore(this.value)" style="padding:12px 16px;font-size:14px"></div><div id="exploreResults"><div class="empty-s"><i class="fas fa-compass"></i><p style="font-weight:600">Discover People</p></div></div>';
  try {
    const{data:users}=await sb.from('profiles').select('*').neq('id',me.id).order('created_at',{ascending:false}).limit(8);
    if(users?.length)document.getElementById('exploreResults').innerHTML='<h3 style="font-size:14px;font-weight:600;color:var(--fg2);margin-bottom:12px">Suggested</h3>'+users.map(u=>'<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser(\''+u.id+'\')"><img class="av" src="'+avUrl(u)+'" alt=""><div style="flex:1;min-width:0"><div class="un">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div>'+(u.bio?'<p style="font-size:11px;color:var(--fg2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(u.bio)+'</p>':'')+'</div><button class="fbtn nf" onclick="event.stopPropagation();toggleFollow(\''+u.id+'\')">Follow</button></div>').join('')
  } catch (error) {
    console.error('Error loading explore:', error);
    document.getElementById('exploreResults').innerHTML='<div class="empty-s"><p>Failed to load users</p></div>';
  }
}

async function doExplore(q){
  if(!q.trim()){loadExplore();return}
  // Sanitize input to prevent SQL injection
  const sanitizedQ = sanitizeSearch(q);
  try {
    const{data:users}=await sb.from('profiles').select('*').or('username.ilike.%'+sanitizedQ+'%,full_name.ilike.%'+sanitizedQ+'%').neq('id',me.id).limit(20);
    const el=document.getElementById('exploreResults');
    if(!el)return;
    if(!users?.length){el.innerHTML='<div class="empty-s"><p>No users found</p></div>';return}
    el.innerHTML=users.map(u=>'<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser(\''+u.id+'\')"><img class="av" src="'+avUrl(u)+'" alt=""><div style="flex:1;min-width:0"><div class="un">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div></div><button class="fbtn nf" onclick="event.stopPropagation();toggleFollow(\''+u.id+'\')">Follow</button></div>').join('')
  } catch (error) {
    console.error('Error searching users:', error);
    const el=document.getElementById('exploreResults');
    if(el)el.innerHTML='<div class="empty-s"><p>Search failed</p></div>';
  }
}

// ── Settings with AVATAR UPLOAD ──────────────────────
async function goSettings(){
  chatView=null;view='settings';renderApp();
  const fp=document.getElementById('mainArea');
  fp.innerHTML='<div class="feed-pane"><div class="feed-center"><h2 style="font-size:20px;font-weight:800;margin-bottom:20px;color:var(--fg)">Settings</h2><div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px"><h3 style="font-size:15px;font-weight:700;margin-bottom:16px;color:var(--fg)">Edit Profile</h3><div style="display:flex;align-items:center;gap:16px;margin-bottom:20px"><div class="avatar-upload" onclick="document.getElementById(\'avatarFileInput\').click()"><img class="av av-xl" id="avatarPreview" src="'+avUrl(myProf)+'" alt=""><div class="av-overlay"><i class="fas fa-camera" style="color:#fff;font-size:20px"></i></div></div><input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="previewAvatar(this)"><div style="flex:1"><p style="font-size:12px;color:var(--fg2)">Click avatar to upload a new photo</p><p style="font-size:11px;color:var(--border);margin-top:2px">JPG, PNG — max 2MB</p></div></div><div style="margin-bottom:14px"><label class="lbl">Display Name</label><input class="inp" id="setName" value="'+esc(myProf?.full_name||'')+'" maxlength="50"></div><div style="margin-bottom:14px"><label class="lbl">Username</label><input class="inp" id="setUser" value="'+esc(myProf?.username||'')+'" maxlength="20" pattern="[a-zA-Z0-9_]+"></div><div style="margin-bottom:14px"><label class="lbl">Bio</label><textarea class="inp" id="setBio" maxlength="160" style="resize:none;min-height:60px;font-size:13px">'+esc(myProf?.bio||'')+'</textarea></div><button class="bp" id="saveBtn" onclick="saveSettings()"><i class="fas fa-check"></i> Save Changes</button></div><div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px"><h3 style="font-size:15px;font-weight:700;margin-bottom:8px;color:var(--red)">Danger Zone</h3><p style="font-size:12px;color:var(--fg2);margin-bottom:14px">Sign out of your account</p><button class="bgc" style="border-color:var(--red);color:var(--red)" onclick="handleLogout()"><i class="fas fa-right-from-bracket"></i> Sign Out</button></div></div></div>';
}

let pendingAvatarFile=null;
function previewAvatar(input){
  const file=input.files[0];if(!file)return;
  if(file.size>2*1024*1024){toast('Max 2MB for avatar','er');input.value='';return}
  pendingAvatarFile=file;
  const url=URL.createObjectURL(file);
  document.getElementById('avatarPreview').src=url;
}

async function saveSettings(){
  const btn=document.getElementById('saveBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  const fn=document.getElementById('setName').value.trim();
  const un=document.getElementById('setUser').value.trim().toLowerCase();
  const bio=document.getElementById('setBio').value.trim();
  let avu=myProf?.avatar_url||'';

  if(!un||!/^[a-zA-Z0-9_]+$/.test(un)){toast('Invalid username','er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';return}

  // Upload avatar if selected
  if(pendingAvatarFile){
    try{
      toast('Uploading avatar...','in');
      const ext=pendingAvatarFile.name.split('.').pop();
      const path=me.id+'/avatar.'+ext;
      // Delete old avatar first
      if(myProf?.avatar_url){
        try{await sb.storage.from('avatars').remove([myProf.avatar_url.split('/').slice(-2).join('/')])}catch(e){}
      }
      const{error:upErr}=await sb.storage.from('avatars').upload(path,pendingAvatarFile,{upsert:true});
      if(upErr){toast('Avatar upload failed: '+upErr.message,'er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';pendingAvatarFile=null;return}
      const{data}=sb.storage.from('avatars').getPublicUrl(path);
      avu=data.publicUrl+'?t='+Date.now(); // Cache buster
    }catch(e){
      console.error('Error uploading avatar:', e);
      toast('Avatar error: '+e.message,'er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';pendingAvatarFile=null;return
    }
    pendingAvatarFile=null;
  }

  try {
    const{error}=await sb.from('profiles').update({full_name:fn,username:un,bio,avatar_url:avu}).eq('id',me.id);
    if(error){toast(error.message,'er');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';return}
    myProf={...myProf,full_name:fn,username:un,bio,avatar_url:avu};
    toast('Profile saved!','ok');btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';
    renderNav(); // Update sidebar avatar
  } catch (error) {
    console.error('Error saving settings:', error);
    toast('Failed to save profile', 'er');
    btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Save Changes';
  }
}

function goFeed(){chatView=null;viewingUid=null;view='feed';dmOpen=true;renderApp()}
function goProfile(){chatView=null;viewingUid=null;view='profile';renderApp()}
function goExplore(){chatView=null;viewingUid=null;view='explore';dmOpen=true;renderApp()}

init();
</script>
