<html lang="en">

<style>
  :root {
    --bg: #09090b;
    --bg2: #0f0f13;
    --card: #16161c;
    --card-h: #1c1c24;
    --border: #27273a;
    --fg: #f0eeea;
    --fg2: #9090a8;
    --acc: #e8a035;
    --acc-h: #f0b855;
    --acc-s: rgba(232,160,53,0.08);
    --red: #e84057;
    --grn: #35c78a;
    --blu: #5b9ef5;
    --pur: #a77bdf;
  }

  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    color: inherit;
  }

  html { background: #09090b; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: #09090b;
    color: #f0eeea;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3 { font-family: 'Sora', sans-serif; color: #f0eeea; }

  /* Atmosphere blobs */
  body::before {
    content: '';
    position: fixed;
    top: -150px; right: -150px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(232,160,53,0.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; left: -150px;
    width: 550px; height: 550px;
    background: radial-gradient(circle, rgba(167,123,223,0.04) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: #09090b; }
  ::-webkit-scrollbar-thumb { background: #27273a; border-radius: 3px; }

  /* ── Toast ────────────────────────────── */
  .toast-box {
    position: fixed; top: 16px; right: 16px; z-index: 9999;
    display: flex; flex-direction: column; gap: 6px; pointer-events: none;
  }
  .toast {
    padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500;
    background: #16161c; border: 1px solid #27273a;
    box-shadow: 0 8px 28px rgba(0,0,0,0.6);
    animation: tI .3s ease, tO .3s 2.7s forwards;
    max-width: 320px; pointer-events: auto; color: #f0eeea;
  }
  .toast.ok { border-left: 3px solid #35c78a; }
  .toast.er { border-left: 3px solid #e84057; }
  .toast.in { border-left: 3px solid #e8a035; }
  @keyframes tI { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes tO { to { transform: translateX(100%); opacity: 0; } }

  /* ── Inputs ───────────────────────────── */
  .inp {
    width: 100%; padding: 11px 14px;
    background: #09090b; border: 1px solid #27273a;
    border-radius: 9px; color: #f0eeea;
    font-family: 'Space Grotesk', sans-serif; font-size: 13px;
    outline: none; transition: border-color .2s;
  }
  .inp:focus { border-color: #e8a035; }
  .inp::placeholder { color: #606078; }
  .lbl {
    display: block; font-size: 11px; font-weight: 600;
    color: #9090a8; margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: .5px;
  }

  /* ── Buttons ──────────────────────────── */
  .bp {
    background: #e8a035; color: #09090b; font-weight: 700;
    border: none; border-radius: 9px; padding: 10px 20px;
    cursor: pointer; font-size: 13px;
    font-family: 'Space Grotesk', sans-serif;
    transition: all .15s; display: inline-flex; align-items: center; gap: 7px;
  }
  .bp:hover { background: #f0b855; transform: translateY(-1px); }
  .bp:active { transform: translateY(0); }
  .bp:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .bg {
    background: transparent; color: #9090a8; font-weight: 500;
    border: 1px solid #27273a; border-radius: 9px;
    padding: 9px 16px; cursor: pointer; font-size: 13px;
    font-family: 'Space Grotesk', sans-serif; transition: all .15s;
  }
  .bg:hover { border-color: #9090a8; color: #f0eeea; }

  .bsm { padding: 7px 14px; font-size: 12px; border-radius: 7px; }

  .bi {
    background: none; border: none; color: #9090a8;
    cursor: pointer; padding: 6px; border-radius: 7px;
    transition: all .12s; font-size: 14px;
  }
  .bi:hover { color: #f0eeea; background: rgba(232,160,53,0.08); }

  /* ── Auth ─────────────────────────────── */
  .auth-w {
    height: 100vh; display: flex;
    align-items: center; justify-content: center; padding: 20px;
    background: #09090b;
  }
  .auth-c {
    background: #16161c; border: 1px solid #27273a;
    border-radius: 18px; padding: 40px; max-width: 420px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .atab {
    padding: 9px 18px; cursor: pointer; font-weight: 600; font-size: 14px;
    color: #9090a8; background: none; border: none;
    font-family: 'Space Grotesk', sans-serif;
    border-bottom: 2px solid transparent; transition: all .15s;
  }
  .atab.on { color: #e8a035; border-bottom-color: #e8a035; }
  .atab:hover:not(.on) { color: #f0eeea; }

  /* ── Setup ────────────────────────────── */
  .setup-ov {
    position: fixed; inset: 0; z-index: 100; background: #09090b;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; overflow-y: auto;
  }
  .setup-b {
    background: #16161c; border: 1px solid #27273a;
    border-radius: 18px; padding: 36px; max-width: 600px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .sql-c {
    background: #09090b; border: 1px solid #27273a;
    border-radius: 9px; padding: 12px;
    font-family: 'Courier New', monospace; font-size: 10px;
    color: #9090a8; max-height: 160px; overflow-y: auto;
    white-space: pre-wrap; line-height: 1.5; user-select: all;
  }

  /* ── Layout ───────────────────────────── */
  .app-grid {
    display: grid; grid-template-columns: 220px 1fr;
    grid-template-rows: 1fr; height: 100vh;
  }
  .nav-bar {
    border-right: 1px solid #27273a; padding: 20px 12px;
    display: flex; flex-direction: column; background: #0f0f13;
  }
  .ni {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    transition: all .12s; font-weight: 500; color: #9090a8;
    font-size: 13px; white-space: nowrap;
  }
  .ni:hover { background: rgba(232,160,53,0.08); color: #f0eeea; }
  .ni.on { background: rgba(232,160,53,0.08); color: #e8a035; }
  .ni i { width: 18px; text-align: center; font-size: 15px; }
  .ni .badge {
    margin-left: auto; background: #e84057; color: #fff;
    font-size: 10px; font-weight: 700; padding: 1px 6px;
    border-radius: 10px; min-width: 18px; text-align: center;
  }

  .main-area { display: flex; overflow: hidden; position: relative; }

  /* ── Feed ─────────────────────────────── */
  .feed-pane {
    flex: 1; overflow-y: auto; padding: 24px 18px; min-width: 0;
    background: #09090b;
  }
  .feed-center { max-width: 580px; margin: 0 auto; }

  /* ── DM Sidebar ───────────────────────── */
  .dm-pane {
    width: 360px; border-left: 1px solid #27273a;
    display: flex; flex-direction: column; background: #0f0f13;
    flex-shrink: 0; transition: width .2s;
  }
  .dm-pane.collapsed { width: 0; border: none; overflow: hidden; }
  .dm-list { flex: 1; overflow-y: auto; padding: 8px; }
  .dm-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: all .12s;
  }
  .dm-item:hover { background: rgba(232,160,53,0.06); }
  .dm-item.on { background: rgba(232,160,53,0.08); border-left: 2px solid #e8a035; }
  .dm-item .last-msg {
    font-size: 12px; color: #9090a8;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
  }

  /* ── Chat ─────────────────────────────── */
  .chat-view {
    position: absolute; inset: 0; background: #09090b; z-index: 50;
    display: flex; flex-direction: column; animation: chatIn .2s ease;
  }
  @keyframes chatIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

  .chat-header {
    padding: 14px 18px; border-bottom: 1px solid #27273a;
    display: flex; align-items: center; gap: 12px;
    background: #0f0f13; flex-shrink: 0;
  }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 16px 18px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .chat-input-bar {
    padding: 12px 18px; border-top: 1px solid #27273a;
    display: flex; gap: 8px; background: #0f0f13; flex-shrink: 0;
  }

  .msg-bubble {
    max-width: 72%; padding: 10px 14px; border-radius: 14px;
    font-size: 13px; line-height: 1.5; word-break: break-word;
    animation: msgIn .15s ease; color: #f0eeea;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .msg-other { background: #16161c; align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg-self { background: rgba(232,160,53,0.14); align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg-meta { font-size: 10px; color: #9090a8; margin-top: 3px; }
  .msg-date-divider {
    text-align: center; font-size: 11px; color: #9090a8;
    padding: 12px 0; position: relative;
  }
  .msg-date-divider span { background: #09090b; padding: 0 12px; position: relative; z-index: 1; }
  .msg-date-divider::before {
    content: ''; position: absolute; top: 50%; left: 0; right: 0;
    height: 1px; background: #27273a;
  }

  /* ── Composer ─────────────────────────── */
  .comp {
    background: #16161c; border: 1px solid #27273a;
    border-radius: 14px; padding: 16px; margin-bottom: 18px;
  }
  .comp textarea {
    width: 100%; background: none; border: none; color: #f0eeea;
    font-family: 'Space Grotesk', sans-serif; font-size: 14px;
    resize: none; outline: none; min-height: 64px; line-height: 1.6;
  }
  .comp textarea::placeholder { color: #606078; }

  /* ── Post ─────────────────────────────── */
  .post {
    background: #16161c; border: 1px solid #27273a;
    border-radius: 14px; padding: 16px; margin-bottom: 12px;
    transition: border-color .15s; animation: pI .3s ease;
  }
  .post:hover { border-color: #35354a; }
  @keyframes pI { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .post-img {
    width: 100%; border-radius: 10px; margin-top: 8px;
    max-height: 380px; object-fit: cover; cursor: pointer;
  }

  .av {
    width: 38px; height: 38px; border-radius: 50%; object-fit: cover;
    border: 2px solid #27273a; flex-shrink: 0; background: #16161c;
  }
  .av-s { width: 28px; height: 28px; }
  .av-l { width: 68px; height: 68px; }
  .av-xl { width: 88px; height: 88px; border-width: 3px; }

  .un { font-weight: 700; font-size: 14px; color: #f0eeea; cursor: pointer; transition: color .12s; }
  .un:hover { color: #e8a035; }
  .hd { font-size: 12px; color: #9090a8; }
  .ts { font-size: 11px; color: #9090a8; }
  .pb { margin-top: 8px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; color: #f0eeea; }

  .pa {
    display: flex; gap: 2px; margin-top: 10px; padding-top: 10px;
    border-top: 1px solid #27273a;
  }
  .ab {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 11px; border-radius: 7px; cursor: pointer;
    border: none; background: none; color: #9090a8; font-size: 12px;
    font-weight: 500; font-family: 'Space Grotesk', sans-serif; transition: all .12s;
  }
  .ab:hover { background: rgba(232,160,53,0.08); color: #f0eeea; }
  .ab.lk { color: #e84057; }
  .ab.lk:hover { background: rgba(232,64,87,0.08); }

  /* ── Comments ─────────────────────────── */
  .cmt-sec { margin-top: 8px; padding-top: 8px; border-top: 1px solid #27273a; }
  .cmt-i { display: flex; gap: 8px; padding: 6px 0; }
  .cmt-row { display: flex; gap: 6px; margin-top: 6px; align-items: center; }
  .cmt-row input {
    flex: 1; padding: 8px 12px; background: #09090b;
    border: 1px solid #27273a; border-radius: 18px; color: #f0eeea;
    font-family: 'Space Grotesk', sans-serif; font-size: 12px;
    outline: none; transition: border-color .2s;
  }
  .cmt-row input:focus { border-color: #e8a035; }

  /* ── Profile ──────────────────────────── */
  .prof-banner {
    height: 130px;
    background: linear-gradient(135deg, rgba(232,160,53,0.1), rgba(167,123,223,0.05));
    position: relative; overflow: hidden;
  }
  .prof-banner::after {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23e8a035' fill-opacity='0.04'%3E%3Cpath d='M20 20h2v2h-2zM4 4h2v2H4zm32 32h2v2h-2z'/%3E%3C/g%3E%3C/svg%3E");
  }
  .prof-h {
    background: #16161c; border: 1px solid #27273a;
    border-radius: 14px; overflow: hidden; margin-bottom: 18px;
  }

  /* ── Follow button ────────────────────── */
  .fbtn {
    padding: 6px 16px; border-radius: 18px; font-size: 11px;
    font-weight: 700; cursor: pointer; border: none;
    font-family: 'Space Grotesk', sans-serif; transition: all .15s;
  }
  .fbtn.fw { background: #09090b; color: #9090a8; border: 1px solid #27273a; }
  .fbtn.fw:hover { border-color: #e84057; color: #e84057; }
  .fbtn.nf { background: #e8a035; color: #09090b; }
  .fbtn.nf:hover { background: #f0b855; }

  /* ── Groups ───────────────────────────── */
  .grp-member { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
  .grp-member .role { font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: 600; }
  .role-admin { background: rgba(232,160,53,0.15); color: #e8a035; }
  .role-member { background: rgba(232,160,53,0.05); color: #9090a8; }

  /* ── Image Lightbox ───────────────────── */
  .img-lb {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.92); display: flex;
    align-items: center; justify-content: center;
    cursor: pointer; padding: 30px;
  }
  .img-lb img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 6px; }

  /* ── Modal ────────────────────────────── */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; animation: mF .15s;
  }
  .modal-b {
    background: #16161c; border: 1px solid #27273a;
    border-radius: 16px; padding: 28px; max-width: 440px; width: 100%;
    animation: mS .2s;
  }
  @keyframes mF { from { opacity: 0; } to { opacity: 1; } }
  @keyframes mS { from { transform: scale(.96) translateY(6px); } to { transform: scale(1) translateY(0); } }

  .spinner {
    width: 20px; height: 20px; border: 3px solid #27273a;
    border-top-color: #e8a035; border-radius: 50%;
    animation: sp .6s linear infinite; display: inline-block;
  }
  @keyframes sp { to { transform: rotate(360deg); } }

  .empty-s {
    text-align: center; padding: 40px 16px; color: #9090a8;
  }
  .empty-s i { font-size: 36px; margin-bottom: 12px; display: block; opacity: .2; }

  @media (max-width: 800px) {
    .app-grid { grid-template-columns: 1fr; }
    .nav-bar { display: none; }
    .dm-pane { width: 100%; position: absolute; inset: 0; z-index: 40; border: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }
</style>
</head>

const SQL=`-- Run in Supabase Dashboard > SQL Editor

CREATE TABLE IF NOT EXISTS profiles(
  id UUID REFERENCES auth.users ON DELETE CASCADE PRIMARY KEY,
  username TEXT UNIQUE NOT NULL,
  full_name TEXT DEFAULT '',
  avatar_url TEXT DEFAULT '',
  bio TEXT DEFAULT '',
  created_at TIMESTAMPTZ DEFAULT now()
);
CREATE TABLE IF NOT EXISTS posts(
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,
  content TEXT NOT NULL CHECK(char_length(content)>0),
  image_url TEXT DEFAULT '',
  created_at TIMESTAMPTZ DEFAULT now()
);
CREATE TABLE IF NOT EXISTS likes(
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  post_id UUID REFERENCES posts(id) ON DELETE CASCADE,
  PRIMARY KEY(user_id,post_id),
  created_at TIMESTAMPTZ DEFAULT now()
);
CREATE TABLE IF NOT EXISTS comments(
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,
  post_id UUID REFERENCES posts(id) ON DELETE CASCADE NOT NULL,
  content TEXT NOT NULL CHECK(char_length(content)>0),
  created_at TIMESTAMPTZ DEFAULT now()
);
CREATE TABLE IF NOT EXISTS follows(
  follower_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  following_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  PRIMARY KEY(follower_id,following_id)
);
CREATE TABLE IF NOT EXISTS conversations(
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  created_at TIMESTAMPTZ DEFAULT now()
);
CREATE TABLE IF NOT EXISTS conversation_participants(
  conversation_id UUID REFERENCES conversations(id) ON DELETE CASCADE,
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  PRIMARY KEY(conversation_id,user_id)
);
CREATE TABLE IF NOT EXISTS messages(
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  conversation_id UUID REFERENCES conversations(id) ON DELETE CASCADE NOT NULL,
  sender_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,
  content TEXT NOT NULL CHECK(char_length(content)>0),
  created_at TIMESTAMPTZ DEFAULT now()
);
CREATE TABLE IF NOT EXISTS groups(
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  name TEXT NOT NULL,
  description TEXT DEFAULT '',
  avatar_url TEXT DEFAULT '',
  created_by UUID REFERENCES profiles(id) ON DELETE CASCADE,
  created_at TIMESTAMPTZ DEFAULT now()
);
CREATE TABLE IF NOT EXISTS group_members(
  group_id UUID REFERENCES groups(id) ON DELETE CASCADE,
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  role TEXT DEFAULT 'member' CHECK(role IN('admin','member')),
  PRIMARY KEY(group_id,user_id)
);

ALTER TABLE profiles ENABLE ROW LEVEL SECURITY;
ALTER TABLE posts ENABLE ROW LEVEL SECURITY;
ALTER TABLE likes ENABLE ROW LEVEL SECURITY;
ALTER TABLE comments ENABLE ROW LEVEL SECURITY;

ALTER TABLE conversations ENABLE ROW LEVEL SECURITY;
ALTER TABLE conversation_participants ENABLE ROW LEVEL SECURITY;
ALTER TABLE messages ENABLE ROW LEVEL SECURITY;
ALTER TABLE groups ENABLE ROW LEVEL SECURITY;
ALTER TABLE group_members ENABLE ROW LEVEL SECURITY;

CREATE POLICY "p_s" ON profiles FOR SELECT USING(true);
CREATE POLICY "p_i" ON profiles FOR INSERT WITH CHECK(auth.uid()=id);
CREATE POLICY "p_u" ON profiles FOR UPDATE USING(auth.uid()=id);

CREATE POLICY "po_i" ON posts FOR INSERT WITH CHECK(auth.uid()=user_id);
CREATE POLICY "po_d" ON posts FOR DELETE USING(auth.uid()=user_id);
CREATE POLICY "l_s" ON likes FOR SELECT USING(true);
CREATE POLICY "l_i" ON likes FOR INSERT WITH CHECK(auth.uid()=user_id);
CREATE POLICY "l_d" ON likes FOR DELETE USING(auth.uid()=user_id);
CREATE POLICY "c_s" ON comments FOR SELECT USING(true);
CREATE POLICY "c_i" ON comments FOR INSERT WITH CHECK(auth.uid()=user_id);
CREATE POLICY "c_d" ON comments FOR DELETE USING(auth.uid()=user_id);
CREATE POLICY "f_s" ON follows FOR SELECT USING(true);
CREATE POLICY "f_i" ON follows FOR INSERT WITH CHECK(auth.uid()=follower_id);
CREATE POLICY "f_d" ON follows FOR DELETE USING(auth.uid()=follower_id);
CREATE POLICY "cv_s" ON conversations FOR SELECT USING(true);
CREATE POLICY "cv_i" ON conversations FOR INSERT WITH CHECK(true);

CREATE OR REPLACE FUNCTION public.handle_new_user()
RETURNS TRIGGER AS $$ BEGIN
  INSERT INTO public.profiles(id,username,full_name)
  VALUES(NEW.id,COALESCE(NEW.raw_user_meta_data->>'username',split_part(NEW.email,'@',1)),COALESCE(NEW.raw_user_meta_data->>'full_name',''));
  RETURN NEW;
END;
 $$ LANGUAGE plpgsql SECURITY DEFINER;

/* ── Helpers ─────────────────────────────────────────── */
function toast(m,t='in'){const b=document.getElementById('toastBox'),e=document.createElement('div');e.className='toast '+t;e.textContent=m;b.appendChild(e);setTimeout(()=>e.remove(),3100)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function timeAgo(d){const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'d';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function defAv(n){const c=(n||'U').charAt(0).toUpperCase(),cols=['#e8a035','#e84057','#35c78a','#5b9ef5','#a77bdf','#e87835'],col=cols[(n||'U').charCodeAt(0)%cols.length];return"data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect width="80" height="80" rx="40" fill="'+col+'"/><text x="50%" y="54%" text-anchor="middle" dy=".1em" font-family="sans-serif" font-size="30" font-weight="700" fill="#fff">'+c+'</text></svg>')}
function avUrl(p){return p&&p.avatar_url? p.avatar_url : defAv(p?p.username:'U')}

function closeModal(){document.getElementById('modalOv')?.remove()}
function showModal(title,btns,cancelClose,customBody){
  closeModal();const el=document.createElement('div');el.className='modal-bg';el.id='modalOv';
  el.onclick=e=>{if(e.target===el&&cancelClose!==false)closeModal()};
  el.innerHTML='<div class="modal-b"><h3 style="font-size:17px;font-weight:700;margin-bottom:14px;color:#f0eeea">'+title+'</h3>'+(customBody||'')+'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px">'+btns.map((b,i)=>'<button class="'+b.cls+'" style="'+(b.st||'')+'" data-mi="'+i+'">'+b.t+'</button>').join('')+'</div></div>';
  document.body.appendChild(el);
  el.querySelectorAll('[data-mi]').forEach(b=>{b.onclick=()=>{btns[+b.dataset.mi].fn()}});
}

let authM='login';
function renderAuth(){
  document.getElementById('app').innerHTML='<div class="auth-w"><div class="auth-c"><div style="text-align:center;margin-bottom:28px"><h1 style="font-size:32px;font-weight:800;color:#e8a035">Gather</h1><p style="color:#9090a8;font-size:13px;margin-top:4px">Connect. Message. Gather.</p></div><div style="display:flex;border-bottom:1px solid #27273a;margin-bottom:24px"><button class="atab '+(authM==='login'?'on':'')+'" onclick="authM=\'login\';renderAuth()">Sign In</button><button class="atab '+(authM==='signup'?'on':'')+'" onclick="authM=\'signup\';renderAuth()">Sign Up</button></div><form onsubmit="handleAuth(event)">'+(authM==='signup'?'<div style="margin-bottom:12px"><label class="lbl">Username</label><input class="inp" id="aU" placeholder="coolperson42" required minlength="3" maxlength="20" pattern="[a-zA-Z0-9_]+"></div><div style="margin-bottom:12px"><label class="lbl">Display Name</label><input class="inp" id="aN" placeholder="Cool Person" maxlength="50"></div>':'')+'<div style="margin-bottom:12px"><label class="lbl">Email</label><input class="inp" type="email" id="aE" placeholder="you@example.com" required></div><div style="margin-bottom:20px"><label class="lbl">Password</label><input class="inp" type="password" id="aP" placeholder="Min 6 characters" required minlength="6"></div><button class="bp" type="submit" id="aBtn" style="width:100%;justify-content:center">'+(authM==='login'?'<i class="fas fa-arrow-right"></i> Sign In':'<i class="fas fa-user-plus"></i> Create Account')+'</button></form></div></div>';
}

async function handleAuth(e){
  e.preventDefault();const btn=document.getElementById('aBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  const email=document.getElementById('aE').value.trim(),pass=document.getElementById('aP').value;
  try{
    let r;
    if(authM==='signup'){
      const un=document.getElementById('aU').value.trim().toLowerCase(),fn=document.getElementById('aN').value.trim();
      r=await sb.auth.signUp({email,password:pass,options:{data:{username:un,full_name:fn}}});
      if(r.error)throw r.error;
      if(r.data.user&&!r.data.session){toast('Check your email to confirm, then sign in.','in');authM='login';renderAuth();return}
    }else{r=await sb.auth.signInWithPassword({email,password:pass});if(r.error)throw r.error}
    me=r.data.user;await new Promise(r=>setTimeout(r,800));await loadProf(me.id);
    toast('Welcome to Gather!','ok');renderApp();setupRT();
  }catch(err){toast(err.message||'Auth failed','er');btn.disabled=false;btn.innerHTML=authM==='login'?'<i class="fas fa-arrow-right"></i> Sign In':'<i class="fas fa-user-plus"></i> Create Account'}
}

/* ── Realtime ────────────────────────────────────────── */
function setupRT(){
  sb.channel('app-rt')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},()=>{if(view==='feed'&&!chatView)loadFeed()})
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},payload=>{
      const cid=payload.new.conversation_id;
      if(chatView&&((chatView.type==='dm'&&chatView.convId===cid)||(chatView.type==='group'&&chatView.groupId===cid))){loadMessages()}
      else{if(chatView?.type==='dm')unreadDMs++;else unreadGroups++;renderNav();if(document.getElementById('dmListFull'))loadDMList();if(document.getElementById('grpList'))loadGroupList()}
    })
    .subscribe();
}

async function loadFeed(){
  const{data:posts}=await sb.from('posts').select('*,profiles(username,full_name,avatar_url)').order('created_at',{ascending:false}).limit(50);
  if(!posts){const el=document.getElementById('feedArea');if(el)el.innerHTML='<div class="empty-s"><i class="fas fa-feather-pointed"></i><p>No posts yet</p></div>';return}
  const pids=posts.map(p=>p.id);let ul=[],lc={},cc={};
  if(pids.length&&me){
    const{data:lks}=await sb.from('likes').select('post_id').eq('user_id',me.id).in('post_id',pids);ul=lks||[];
    const{data:allL}=await sb.from('likes').select('post_id');(allL||[]).forEach(l=>{lc[l.post_id]=(lc[l.post_id]||0)+1});
  }
  if(pids.length){const{data:cs}=await sb.from('comments').select('post_id').in('post_id',pids);(cs||[]).forEach(c=>{cc[c.post_id]=(cc[c.post_id]||0)+1})}
  renderPosts(posts.map(p=>({...p,profile:p.profiles,liked:ul.some(l=>l.post_id===p.id),likeCount:lc[p.id]||0,commentCount:cc[p.id]||0})));
}

async function loadUserPosts(uid,isOwn){
  const{data:posts}=await sb.from('posts').select('*,profiles(username,full_name,avatar_url)').eq('user_id',uid).order('created_at',{ascending:false}).limit(50);
  const pids=posts.map(p=>p.id);let ul=[],lc={},cc={};
  if(pids.length&&me){const{data:lks}=await sb.from('likes').select('post_id').eq('user_id',me.id).in('post_id',pids);ul=lks||[];const{data:allL}=await sb.from('likes').select('post_id');(allL||[]).forEach(l=>{lc[l.post_id]=(lc[l.post_id]||0)+1})}
  if(pids.length){const{data:cs}=await sb.from('comments').select('post_id').in('post_id',pids);(cs||[]).forEach(c=>{cc[c.post_id]=(cc[c.post_id]||0)+1})}
  renderPosts(posts.map(p=>({...p,profile:p.profiles,liked:ul.some(l=>l.post_id===p.id),likeCount:lc[p.id]||0,commentCount:cc[p.id]||0})));

async function toggleLike(pid,btn){
  if(!me)return;const{data:ex}=await sb.from('likes').select('user_id').eq('user_id',me.id).eq('post_id',pid).single();
  if(ex){await sb.from('likes').delete().eq('user_id',me.id).eq('post_id',pid);btn.classList.remove('lk');const s=btn.querySelector('span');s.textContent=parseInt(s.textContent||'1')-1||''}
  else{await sb.from('likes').insert({user_id:me.id,post_id:pid});btn.classList.add('lk');const s=btn.querySelector('span');s.textContent=parseInt(s.textContent||'0')+1}
}

async function toggleCmt(pid){
  const sec=document.getElementById('cmt-'+pid);if(!sec)return;
  if(sec.style.display==='none'){
    sec.style.display='block';sec.innerHTML='<div style="padding:8px;text-align:center"><span class="spinner"></span></div>';
    const{data:cmts}=await sb.from('comments').select('*,profiles(username,full_name,avatar_url)').eq('post_id',pid).order('created_at',{ascending:true});
    sec.innerHTML=cmts.map(c=>'<div class="cmt-i"><img class="av av-s" src="'+avUrl(c.profiles)+'" alt=""><div style="flex:1"><span class="un" style="font-size:12px" onclick="viewUser(\''+c.user_id+'\')">'+esc(c.profile?.full_name||c.profile?.username)+'</span> <span class="hd" style="font-size:10px">'+timeAgo(c.created_at)+'</span><p style="font-size:12px;margin-top:1px;color:#f0eeea">'+esc(c.content)+'</p></div>'+(me&&me.id===c.user_id?'<button class="bi" style="font-size:10px" onclick="delCmt(\''+c.id+'\',\''+pid+'\')"><i class="fas fa-xmark"></i></button>':'')+'</div>').join('')+'<div class="cmt-row"><input id="ci-'+pid+'" placeholder="Reply..." onkeydown="if(event.key===\'Enter\')addCmt(\''+pid+'\')"><button class="bp bsm" onclick="addCmt(\''+pid+'\')" style="padding:7px 12px"><i class="fas fa-paper-plane"></i></button></div>';
  }else sec.style.display='none';

async function loadDMList(){
  const{data:parts}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',me.id);
  if(!parts||!parts.length){const el=document.getElementById('dmListFull')||document.getElementById('dmList');if(el)el.innerHTML='<div class="empty-s" style="padding:20px"><i class="fas fa-comment-dots"></i><p style="font-size:12px">No conversations yet</p></div>';return}
  const cids=parts.map(p=>p.conversation_id);
  const{data:otherParts}=await sb.from('conversation_participants').select('conversation_id,user_id,profiles(username,full_name,avatar_url)').in('conversation_id',cids).neq('user_id',me.id);
  const{data:msgs}=await sb.from('messages').select('*').in('conversation_id',cids).order('created_at',{ascending:false});
  const lastMsg={};msgs.forEach(m=>{if(!lastMsg[m.conversation_id])lastMsg[m.conversation_id]=m});
  const convMap={};(otherParts||[]).forEach(p=>{convMap[p.conversation_id]=p});
  const list=parts.map(p=>{const other=convMap[p.conversation_id];const last=lastMsg[p.conversation_id];if(!other)return null;return{cid:p.conversation_id,peer:other,last}}).filter(Boolean).sort((a,b)=>new Date(b.last?.created_at||0)-new Date(a.last?.created_at||0));
  const el=document.getElementById('dmListFull')||document.getElementById('dmList');
  if(!el)return;
  if(!list.length){el.innerHTML='<div class="empty-s" style="padding:20px"><i class="fas fa-comment-dots"></i><p style="font-size:12px">No conversations yet</p></div>';return}
  el.innerHTML=list.map(c=>'<div class="dm-item '+(chatView?.convId===c.cid?'on':'')+'" onclick="openDM(\''+c.cid+'\',\''+c.peer.user_id+'\')"><img class="av av-s" src="'+avUrl(c.peer.profiles)+'" alt=""><div style="min-width:0;flex:1"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#f0eeea">'+esc(c.peer.profiles?.full_name||c.peer.profiles?.username)+'</div><div class="last-msg">'+(c.last?esc(c.last.content):'No messages')+'</div></div>'+(c.last?'<span class="ts">'+timeAgo(c.last.created_at)+'</span>':'')+'</div>').join('');
}

async function startDMWith(uid){
  if(uid===me.id){toast('Cannot message yourself','er');return}
  const{data:myConvs}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',me.id);
  const{data:theirConvs}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',uid);
  const myCids=(myConvs||[]).map(c=>c.conversation_id);
  const theirCids=(theirConvs||[]).map(c=>c.conversation_id);
  const existing=myCids.find(c=>theirCids.includes(c));
  if(existing){openDM(existing,uid);return}
  const{data:conv}=await sb.from('conversations').insert({}).select().single();
  await sb.from('conversation_participants').insert([{conversation_id:conv.id,user_id:me.id},{conversation_id:conv.id,user_id:uid}]);
  openDM(conv.id,uid);toast('Conversation started','ok');
}

async function loadMessages(){
  if(!chatView)return;
  const cid=chatView.type==='dm'?chatView.convId:chatView.groupId;
  const{data:msgs}=await sb.from('messages').select('*,profiles(username,full_name,avatar_url)').eq('conversation_id',cid).order('created_at',{ascending:true}).limit(100);
  const el=document.getElementById('chatMsgs');if(!el)return;
  if(!msgs.length){el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px">No messages yet. Say hello!</p></div>';return}
  let html='',lastDate='';
  msgs.forEach(m=>{
    const d=new Date(m.created_at).toLocaleDateString();
    if(d!==lastDate){lastDate=d;html+='<div class="msg-date-divider"><span>'+(d===new Date().toLocaleDateString()?'Today':d)+'</span></div>'}
    const isMe=m.sender_id===me.id;

  });
  el.innerHTML=html;el.scrollTop=el.scrollHeight;
}

    if(!usr?.length){toast('User not found','er');return}
    if(usr[0].id===me.id){toast('Already a member','er');return}
    const{data:existing}=await sb.from('group_members').select('user_id').eq('group_id',gid).eq('user_id',usr[0].id).single();
    if(existing){toast('Already in group','er');return}
    await sb.from('group_members').insert({group_id:gid,user_id:usr[0].id,role:'member'});
    closeModal();toast(usr[0].username+' added!','ok');
    const area=document.getElementById('grpChatArea');if(area)loadGroupChat(area,gid);
  };
}

async function removeFromGroup(gid,uid){
  await sb.from('group_members').delete().eq('group_id',gid).eq('user_id',uid);
  toast('Member removed','ok');closeModal();
  const area=document.getElementById('grpChatArea');if(area)loadGroupChat(area,gid);
}

/* ── Explore ─────────────────────────────────────────── */
async function loadExplore(){
  const el=document.getElementById('feedArea');if(!el)return;
  el.innerHTML='<div style="margin-bottom:18px"><h2 style="font-size:20px;font-weight:800;margin-bottom:12px;color:#f0eeea">Explore</h2><input class="inp" placeholder="Search users by name or username..." id="exploreInp" oninput="doExplore(this.value)" style="padding:12px 16px;font-size:14px"></div><div id="exploreResults"><div class="empty-s"><i class="fas fa-compass"></i><p style="font-weight:600;margin-bottom:4px">Discover People</p><p style="font-size:12px">Search to find and follow new people</p></div></div>';
  const{data:users}=await sb.from('profiles').select('*').neq('id',me.id).order('created_at',{ascending:false}).limit(8);
  if(users?.length){
    document.getElementById('exploreResults').innerHTML='<h3 style="font-size:14px;font-weight:600;color:#9090a8;margin-bottom:12px">Suggested for you</h3>'+users.map(u=>'<div style="display:flex;align-items:center;gap:10px;padding:10px;background:#16161c;border:1px solid #27273a;border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser(\''+u.id+'\')"><img class="av" src="'+avUrl(u)+'" alt=""><div style="flex:1;min-width:0"><div class="un">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div>'+(u.bio?'<p style="font-size:11px;color:#9090a8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(u.bio)+'</p>':'')+'</div><button class="fbtn nf" onclick="event.stopPropagation();toggleFollow(\''+u.id+'\');this.textContent=this.textContent===\'Follow\'?\'Following\':\'Follow\';this.className=this.textContent===\'Follow\'?\'fbtn nf\':\'fbtn fw\'">Follow</button></div>').join('');
  }
}

async function doExplore(q){
  if(!q.trim()){loadExplore();return}
  const{data:users}=await sb.from('profiles').select('*').or('username.ilike.%'+q+'%,full_name.ilike.%'+q+'%').neq('id',me.id).limit(20);
  const el=document.getElementById('exploreResults');if(!el)return;
  if(!users?.length){el.innerHTML='<div class="empty-s"><p style="font-size:12px">No users found</p></div>';return}
  el.innerHTML=users.map(u=>'<div style="display:flex;align-items:center;gap:10px;padding:10px;background:#16161c;border:1px solid #27273a;border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser(\''+u.id+'\')"><img class="av" src="'+avUrl(u)+'" alt=""><div style="flex:1;min-width:0"><div class="un">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div></div><button class="fbtn nf" onclick="event.stopPropagation();toggleFollow(\''+u.id+'\');this.textContent=this.textContent===\'Follow\'?\'Following\':\'Follow\';this.className=this.textContent===\'Follow\'?\'fbtn nf\':\'fbtn fw\'">Follow</button></div>').join('');
}

/* ── Settings ────────────────────────────────────────── */
async function goSettings(){
  chatView=null;view='settings';renderApp();
  const m=document.getElementById('mainArea');
  m.innerHTML='<div class="feed-pane"><div class="feed-center"><h2 style="font-size:20px;font-weight:800;margin-bottom:20px;color:#f0eeea">Settings</h2><div style="background:#16161c;border:1px solid #27273a;border-radius:14px;padding:24px;margin-bottom:16px"><h3 style="font-size:15px;font-weight:700;margin-bottom:16px;color:#f0eeea">Edit Profile</h3><div style="margin-bottom:14px"><label class="lbl">Display Name</label><input class="inp" id="setName" value="'+esc(myProf?.full_name||'')+'" maxlength="50"></div><div style="margin-bottom:14px"><label class="lbl">Username</label><input class="inp" id="setUser" value="'+esc(myProf?.username||'')+'" maxlength="20" pattern="[a-zA-Z0-9_]+"></div><div style="margin-bottom:14px"><label class="lbl">Bio</label><textarea class="inp" id="setBio" maxlength="160" style="resize:none;min-height:60px;font-size:13px">'+esc(myProf?.bio||'')+'</textarea></div><div style="margin-bottom:14px"><label class="lbl">Avatar URL</label><input class="inp" id="setAvatar" value="'+esc(myProf?.avatar_url||'')+'" placeholder="https://example.com/avatar.jpg"></div><button class="bp" onclick="saveSettings()"><i class="fas fa-check"></i> Save Changes</button></div><div style="background:#16161c;border:1px solid #27273a;border-radius:14px;padding:24px"><h3 style="font-size:15px;font-weight:700;margin-bottom:8px;color:#e84057">Danger Zone</h3><p style="font-size:12px;color:#9090a8;margin-bottom:14px">Sign out of your account</p><button class="bg" style="border-color:#e84057;color:#e84057" onclick="handleLogout()"><i class="fas fa-right-from-bracket"></i> Sign Out</button></div></div></div>';
}

async function saveSettings(){
  const fn=document.getElementById('setName').value.trim();
  const un=document.getElementById('setUser').value.trim().toLowerCase();
  const bio=document.getElementById('setBio').value.trim();
  const avu=document.getElementById('setAvatar').value.trim();
  if(!un||!/^[a-zA-Z0-9_]+$/.test(un)){toast('Invalid username','er');return}
  const{error}=await sb.from('profiles').update({full_name:fn,username:un,bio,avatar_url:avu}).eq('id',me.id);
  if(error){toast(error.message,'er');return}
  myProf={...myProf,full_name:fn,username:un,bio,avatar_url:avu};
  toast('Profile updated!','ok');renderNav();
}

/* ── Navigation ──────────────────────────────────────── */
function goFeed(){chatView=null;view='feed';dmOpen=true;renderApp()}
function goProfile(){chatView=null;view='profile';renderApp()}
function goExplore(){chatView=null;view='explore';dmOpen=true;renderApp()}

async function handleLogout(){await sb.auth.signOut();me=null;myProf=null;chatView=null;view='feed';renderAuth()}

async function renderDMChat(){if(!chatView||chatView.type!=='dm')return;const area=document.getElementById('chatArea');if(area){area.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';await loadDMChat(area,chatView.convId,chatView.peerId)}}
async function renderGroupChat(){if(!chatView||chatView.type!=='group')return;const area=document.getElementById('chatArea');if(area){area.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';await loadGroupChat(area,chatView.groupId)}}

/* ── Start ───────────────────────────────────────────── */
init();
</script>
</body>
</html>
