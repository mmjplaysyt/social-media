function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function playSendSound(){
  try{
    const ctx=getAudioCtx(),t=ctx.currentTime;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';o.connect(g);g.connect(ctx.destination);

}

function defAv(n){const c=(n||'U').charAt(0).toUpperCase(),cols=['#e8a035','#e84057','#35c78a','#5b9ef5','#a77bdf','#e87835'],col=cols[(n||'U').charCodeAt(0)%cols.length];return"data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect width="80" height="80" rx="40" fill="'+col+'"/><text x="50%" y="54%" text-anchor="middle" dy=".1em" font-family="sans-serif" font-size="30" font-weight="700" fill="#fff">'+c+'</text></svg>')}
function avUrl(p){return p&&p.avatar_url?p.avatar_url:defAv(p?p.username:'U')}
function closeModal(){document.getElementById('modalOv')?.remove()}
function showModal(title,btns,cancelClose,customBody){closeModal();const el=document.createElement('div');el.className='modal-bg';el.id='modalOv';el.onclick=e=>{if(e.target===el&&cancelClose!==false)closeModal()};el.innerHTML='<div class="modal-b"><h3 style="font-size:17px;font-weight:700;margin-bottom:14px;color:var(--fg)">'+title+'</h3>'+(customBody||'')+'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px">'+btns.map((b,i)=>'<button class="'+b.cls+'" style="'+(b.st||'')+'" data-mi="'+i+'">'+b.t+'</button>').join('')+'</div></div>';document.body.appendChild(el);el.querySelectorAll('[data-mi]').forEach(b=>{b.onclick=()=>btns[+b.dataset.mi].fn()})}

async function init(){
  try{
    sb=window.supabase.createClient(SB_URL,SB_KEY);
    const{error}=await sb.from('profiles').select('id').limit(1);
    if(error){renderSetup();return}
    const{data:{session}}=await sb.auth.getSession();
    if(session){me=session.user;await ensureProfile(me);await loadProf(me.id);renderApp();setupRT();return}
    renderAuth();
  }catch(e){renderSetup()}
}

async function ensureProfile(user){
  const{data:ex}=await sb.from('profiles').select('id').eq('id',user.id).single();
  if(ex)return;
  const un=user.user_metadata?.username||user.email?.split('@')[0]||'user';
  await sb.from('profiles').upsert({id:user.id,username:un.toLowerCase(),full_name:user.user_metadata?.full_name||''},{onConflict:'id'});
}

let authM='login';
function renderAuth(){document.getElementById('app').innerHTML='<div class="auth-w"><div class="auth-c"><div style="text-align:center;margin-bottom:28px"><h1 style="font-size:32px;font-weight:800;color:var(--acc)">MMJ Social</h1><p style="color:var(--fg2);font-size:13px;margin-top:4px">Connect. Message. Gather.</p></div><div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:24px"><button class="atab '+(authM==='login'?'on':'')+'" onclick="authM=\'login\';renderAuth()">Sign In</button><button class="atab '+(authM==='signup'?'on':'')+'" onclick="authM=\'signup\';renderAuth()">Sign Up</button></div><form onsubmit="handleAuth(event)">'+(authM==='signup'?'<div style="margin-bottom:12px"><label class="lbl">Username</label><input class="inp" id="aU" placeholder="coolperson42" required minlength="3" maxlength="20" pattern="[a-zA-Z0-9_]+"></div><div style="margin-bottom:12px"><label class="lbl">Display Name</label><input class="inp" id="aN" placeholder="Cool Person" maxlength="50"></div>':'')+'<div style="margin-bottom:12px"><label class="lbl">Email</label><input class="inp" type="email" id="aE" placeholder="you@example.com" required></div><div style="margin-bottom:20px"><label class="lbl">Password</label><input class="inp" type="password" id="aP" placeholder="Min 6 characters" required minlength="6"></div><button class="bp" type="submit" id="aBtn" style="width:100%;justify-content:center">'+(authM==='login'?'<i class="fas fa-arrow-right"></i> Sign In':'<i class="fas fa-user-plus"></i> Create Account')+'</button></form></div></div>'}

async function handleAuth(e){
  e.preventDefault();const btn=document.getElementById('aBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  const email=document.getElementById('aE').value.trim(),pass=document.getElementById('aP').value;
  try{
    let r;
    if(authM==='signup'){
      const un=document.getElementById('aU').value.trim().toLowerCase(),fn=document.getElementById('aN').value.trim();
      r=await sb.auth.signUp({email,password:pass,options:{data:{username:un,full_name:fn}}});
      if(r.error)throw r.error;if(r.data.user&&!r.data.session){toast('Check email to confirm, then sign in.','in');authM='login';renderAuth();return}
    }else{r=await sb.auth.signInWithPassword({email,password:pass});if(r.error)throw r.error}
    me=r.data.user;await new Promise(r=>setTimeout(r,1000));await ensureProfile(me);await loadProf(me.id);
    toast('Welcome to MMJ Social!','ok');renderApp();setupRT();
  }catch(err){toast(err.message||'Auth failed','er');btn.disabled=false;btn.innerHTML=authM==='login'?'<i class="fas fa-arrow-right"></i> Sign In':'<i class="fas fa-user-plus"></i> Create Account'}
}

async function loadProf(uid){const{data}=await sb.from('profiles').select('*').eq('id',uid).single();myProf=data||{id:uid,username:'user',full_name:'',avatar_url:'',bio:''}}
async function getProf(uid){const{data}=await sb.from('profiles').select('*').eq('id',uid).single();return data||{id:uid,username:'user',full_name:'',avatar_url:'',bio:''}}

function setupRT(){
  sb.channel('mmj-rt')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},()=>{if(view==='feed'&&!chatView)loadFeed()})
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},payload=>{
      const cid=payload.new.conversation_id;
      if(chatView&&((chatView.type==='dm'&&chatView.convId===cid)||(chatView.type==='group'&&chatView.groupId===cid))){
        loadMessages();
        if(payload.new.sender_id!==me.id)playRecvSound();
      }else{if(chatView?.type==='dm')unreadDMs++;else unreadGroups++;renderNav();playRecvSound();if(document.getElementById('dmListFull'))loadDMList();if(document.getElementById('grpList'))loadGroupList()}
    })
    .subscribe();
}

async function loadFeed(){
  const{data:posts,error}=await sb.from('posts').select('*,profiles(username,full_name,avatar_url)').order('created_at',{ascending:false}).limit(50);
  if(error){toast('Feed error: '+error.message,'er');return}
  if(!posts?.length){const el=document.getElementById('feedArea');if(el)el.innerHTML='<div class="empty-s"><i class="fas fa-feather-pointed"></i><p>No posts yet</p></div>';return}
  const pids=posts.map(p=>p.id);let ul=[],lc={},cc={};
  if(pids.length&&me){const{data:lks}=await sb.from('likes').select('post_id').eq('user_id',me.id).in('post_id',pids);ul=lks||[];const{data:allL}=await sb.from('likes').select('post_id');(allL||[]).forEach(l=>{lc[l.post_id]=(lc[l.post_id]||0)+1})}
  if(pids.length){const{data:cs}=await sb.from('comments').select('post_id').in('post_id',pids);(cs||[]).forEach(c=>{cc[c.post_id]=(cc[c.post_id]||0)+1})}
  renderPosts(posts.map(p=>({...p,profile:p.profiles,liked:ul.some(l=>l.post_id===p.id),likeCount:lc[p.id]||0,commentCount:cc[p.id]||0})));
}

async function loadUserPosts(uid,isOwn){
  const{data:posts}=await sb.from('posts').select('*,profiles(username,full_name,avatar_url)').eq('user_id',uid).order('created_at',{ascending:false}).limit(50);
  const pids=posts.map(p=>p.id);let ul=[],lc={},cc={};
  if(pids.length&&me){const{data:lks}=await sb.from('likes').select('post_id').eq('user_id',me.id).in('post_id',pids);ul=lks||[];const{data:allL}=await sb.from('likes').select('post_id');(allL||[]).forEach(l=>{lc[l.post_id]=(lc[l.post_id]||0)+1})}
  if(pids.length){const{data:cs}=await sb.from('comments').select('post_id').in('post_id',pids);(cs||[]).forEach(c=>{cc[c.post_id]=(cc[c.post_id]||0)+1})}
  renderPosts(posts.map(p=>({...p,profile:p.profiles,liked:ul.some(l=>l.post_id===p.id),likeCount:lc[p.id]||0,commentCount:cc[p.id]||0})));
  if(isOwn)loadProfStats(uid);
}

function lightbox(src){const el=document.createElement('div');el.className='img-lb';el.onclick=()=>el.remove();el.innerHTML='<img src="'+src+'" alt="">';document.body.appendChild(el)}
async function toggleFollow(uid){if(!me||me.id===uid)return;const{data:ex}=await sb.from('follows').select('follower_id').eq('follower_id',me.id).eq('following_id',uid).single();if(ex){await sb.from('follows').delete().eq('follower_id',me.id).eq('following_id',uid);toast('Unfollowed','in')}else{await sb.from('follows').insert({follower_id:me.id,following_id:uid});toast('Following!','ok')}const b=document.getElementById('followBtn-'+uid);if(b){b.textContent=ex?'Follow':'Following';b.className=ex?'fbtn nf':'fbtn fw'}}
async function viewUser(uid){if(me&&uid===me.id){chatView=null;view='profile';renderApp();return}chatView=null;view='profile';viewUid=uid;renderApp();const p=await getProf(uid);document.getElementById('feedPane').innerHTML='<div class="feed-center" id="profWrap">'+renderProfHeader(p,false)+'<div id="feedArea"><div style="text-align:center;padding:40px"><span class="spinner"></span></div></div></div>';loadUserPosts(uid,false);if(me){const{data:ex}=await sb.from('follows').select('follower_id').eq('follower_id',me.id).eq('following_id',uid).single();const b=document.getElementById('followBtn-'+uid);if(b){b.textContent=ex?'Following':'Follow';b.className=ex?'fbtn fw':'fbtn nf'}}}

// ── DM System ─────────────────────────────────────────
async function goDMs(){chatView={type:'dm'};view='feed';renderApp();renderDMFull()}
function renderDMFull(){document.getElementById('mainArea').innerHTML='<div style="display:flex;width:100%;height:100%"><div style="width:300px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0"><div style="padding:14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)"><button class="bi" onclick="chatView=null;renderApp()"><i class="fas fa-arrow-left"></i></button><h3 style="font-size:15px;font-weight:700;color:var(--fg)">Messages</h3><button class="bi" style="margin-left:auto" onclick="newDMModal()"><i class="fas fa-pen-to-square"></i></button></div><div style="padding:8px 10px"><input class="inp" style="font-size:12px;padding:8px 12px" placeholder="Search..." id="dmFullSearch" oninput="searchDMUsers(this.value)"></div><div class="dm-list" id="dmListFull"><div style="text-align:center;padding:20px"><span class="spinner"></span></div></div></div><div id="dmChatArea" style="flex:1;display:flex;flex-direction:column;background:var(--bg)"><div class="empty-s" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center"><i class="fas fa-comment-dots"></i><p style="font-weight:600;margin-bottom:4px">Your Messages</p><p style="font-size:12px">Select or start a conversation</p></div></div></div>';loadDMList()}

async function loadDMList(){const{data:parts}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',me.id);if(!parts?.length){const el=document.getElementById('dmListFull')||document.getElementById('dmList');if(el)el.innerHTML='<div class="empty-s" style="padding:20px"><i class="fas fa-comment-dots"></i><p style="font-size:12px">No conversations yet</p></div>';return}const cids=parts.map(p=>p.conversation_id);const{data:otherParts}=await sb.from('conversation_participants').select('conversation_id,user_id,profiles(username,full_name,avatar_url)').in('conversation_id',cids).neq('user_id',me.id);const{data:msgs}=await sb.from('messages').select('*').in('conversation_id',cids).order('created_at',{ascending:false});const lastMsg={};msgs?.forEach(m=>{if(!lastMsg[m.conversation_id])lastMsg[m.conversation_id]=m});const convMap={};(otherParts||[]).forEach(p=>{convMap[p.conversation_id]=p});const list=parts.map(p=>{const o=convMap[p.conversation_id],l=lastMsg[p.conversation_id];if(!o)return null;return{cid:p.conversation_id,peer:o,last:l}}).filter(Boolean).sort((a,b)=>new Date(b.last?.created_at||0)-new Date(a.last?.created_at||0));const el=document.getElementById('dmListFull')||document.getElementById('dmList');if(!el)return;if(!list.length){el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px">No conversations</p></div>';return}el.innerHTML=list.map(c=>'<div class="dm-item '+(chatView?.convId===c.cid?'on':'')+'" onclick="openDM(\''+c.cid+'\',\''+c.peer.user_id+'\')"><img class="av av-s" src="'+avUrl(c.peer.profiles)+'" alt=""><div style="min-width:0;flex:1"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--fg)">'+esc(c.peer.profiles?.full_name||c.peer.profiles?.username)+'</div><div class="last-msg">'+(c.last?esc(c.last.content):'No messages')+'</div></div>'+(c.last?'<span class="ts">'+timeAgo(c.last.created_at)+'</span>':'')+'</div>').join('')}

function searchDMUsers(q){if(!q.trim())return loadDMList();sb.from('profiles').select('*').or('username.ilike.%'+q+'%,full_name.ilike.%'+q+'%').neq('id',me.id).limit(10).then(({data})=>{const el=document.getElementById('dmListFull')||document.getElementById('dmList');if(!el||!data?.length){if(el)el.innerHTML='<div style="padding:12px;color:var(--fg2);font-size:12px;text-align:center">No users found</div>';return}el.innerHTML=data.map(u=>'<div class="dm-item" onclick="startDMWith(\''+u.id+'\')"><img class="av av-s" src="'+avUrl(u)+'" alt=""><div><div style="font-weight:600;font-size:13px;color:var(--fg)">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div></div></div>').join('')})}

async function newDMModal(){showModal('New Message',[{t:'Cancel',cls:'bg bsm',fn:()=>{}},{t:'Start',cls:'bp bsm',fn:()=>{}}],true,'<p style="color:var(--fg2);font-size:13px;margin-bottom:14px">Type a username to start chatting.</p><div><label class="lbl">Username</label><input class="inp" id="newDmInp" placeholder="username"></div>');document.querySelector('[data-mi="1"]').onclick=()=>{const v=document.getElementById('newDmInp')?.value.trim();if(!v)return;closeModal();startDMWithByUsername(v)}}
async function startDMWithUsername(name){const{data}=await sb.from('profiles').select('*').ilike('username',name).neq('id',me.id).limit(1);if(!data?.length){toast('User not found','er');return}startDMWith(data[0].id)}
async function startDMWith(uid){if(uid===me.id){toast('Cannot message yourself','er');return}const{data:mc}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',me.id);const{data:tc}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',uid);const mids=(mc||[]).map(c=>c.conversation_id),tids=(tc||[]).map(c=>c.conversation_id);const ex=mids.find(c=>tids.includes(c));if(ex){openDM(ex,uid);return}const{data:conv}=await sb.from('conversations').insert({}).select().single();await sb.from('conversation_participants').insert([{conversation_id:conv.id,user_id:me.id},{conversation_id:conv.id,user_id:uid}]);openDM(conv.id,uid);toast('Conversation started','ok')}
async function openDM(cid,peerId){chatView={type:'dm',convId:cid,peerId};unreadDMs=0;renderNav();const area=document.getElementById('dmChatArea');if(area){area.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';loadDMChat(area,cid,peerId)}else{renderDMFull();setTimeout(()=>{const a=document.getElementById('dmChatArea');if(a)loadDMChat(a,cid,peerId)},50)}loadDMList()}
async function loadDMChat(area,cid,peerId){const peer=await getProf(peerId);area.innerHTML='<div class="chat-header"><button class="bi" onclick="chatView={type:\'dm\'};renderDMFull()"><i class="fas fa-arrow-left"></i></button><img class="av av-s" src="'+avUrl(peer)+'" alt=""><div><div style="font-weight:600;font-size:13px;color:var(--fg)">'+esc(peer.full_name||peer.username)+'</div><div class="hd" style="font-size:10px">@'+esc(peer.username)+'</div></div></div><div class="chat-messages" id="chatMsgs"><div style="text-align:center;padding:40px"><span class="spinner"></span></div></div><div class="chat-input-bar"><input class="inp" id="chatInp" placeholder="Type a message..." onkeydown="if(event.key===\'Enter\')sendDM()"><button class="bp bsm" onclick="sendDM()" style="padding:8px 14px"><i class="fas fa-paper-plane"></i></button></div>';loadMessages();document.getElementById('chatInp')?.focus()}
async function sendDM(){if(!chatView)return;const inp=document.getElementById('chatInp');if(!inp||!inp.value.trim())return;await sb.from('messages').insert({conversation_id:chatView.convId,sender_id:me.id,content:inp.value.trim()});inp.value='';playSendSound();loadMessages()}

async function loadMessages(){if(!chatView)return;const cid=chatView.type==='dm'?chatView.convId:chatView.groupId;const{data:msgs}=await sb.from('messages').select('*,profiles(username,full_name,avatar_url)').eq('conversation_id',cid).order('created_at',{ascending:true}).limit(100);const el=document.getElementById('chatMsgs');if(!el)return;if(!msgs?.length){el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px">No messages yet. Say hello!</p></div>';return}let html='',lastDate='';msgs.forEach(m=>{const d=new Date(m.created_at).toLocaleDateString();if(d!==lastDate){lastDate=d;html+='<div class="msg-date-divider"><span>'+(d===new Date().toLocaleDateString()?'Today':d)+'</span></div>'}const isMe=m.sender_id===me.id;html+='<div style="display:flex;gap:6px;'+(isMe?'flex-direction:row-reverse':'')+'"><div class="msg-bubble '+(isMe?'msg-self':'msg-other')+'"><div>'+esc(m.content)+'</div><div class="msg-meta" style="text-align:'+(isMe?'right':'left')+'">'+(isMe?'You':esc(m.profiles?.username||'user'))+' · '+timeAgo(m.created_at)+'</div></div></div>'});el.innerHTML=html;el.scrollTop=el.scrollHeight}

// ── Groups ────────────────────────────────────────────
// FIX: When creating a group, also create a conversation with the same ID
// so messages table FK (conversation_id REFERENCES conversations) is satisfied
async function goGroups(){chatView={type:'group'};view='feed';renderApp();renderGroupsFull()}
function renderGroupsFull(){document.getElementById('mainArea').innerHTML='<div style="display:flex;width:100%;height:100%"><div style="width:300px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0"><div style="padding:14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)"><button class="bi" onclick="chatView=null;renderApp()"><i class="fas fa-arrow-left"></i></button><h3 style="font-size:15px;font-weight:700;color:var(--fg)">Groups</h3><button class="bi" style="margin-left:auto" onclick="createGroupModal()"><i class="fas fa-plus"></i></button></div><div style="padding:8px 10px"><input class="inp" style="font-size:12px;padding:8px 12px" placeholder="Search..." id="grpSearch" oninput="searchGroups(this.value)"></div><div class="dm-list" id="grpList"><div style="text-align:center;padding:20px"><span class="spinner"></span></div></div></div><div id="grpChatArea" style="flex:1;display:flex;flex-direction:column;background:var(--bg)"><div class="empty-s" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center"><i class="fas fa-users"></i><p style="font-weight:600;margin-bottom:4px">Your Groups</p><p style="font-size:12px">Select or create a group</p></div></div></div>';loadGroupList()}

async function loadGroupList(){const{data:mems}=await sb.from('group_members').select('group_id,role,groups(id,name,description,created_at)').eq('user_id',me.id);const el=document.getElementById('grpList');if(!el)return;if(!mems?.length){el.innerHTML='<div class="empty-s" style="padding:20px"><i class="fas fa-users"></i><p style="font-size:12px">No groups yet</p></div>';return}el.innerHTML=mems.sort((a,b)=>new Date(b.groups?.created_at||0)-new Date(a.groups?.created_at||0)).map(m=>'<div class="dm-item '+(chatView?.groupId===m.group_id?'on':'')+'" onclick="openGroup(\''+m.group_id+'\')"><div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,rgba(232,160,53,.2),rgba(167,123,223,.2));display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-users" style="font-size:13px;color:var(--acc)"></i></div><div style="min-width:0;flex:1"><div style="font-weight:600;font-size:13px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(m.groups?.name)+'</div><div class="last-msg">'+(esc(m.groups?.description)||'No description')+'</div></div>'+(m.role==='admin'?'<span class="role role-admin" style="font-size:9px">Admin</span>':'')+'</div>').join('')}

function searchGroups(q){if(!q.trim())return loadGroupList();sb.from('groups').select('*,group_members(user_id)').ilike('name','%'+q+'%').limit(10).then(({data})=>{const el=document.getElementById('grpList');if(!el||!data?.length){if(el)el.innerHTML='<div style="padding:12px;color:var(--fg2);font-size:12px;text-align:center">None found</div>';return}el.innerHTML=data.map(g=>'<div class="dm-item" onclick="openGroup(\''+g.id+'\')"><div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,rgba(232,160,53,.2),rgba(167,123,223,.2));display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-users" style="font-size:13px;color:var(--acc)"></i></div><div style="min-width:0"><div style="font-weight:600;font-size:13px;color:var(--fg)">'+esc(g.name)+'</div><div class="hd">'+(g.group_members?.length||0)+' members</div></div></div>').join('')})}

async function createGroupModal(){showModal('Create Group',[{t:'Cancel',cls:'bg bsm',fn:()=>{}},{t:'Create',cls:'bp bsm',fn:()=>{}}],true,'<div style="margin-bottom:14px"><label class="lbl">Group Name</label><input class="inp" id="newGrpName" placeholder="My Group" maxlength="40"></div><div><label class="lbl">Description</label><input class="inp" id="newGrpDesc" placeholder="About this group" maxlength="100"></div>');document.querySelector('[data-mi="1"]').onclick=async()=>{const n=document.getElementById('newGrpName')?.value.trim();if(!n){toast('Name required','er');return}const d=document.getElementById('newGrpDesc')?.value.trim()||'';const{data:g}=await sb.from('groups').insert({name:n,description:d,created_by:me.id}).select().single();await sb.from('group_members').insert({group_id:g.id,user_id:me.id,role:'admin'});
// CRITICAL FIX: Create a conversation with the same ID as the group
// so messages.conversation_id FK is satisfied
await sb.from('conversations').upsert({id:g.id},{onConflict:'id'});
closeModal();toast('Group created!','ok');loadGroupList();openGroup(g.id)}}

// Ensure group has a conversation row (for existing groups created before fix)
async function ensureGroupConv(gid){const{data:ex}=await sb.from('conversations').select('id').eq('id',gid).single();if(!ex){await sb.from('conversations').upsert({id:gid},{onConflict:'id'})}}

async function openGroup(gid){chatView={type:'group',groupId:gid};unreadGroups=0;renderNav();
// Ensure conversation row exists for this group
await ensureGroupConv(gid);
const area=document.getElementById('grpChatArea');if(area){area.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';loadGroupChat(area,gid)}else{renderGroupsFull();setTimeout(()=>{const a=document.getElementById('grpChatArea');if(a)loadGroupChat(a,gid)},50)}loadGroupList()}

async function loadGroupChat(area,gid){const{data:grp}=await sb.from('groups').select('*').eq('id',gid).single();const{data:mems}=await sb.from('group_members').select('user_id,role,profiles(username,full_name,avatar_url)').eq('group_id',gid);const isAdmin=mems?.some(m=>m.user_id===me.id&&m.role==='admin');area.innerHTML='<div class="chat-header"><button class="bi" onclick="chatView={type:\'group\'};renderGroupsFull()"><i class="fas fa-arrow-left"></i></button><div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,rgba(232,160,53,.2),rgba(167,123,223,.2));display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-users" style="font-size:13px;color:var(--acc)"></i></div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(grp?.name)+'</div><div class="hd" style="font-size:10px">'+(mems?.length||0)+' members</div></div><button class="bi" onclick="showGroupInfo(\''+gid+'\')"><i class="fas fa-circle-info"></i></button>'+(isAdmin?'<button class="bi" onclick="showAddMember(\''+gid+'\')"><i class="fas fa-user-plus"></i></button>':'')+'</div><div class="chat-messages" id="chatMsgs"><div style="text-align:center;padding:40px"><span class="spinner"></span></div></div><div class="chat-input-bar"><input class="inp" id="chatInp" placeholder="Message the group..." onkeydown="if(event.key===\'Enter\')sendGroupMsg()"><button class="bp bsm" onclick="sendGroupMsg()" style="padding:8px 14px"><i class="fas fa-paper-plane"></i></button></div>';loadMessages();document.getElementById('chatInp')?.focus()}

async function sendGroupMsg(){if(!chatView||chatView.type!=='group')return;const inp=document.getElementById('chatInp');if(!inp||!inp.value.trim())return;
// Ensure conversation row exists before sending
await ensureGroupConv(chatView.groupId);
const{error}=await sb.from('messages').insert({conversation_id:chatView.groupId,sender_id:me.id,content:inp.value.trim()});
if(error){toast('Send failed: '+error.message,'er');return}
inp.value='';playSendSound();loadMessages()}

async function showGroupInfo(gid){const{data:grp}=await sb.from('groups').select('*').eq('id',gid).single();const{data:mems}=await sb.from('group_members').select('user_id,role,profiles(username,full_name,avatar_url)').eq('group_id',gid);const isAdmin=mems?.some(m=>m.user_id===me.id&&m.role==='admin'),isCreator=grp?.created_by===me.id;const ml=(mems||[]).map(m=>'<div class="grp-member"><img class="av av-s" src="'+avUrl(m.profiles)+'" alt=""><div style="flex:1;min-width:0"><span class="un" style="font-size:12px" onclick="closeModal();viewUser(\''+m.user_id+'\')">'+esc(m.profiles?.full_name||m.profiles?.username)+'</span><span class="hd" style="font-size:10px"> @'+esc(m.profiles?.username)+'</span></div><span class="role '+(m.role==='admin'?'role-admin':'role-member')+'">'+m.role+'</span>'+(isAdmin&&m.user_id!==me.id?'<button class="bi" style="font-size:11px;color:var(--red)" onclick="removeFromGroup(\''+gid+'\',\''+m.user_id+'\')"><i class="fas fa-xmark"></i></button>':'')+'</div>').join('');const btns=[{t:'Close',cls:'bg bsm',fn:()=>{}}];if(isCreator)btns.push({t:'Delete Group',cls:'bp bsm',st:'background:var(--red);color:#fff',fn:async()=>{await sb.from('groups').delete().eq('id',gid);closeModal();chatView={type:'group'};renderGroupsFull();toast('Deleted','ok')}});else if(isAdmin)btns.push({t:'Leave',cls:'bg bsm',st:'border-color:var(--red);color:var(--red)',fn:async()=>{await sb.from('group_members').delete().eq('group_id',gid).eq('user_id',me.id);closeModal();chatView={type:'group'};renderGroupsFull();toast('Left','ok')}});showModal(grp?.name||'Group',btns,true,'<p style="color:var(--fg2);font-size:12px;margin-bottom:12px">'+(esc(grp?.description)||'No description')+'</p><div style="max-height:240px;overflow-y:auto;border-top:1px solid var(--border);padding-top:8px">'+ml+'</div>')}

async function showAddMember(gid){showModal('Add Member',[{t:'Cancel',cls:'bg bsm',fn:()=>{}},{t:'Add',cls:'bp bsm',fn:()=>{}}],true,'<div><label class="lbl">Username</label><input class="inp" id="addMemInp" placeholder="username"></div>');document.querySelector('[data-mi="1"]').onclick=async()=>{const un=document.getElementById('addMemInp')?.value.trim();if(!un){toast('Enter username','er');return}const{data:u}=await sb.from('profiles').select('*').ilike('username',un).limit(1);if(!u?.length){toast('Not found','er');return}if(u[0].id===me.id){toast('Already member','er');return}const{data:ex}=await sb.from('group_members').select('user_id').eq('group_id',gid).eq('user_id',u[0].id).single();if(ex){toast('Already in group','er');return}await sb.from('group_members').insert({group_id:gid,user_id:u[0].id,role:'member'});closeModal();toast(u[0].username+' added!','ok');const a=document.getElementById('grpChatArea');if(a)loadGroupChat(a,gid)}}

async function removeFromGroup(gid,uid){await sb.from('group_members').delete().eq('group_id',gid).eq('user_id',uid);toast('Removed','ok');closeModal();const a=document.getElementById('grpChatArea');if(a)loadGroupChat(a,gid)}

// ── Explore ───────────────────────────────────────────
async function loadExplore(){const el=document.getElementById('feedArea');if(!el)return;el.innerHTML='<div style="margin-bottom:18px"><h2 style="font-size:20px;font-weight:800;margin-bottom:12px;color:var(--fg)">Explore</h2><input class="inp" placeholder="Search users..." id="exploreInp" oninput="doExplore(this.value)" style="padding:12px 16px;font-size:14px"></div><div id="exploreResults"><div class="empty-s"><i class="fas fa-compass"></i><p style="font-weight:600">Discover People</p></div></div>';const{data:users}=await sb.from('profiles').select('*').neq('id',me.id).order('created_at',{ascending:false}).limit(8);if(users?.length)document.getElementById('exploreResults').innerHTML='<h3 style="font-size:14px;font-weight:600;color:var(--fg2);margin-bottom:12px">Suggested</h3>'+users.map(u=>'<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser(\''+u.id+'\')"><img class="av" src="'+avUrl(u)+'" alt=""><div style="flex:1;min-width:0"><div class="un">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div>'+(u.bio?'<p style="font-size:11px;color:var(--fg2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(u.bio)+'</p>':'')+'</div><button class="fbtn nf" onclick="event.stopPropagation();toggleFollow(\''+u.id+'\');this.textContent=this.textContent===\'Follow\'?\'Following\':\'Follow\';this.className=this.textContent===\'Follow\'?\'fbtn nf\':\'fbtn fw\'">Follow</button></div>').join('')}

async function doExplore(q){if(!q.trim()){loadExplore();return}const{data:users}=await sb.from('profiles').select('*').or('username.ilike.%'+q+'%,full_name.ilike.%'+q+'%').neq('id',me.id).limit(20);const el=document.getElementById('exploreResults');if(!el)return;if(!users?.length){el.innerHTML='<div class="empty-s"><p>No users found</p></div>';return}el.innerHTML=users.map(u=>'<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser(\''+u.id+'\')"><img class="av" src="'+avUrl(u)+'" alt=""><div style="flex:1;min-width:0"><div class="un">'+esc(u.full_name||u.username)+'</div><div class="hd">@'+esc(u.username)+'</div></div><button class="fbtn nf" onclick="event.stopPropagation();toggleFollow(\''+u.id+'\');this.textContent=this.textContent===\'Follow\'?\'Following\':\'Follow\';this.className=this.textContent===\'Follow\'?\'fbtn nf\':\'fbtn fw\'">Follow</button></div>').join('')}

// ── Settings ──────────────────────────────────────────
async function goSettings(){chatView=null;view='settings';renderApp();document.getElementById('mainArea').innerHTML='<div class="feed-pane"><div class="feed-center"><h2 style="font-size:20px;font-weight:800;margin-bottom:20px;color:var(--fg)">Settings</h2><div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px"><h3 style="font-size:15px;font-weight:700;margin-bottom:16px;color:var(--fg)">Edit Profile</h3><div style="margin-bottom:14px"><label class="lbl">Display Name</label><input class="inp" id="setName" value="'+esc(myProf?.full_name||'')+'" maxlength="50"></div><div style="margin-bottom:14px"><label class="lbl">Username</label><input class="inp" id="setUser" value="'+esc(myProf?.username||'')+'" maxlength="20" pattern="[a-zA-Z0-9_]+"></div><div style="margin-bottom:14px"><label class="lbl">Bio</label><textarea class="inp" id="setBio" maxlength="160" style="resize:none;min-height:60px;font-size:13px">'+esc(myProf?.bio||'')+'</textarea></div><div style="margin-bottom:14px"><label class="lbl">Avatar URL</label><input class="inp" id="setAvatar" value="'+esc(myProf?.avatar_url||'')+'" placeholder="https://..."></div><button class="bp" onclick="saveSettings()"><i class="fas fa-check"></i> Save Changes</button></div><div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px"><h3 style="font-size:15px;font-weight:700;margin-bottom:8px;color:var(--red)">Danger Zone</h3><p style="font-size:12px;color:var(--fg2);margin-bottom:14px">Sign out of your account</p><button class="bg" style="border-color:var(--red);color:var(--red)" onclick="handleLogout()"><i class="fas fa-right-from-bracket"></i> Sign Out</button></div></div></div>'}

async function saveSettings(){const fn=document.getElementById('setName').value.trim(),un=document.getElementById('setUser').value.trim().toLowerCase(),bio=document.getElementById('setBio').value.trim(),avu=document.getElementById('setAvatar').value.trim();if(!un||!/^[a-zA-Z0-9_]+$/.test(un)){toast('Invalid username','er');return}const{error}=await sb.from('profiles').update({full_name:fn,username:un,bio,avatar_url:avu}).eq('id',me.id);if(error){toast(error.message,'er');return}myProf={...myProf,full_name:fn,username:un,bio,avatar_url:avu};toast('Saved!','ok');renderNav()}

function goFeed(){chatView=null;view='feed';dmOpen=true;renderApp()}
function goProfile(){chatView=null;view='profile';renderApp()}
function goExplore(){chatView=null;view='explore';dmOpen=true;renderApp()}
async function handleLogout(){await sb.auth.signOut();me=null;myProf=null;chatView=null;view='feed';renderAuth()}
async function renderDMChat(){if(!chatView||chatView.type!=='dm')return;const area=document.getElementById('chatArea');if(area){area.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';await loadDMChat(area,chatView.convId,chatView.peerId)}}
async function renderGroupChat(){if(!chatView||chatView.type!=='group')return;const area=document.getElementById('chatArea');if(area){area.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';await ensureGroupConv(chatView.groupId);await loadGroupChat(area,chatView.groupId)}}

init();
</script>
