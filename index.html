<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gather — Social</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Sora:wght@200;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root{--bg:#0c0c0f;--bg2:#121216;--card:#18181f;--card-h:#1f1f28;--border:#25253a;--fg:#eae8e4;--fg2:#7c7c94;--acc:#e8a035;--acc-h:#f0b855;--acc-s:rgba(232,160,53,.07);--red:#e84057;--grn:#35c78a;--blu:#5b9ef5;--pur:#a77bdf}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);height:100vh;overflow:hidden}
  h1,h2,h3{font-family:'Sora',sans-serif}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .toast-box{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
  .toast{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;background:var(--card);border:1px solid var(--border);box-shadow:0 8px 28px rgba(0,0,0,.5);animation:tI .3s ease,tO .3s 2.7s forwards;max-width:320px;pointer-events:auto}
  .toast.ok{border-left:3px solid var(--grn)}.toast.er{border-left:3px solid var(--red)}.toast.in{border-left:3px solid var(--acc)}
  @keyframes tI{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes tO{to{transform:translateX(100%);opacity:0}}

  .inp{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:13px;outline:none;transition:border .2s}
  .inp:focus{border-color:var(--acc)}
  .lbl{display:block;font-size:11px;font-weight:600;color:var(--fg2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}

  .bp{background:var(--acc);color:#0c0c0f;font-weight:700;border:none;border-radius:9px;padding:10px 20px;cursor:pointer;font-size:13px;font-family:'Space Grotesk',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
  .bp:hover{background:var(--acc-h);transform:translateY(-1px)}.bp:active{transform:translateY(0)}.bp:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .bg{background:transparent;color:var(--fg2);font-weight:500;border:1px solid var(--border);border-radius:9px;padding:9px 16px;cursor:pointer;font-size:13px;font-family:'Space Grotesk',sans-serif;transition:all .15s}
  .bg:hover{border-color:var(--fg2);color:var(--fg)}
  .bsm{padding:7px 14px;font-size:12px;border-radius:7px}
  .bi{background:none;border:none;color:var(--fg2);cursor:pointer;padding:6px;border-radius:7px;transition:all .12s;font-size:14px}
  .bi:hover{color:var(--fg);background:var(--acc-s)}

  .auth-w{height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .auth-c{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:40px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .atab{padding:9px 18px;cursor:pointer;font-weight:600;font-size:14px;color:var(--fg2);background:none;border:none;font-family:'Space Grotesk',sans-serif;border-bottom:2px solid transparent;transition:all .15s}
  .atab.on{color:var(--acc);border-bottom-color:var(--acc)}.atab:hover:not(.on){color:var(--fg)}

  .setup-ov{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
  .setup-b{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:36px;max-width:600px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .sql-c{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:12px;font-family:'Courier New',monospace;font-size:10px;color:var(--fg2);max-height:160px;overflow-y:auto;white-space:pre-wrap;line-height:1.5;user-select:all}

  .app-grid{display:grid;grid-template-columns:220px 1fr;grid-template-rows:1fr;height:100vh}
  .nav-bar{border-right:1px solid var(--border);padding:20px 12px;display:flex;flex-direction:column;background:var(--bg2)}
  .ni{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .12s;font-weight:500;color:var(--fg2);font-size:13px;white-space:nowrap}
  .ni:hover{background:var(--acc-s);color:var(--fg)}.ni.on{background:var(--acc-s);color:var(--acc)}
  .ni i{width:18px;text-align:center;font-size:15px}
  .ni .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}

  .main-area{display:flex;overflow:hidden;position:relative}

  /* Feed */
  .feed-pane{flex:1;overflow-y:auto;padding:24px 18px;min-width:0}
  .feed-center{max-width:580px;margin:0 auto}

  /* DM Panel */
  .dm-pane{width:380px;border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0;transition:width .2s}
  .dm-pane.collapsed{width:0;border:none;overflow:hidden}
  .dm-list{flex:1;overflow-y:auto;padding:8px}
  .dm-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .12s}
  .dm-item:hover{background:var(--acc-s)}.dm-item.on{background:var(--acc-s);border-left:2px solid var(--acc)}
  .dm-item .last-msg{font-size:12px;color:var(--fg2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}

  /* Chat view */
  .chat-view{position:absolute;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;animation:chatIn .2s ease}
  @keyframes chatIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  .chat-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg2);flex-shrink:0}
  .chat-messages{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:6px}
  .chat-input-bar{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--bg2);flex-shrink:0}
  .chat-input-bar input{flex:1}

  .msg-bubble{max-width:70%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;animation:msgIn .15s ease}
  @keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .msg-other{background:var(--card);align-self:flex-start;border-bottom-left-radius:4px}
  .msg-self{background:rgba(232,160,53,.15);align-self:flex-end;border-bottom-right-radius:4px}
  .msg-meta{font-size:10px;color:var(--fg2);margin-top:3px}
  .msg-date-divider{text-align:center;font-size:11px;color:var(--fg2);padding:12px 0;position:relative}
  .msg-date-divider span{background:var(--bg);padding:0 12px;position:relative;z-index:1}
  .msg-date-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border)}

  /* Composer */
  .comp{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:18px}
  .comp textarea{width:100%;background:none;border:none;color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:14px;resize:none;outline:none;min-height:64px;line-height:1.6}
  .comp textarea::placeholder{color:var(--fg2)}

  /* Post */
  .post{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;transition:border .15s;animation:pI .3s ease}
  .post:hover{border-color:#30304a}
  @keyframes pI{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .post-img{width:100%;border-radius:10px;margin-top:8px;max-height:380px;object-fit:cover;cursor:pointer}
  .av{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;background:var(--bg)}
  .av-s{width:28px;height:28px}.av-l{width:68px;height:68px}.av-xl{width:88px;height:88px;border-width:3px}
  .un{font-weight:700;font-size:14px;color:var(--fg);cursor:pointer;transition:color .12s}.un:hover{color:var(--acc)}
  .hd{font-size:12px;color:var(--fg2)}.ts{font-size:11px;color:var(--fg2)}
  .pb{margin-top:8px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
  .pa{display:flex;gap:2px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
  .ab{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;cursor:pointer;border:none;background:none;color:var(--fg2);font-size:12px;font-weight:500;font-family:'Space Grotesk',sans-serif;transition:all .12s}
  .ab:hover{background:var(--acc-s);color:var(--fg)}.ab.lk{color:var(--red)}.ab.lk:hover{background:rgba(232,64,87,.08)}

  .cmt-sec{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
  .cmt-i{display:flex;gap:8px;padding:6px 0}
  .cmt-row{display:flex;gap:6px;margin-top:6px;align-items:center}
  .cmt-row input{flex:1;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:18px;color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:12px;outline:none;transition:border .2s}
  .cmt-row input:focus{border-color:var(--acc)}

  .prof-banner{height:130px;background:linear-gradient(135deg,rgba(232,160,53,.1),rgba(232,160,53,.02));position:relative;overflow:hidden}
  .prof-banner::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23e8a035' fill-opacity='0.03'%3E%3Cpath d='M20 20h2v2h-2zM4 4h2v2H4zm32 32h2v2h-2z'/%3E%3C/g%3E%3C/svg%3E")}
  .prof-h{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:18px}

  .img-lb{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:30px}
  .img-lb img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:mF .15s}
  .modal-b{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:440px;width:100%;animation:mS .2s}
  @keyframes mF{from{opacity:0}to{opacity:1}}@keyframes mS{from{transform:scale(.96) translateY(6px)}to{transform:scale(1) translateY(0)}}

  .spinner{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}
  .empty-s{text-align:center;padding:40px 16px;color:var(--fg2)}.empty-s i{font-size:36px;margin-bottom:12px;display:block;opacity:.2}

  .fbtn{padding:6px 16px;border-radius:18px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:'Space Grotesk',sans-serif;transition:all .15s}
  .fbtn.fw{background:var(--bg);color:var(--fg2);border:1px solid var(--border)}.fbtn.fw:hover{border-color:var(--red);color:var(--red)}
  .fbtn.nf{background:var(--acc);color:#0c0c0f}.fbtn.nf:hover{background:var(--acc-h)}

  .grp-member{display:flex;align-items:center;gap:8px;padding:6px 0}
  .grp-member .role{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600}
  .role-admin{background:rgba(232,160,53,.15);color:var(--acc)}
  .role-member{background:var(--acc-s);color:var(--fg2)}

  .typing-indicator{font-size:11px;color:var(--fg2);padding:0 18px 4px;font-style:italic}

  @media(max-width:800px){.app-grid{grid-template-columns:1fr}.nav-bar{display:none}.dm-pane{width:100%;position:absolute;inset:0;z-index:40;border:none}}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>

<script>
// ── Config ───────────────────────────────────────────────────────
const SB_URL='https://mxwwwxhtwbfbrloykpef.supabase.co';

let sb=null,me=null,myProf=null;
let view='feed',viewUid=null;
let chatView=null; // {type:'dm',convId,peerId} | {type:'group',groupId}
let dmOpen=true, unreadDMs=0, unreadGroups=0;
let imgFile=null,imgPrev=null;

const SQL=`-- Run in Supabase SQL Editor

CREATE TABLE IF NOT EXISTS profiles(
  id UUID REFERENCES auth.users ON DELETE CASCADE PRIMARY KEY,
  username TEXT UNIQUE NOT NULL,
  full_name TEXT DEFAULT '',
  avatar_url TEXT DEFAULT '',
  bio TEXT DEFAULT '',
  created_at TIMESTAMPTZ DEFAULT now()
);
CREATE TABLE IF NOT EXISTS posts(
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,
  content TEXT NOT NULL CHECK(char_length(content)>0),
  image_url TEXT DEFAULT '',
  created_at TIMESTAMPTZ DEFAULT now()
);
CREATE TABLE IF NOT EXISTS likes(
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  post_id UUID REFERENCES posts(id) ON DELETE CASCADE,
  PRIMARY KEY(user_id,post_id),
  created_at TIMESTAMPTZ DEFAULT now()
);
CREATE TABLE IF NOT EXISTS comments(
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,
  post_id UUID REFERENCES posts(id) ON DELETE CASCADE NOT NULL,
  content TEXT NOT NULL CHECK(char_length(content)>0),
  created_at TIMESTAMPTZ DEFAULT now()
);
CREATE TABLE IF NOT EXISTS follows(
  follower_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  following_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  PRIMARY KEY(follower_id,following_id)
);

-- Conversations (DM)
CREATE TABLE IF NOT EXISTS conversations(
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  created_at TIMESTAMPTZ DEFAULT now()
);
CREATE TABLE IF NOT EXISTS conversation_participants(
  conversation_id UUID REFERENCES conversations(id) ON DELETE CASCADE,
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  PRIMARY KEY(conversation_id,user_id)
);

-- Messages
CREATE TABLE IF NOT EXISTS messages(
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  conversation_id UUID REFERENCES conversations(id) ON DELETE CASCADE NOT NULL,
  sender_id UUID REFERENCES profiles(id) ON DELETE CASCADE NOT NULL,
  content TEXT NOT NULL CHECK(char_length(content)>0),
  created_at TIMESTAMPTZ DEFAULT now()
);

-- Groups
CREATE TABLE IF NOT EXISTS groups(
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  name TEXT NOT NULL,
  description TEXT DEFAULT '',
  avatar_url TEXT DEFAULT '',
  created_by UUID REFERENCES profiles(id) ON DELETE CASCADE,
  created_at TIMESTAMPTZ DEFAULT now()
);
CREATE TABLE IF NOT EXISTS group_members(
  group_id UUID REFERENCES groups(id) ON DELETE CASCADE,
  user_id UUID REFERENCES profiles(id) ON DELETE CASCADE,
  role TEXT DEFAULT 'member' CHECK(role IN('admin','member')),
  PRIMARY KEY(group_id,user_id)
);

-- RLS
ALTER TABLE profiles ENABLE ROW LEVEL SECURITY;
ALTER TABLE posts ENABLE ROW LEVEL SECURITY;
ALTER TABLE likes ENABLE ROW LEVEL SECURITY;
ALTER TABLE comments ENABLE ROW LEVEL SECURITY;
ALTER TABLE follows ENABLE ROW LEVEL SECURITY;
ALTER TABLE conversations ENABLE ROW LEVEL SECURITY;
ALTER TABLE conversation_participants ENABLE ROW LEVEL SECURITY;
ALTER TABLE messages ENABLE ROW LEVEL SECURITY;
ALTER TABLE groups ENABLE ROW LEVEL SECURITY;
ALTER TABLE group_members ENABLE ROW LEVEL SECURITY;

CREATE POLICY "p_sel" ON profiles FOR SELECT USING(true);
CREATE POLICY "p_ins" ON profiles FOR INSERT WITH CHECK(auth.uid()=id);
CREATE POLICY "p_upd" ON profiles FOR UPDATE USING(auth.uid()=id);

CREATE POLICY "po_sel" ON posts FOR SELECT USING(true);
CREATE POLICY "po_ins" ON posts FOR INSERT WITH CHECK(auth.uid()=user_id);
CREATE POLICY "po_del" ON posts FOR DELETE USING(auth.uid()=user_id);

CREATE POLICY "l_sel" ON likes FOR SELECT USING(true);
CREATE POLICY "l_ins" ON likes FOR INSERT WITH CHECK(auth.uid()=user_id);
CREATE POLICY "l_del" ON likes FOR DELETE USING(auth.uid()=user_id);

CREATE POLICY "c_sel" ON comments FOR SELECT USING(true);
CREATE POLICY "c_ins" ON comments FOR INSERT WITH CHECK(auth.uid()=user_id);
CREATE POLICY "c_del" ON comments FOR DELETE USING(auth.uid()=user_id);

CREATE POLICY "f_sel" ON follows FOR SELECT USING(true);
CREATE POLICY "f_ins" ON follows FOR INSERT WITH CHECK(auth.uid()=follower_id);
CREATE POLICY "f_del" ON follows FOR DELETE USING(auth.uid()=follower_id);

CREATE POLICY "cv_sel" ON conversations FOR SELECT USING(true);
CREATE POLICY "cv_ins" ON conversations FOR INSERT WITH CHECK(true);

CREATE POLICY "cp_sel" ON conversation_participants FOR SELECT USING(true);
CREATE POLICY "cp_ins" ON conversation_participants FOR INSERT WITH CHECK(true);
CREATE POLICY "cp_del" ON conversation_participants FOR DELETE USING(true);

CREATE POLICY "m_sel" ON messages FOR SELECT USING(true);
CREATE POLICY "m_ins" ON messages FOR INSERT WITH CHECK(auth.uid()=sender_id);
CREATE POLICY "m_del" ON messages FOR DELETE USING(auth.uid()=sender_id);

CREATE POLICY "g_sel" ON groups FOR SELECT USING(true);
CREATE POLICY "g_ins" ON groups FOR INSERT WITH CHECK(auth.uid()=created_by);
CREATE POLICY "g_upd" ON groups FOR UPDATE USING(true);
CREATE POLICY "g_del" ON groups FOR DELETE USING(auth.uid()=created_by);

CREATE POLICY "gm_sel" ON group_members FOR SELECT USING(true);
CREATE POLICY "gm_ins" ON group_members FOR INSERT WITH CHECK(true);
CREATE POLICY "gm_del" ON group_members FOR DELETE USING(true);

-- Auto profile on signup
CREATE OR REPLACE FUNCTION public.handle_new_user()
RETURNS TRIGGER AS $$ BEGIN
  INSERT INTO public.profiles(id,username,full_name)
  VALUES(NEW.id,COALESCE(NEW.raw_user_meta_data->>'username',split_part(NEW.email,'@',1)),COALESCE(NEW.raw_user_meta_data->>'full_name',''));
  RETURN NEW;
END;
 $$ LANGUAGE plpgsql SECURITY DEFINER;
DROP TRIGGER IF EXISTS on_auth_user_created ON auth.users;
CREATE TRIGGER on_auth_user_created AFTER INSERT ON auth.users FOR EACH ROW EXECUTE FUNCTION public.handle_new_user();

-- Storage
INSERT INTO storage.buckets(id,name,public) VALUES('post-images','post-images',true) ON CONFLICT(id) DO NOTHING;
INSERT INTO storage.buckets(id,name,public) VALUES('avatars','avatars',true) ON CONFLICT(id) DO NOTHING;
CREATE POLICY "pi_u" ON storage.objects FOR INSERT WITH CHECK(bucket_id='post-images' AND auth.uid()::text=(storage.foldername(name))[1]);
CREATE POLICY "pi_r" ON storage.objects FOR SELECT USING(bucket_id='post-images');
CREATE POLICY "pi_d" ON storage.objects FOR DELETE USING(bucket_id='post-images' AND auth.uid()::text=(storage.foldername(name))[1]);
CREATE POLICY "av_u" ON storage.objects FOR INSERT WITH CHECK(bucket_id='avatars' AND auth.uid()::text=(storage.foldername(name))[1]);
CREATE POLICY "av_r" ON storage.objects FOR SELECT USING(bucket_id='avatars');
CREATE POLICY "av_d" ON storage.objects FOR DELETE USING(bucket_id='avatars' AND auth.uid()::text=(storage.foldername(name))[1]);`;

// ── Helpers ──────────────────────────────────────────────────────
function toast(m,t='in'){const b=document.getElementById('toastBox'),e=document.createElement('div');e.className=`toast ${t}`;e.textContent=m;b.appendChild(e);setTimeout(()=>e.remove(),3100)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function timeAgo(d){const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'d';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function defAv(n){const c=(n||'U').charAt(0).toUpperCase(),cols=['#e8a035','#e84057','#35c78a','#5b9ef5','#a77bdf','#e87835'],col=cols[(n||'U').charCodeAt(0)%cols.length];return`data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect width="80" height="80" rx="40" fill="${col}"/><text x="50%" y="54%" text-anchor="middle" dy=".1em" font-family="sans-serif" font-size="30" font-weight="700" fill="#fff">${c}</text></svg>)}`}
function avUrl(p){return p?.avatar_url||defAv(p?.username||'U')}

function closeModal(){document.getElementById('modalOv')?.remove()}
function showModal(title,body,btns){
  closeModal();const el=document.createElement('div');el.className='modal-bg';el.id='modalOv';
  el.onclick=e=>{if(e.target===el)closeModal()};
  el.innerHTML=`<div class="modal-b"><h3 style="font-size:17px;font-weight:700;margin-bottom:10px">${title}</h3><p style="color:var(--fg2);font-size:13px;margin-bottom:20px;line-height:1.6">${body}</p><div style="display:flex;gap:8px;justify-content:flex-end">${btns.map((b,i)=>`<button class="${b.cls}" style="${b.st||''}" data-mi="${i}">${b.t}</button>`).join('')}</div></div>`;
  document.body.appendChild(el);
  el.querySelectorAll('[data-mi]').forEach(b=>{b.onclick=()=>{btns[+b.dataset.mi].fn();closeModal()}});
}

// ── Init ─────────────────────────────────────────────────────────
async function init(){
  try{
    sb=window.supabase.createClient(SB_URL,SB_KEY);
    const{error}=await sb.from('profiles').select('id').limit(1);
    if(error){renderSetup();return}
    const{data:{session}}=await sb.auth.getSession();
    if(session){me=session.user;await loadProf(me.id);renderApp();setupRT();return}
    renderAuth();
  }catch(e){renderSetup()}
}

function renderSetup(){
  document.getElementById('app').innerHTML=`<div class="setup-ov"><div class="setup-b">
    <h1 style="font-size:28px;font-weight:800;margin-bottom:4px"><span style="color:var(--acc)">Gather</span></h1>
    <p style="color:var(--fg2);font-size:13px;margin-bottom:24px">Tables not found. Run this SQL in <strong style="color:var(--fg)">Supabase SQL Editor</strong>, then refresh.</p>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="bp bsm" onclick="navigator.clipboard.writeText(SQL);toast('Copied!','ok')"><i class="fas fa-copy"></i> Copy SQL</button>
      <a href="https://supabase.com/dashboard/project/mxwwwxhtwbfbrloykpef/sql" target="_blank" class="bg bsm" style="text-decoration:none"><i class="fas fa-external-link-alt"></i> Open Editor</a>
    </div>
    <div class="sql-c">${SQL.replace(/</g,'&lt;')}</div>
    <button class="bp" style="width:100%;justify-content:center;margin-top:16px" onclick="location.reload()"><i class="fas fa-refresh"></i> Done — Refresh</button>
  </div></div>`;
}

// ── Auth ─────────────────────────────────────────────────────────
let authM='login';
function renderAuth(){
  document.getElementById('app').innerHTML=`<div class="auth-w"><div class="auth-c">
    <div style="text-align:center;margin-bottom:28px">
      <h1 style="font-size:32px;font-weight:800"><span style="color:var(--acc)">Gather</span></h1>
      <p style="color:var(--fg2);font-size:13px;margin-top:4px">Connect. Message. Gather.</p>
    </div>
    <div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:24px">
      <button class="atab ${authM==='login'?'on':''}" onclick="authM='login';renderAuth()">Sign In</button>
      <button class="atab ${authM==='signup'?'on':''}" onclick="authM='signup';renderAuth()">Sign Up</button>
    </div>
    <form onsubmit="handleAuth(event)">
      ${authM==='signup'?`<div style="margin-bottom:12px"><label class="lbl">Username</label><input class="inp" id="aU" placeholder="coolperson42" required minlength="3" maxlength="20" pattern="[a-zA-Z0-9_]+"></div>
      <div style="margin-bottom:12px"><label class="lbl">Display Name</label><input class="inp" id="aN" placeholder="Cool Person" maxlength="50"></div>`:''}
      <div style="margin-bottom:12px"><label class="lbl">Email</label><input class="inp" type="email" id="aE" placeholder="you@example.com" required></div>
      <div style="margin-bottom:20px"><label class="lbl">Password</label><input class="inp" type="password" id="aP" placeholder="Min 6 characters" required minlength="6"></div>
      <button class="bp" type="submit" id="aBtn" style="width:100%;justify-content:center">${authM==='login'?'<i class="fas fa-arrow-right"></i> Sign In':'<i class="fas fa-user-plus"></i> Create Account'}</button>
    </form>
  </div></div>`;
}

async function handleAuth(e){
  e.preventDefault();const btn=document.getElementById('aBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  const email=document.getElementById('aE').value.trim(),pass=document.getElementById('aP').value;
  try{
    let r;
    if(authM==='signup'){
      const un=document.getElementById('aU').value.trim().toLowerCase(),fn=document.getElementById('aN').value.trim();
      r=await sb.auth.signUp({email,password:pass,options:{data:{username:un,full_name:fn}}});
      if(r.error)throw r.error;
      if(r.data.user&&!r.data.session){toast('Check your email to confirm, then sign in.','in');authM='login';renderAuth();return}
    }else{r=await sb.auth.signInWithPassword({email,password:pass});if(r.error)throw r.error}
    me=r.data.user;await new Promise(r=>setTimeout(r,800));await loadProf(me.id);
    toast('Welcome to Gather!','ok');renderApp();setupRT();
  }catch(err){toast(err.message||'Auth failed','er');btn.disabled=false;btn.innerHTML=authM==='login'?'<i class="fas fa-arrow-right"></i> Sign In':'<i class="fas fa-user-plus"></i> Create Account'}
}

async function loadProf(uid){const{data}=await sb.from('profiles').select('*').eq('id',uid).single();myProf=data||{id:uid,username:'user',full_name:'',avatar_url:'',bio:''}}
async function getProf(uid){const{data}=await sb.from('profiles').select('*').eq('id',uid).single();return data||{id:uid,username:'user',full_name:'',avatar_url:'',bio:''}}

// ── Realtime ─────────────────────────────────────────────────────
function setupRT(){
  sb.channel('app-realtime')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},()=>{if(view==='feed'&&!chatView)loadFeed()})
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},payload=>{
      const cid=payload.new.conversation_id;
      if(chatView&&((chatView.type==='dm'&&chatView.convId===cid)||(chatView.type==='group'&&chatView.groupId===cid))){loadMessages()}
      else{if(chatView.type==='dm')unreadDMs++;else unreadGroups++;renderNav();renderDMList()}
    })
    .subscribe();
}

        <img class="av av-s" src="${avUrl(myProf)}" alt="">
        <div style="min-width:0"><div style="font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(myProf?.full_name||myProf?.username)}</div><div class="hd" style="font-size:10px">@${esc(myProf?.username)}</div></div>

function renderMainContent(){
  const m=document.getElementById('mainArea');
  if(chatView){
    m.innerHTML=`<div id="chatArea" style="width:100%;height:100%"></div>`;
    if(chatView.type==='dm')renderDMChat();
    else renderGroupChat();
    return;
  }
  let sidePanel='';
  if(dmOpen&&(view==='feed'||view==='explore')){
    sidePanel=`<div class="dm-pane" id="dmSide">${renderDMPanel()}</div>`;
  }
  m.innerHTML=`<div class="feed-pane" id="feedPane">${renderFeedContent()}</div>${sidePanel}`;
  if(view==='feed')loadFeed();
  else if(view==='profile')loadUserPosts(me.id,true);
  else if(view==='explore')loadExplore();
  if(dmOpen)loadDMList();
}

function renderFeedContent(){
  if(view==='feed')return `<div class="feed-center">${renderComposer()}<div id="feedArea"><div style="text-align:center;padding:40px"><span class="spinner" style="width:28px;height:28px;border-width:3px"></span></div></div></div>`;
  if(view==='profile')return `<div class="feed-center">${renderProfHeader(myProf,true)}<div id="feedArea"><div style="text-align:center;padding:40px"><span class="spinner"></span></div></div></div>`;
  if(view==='explore')return `<div class="feed-center"><div id="feedArea"><div style="text-align:center;padding:40px"><span class="spinner"></span></div></div></div>`;
  return '';
}

function renderDMPanel(){
  return `<div style="padding:14px 14px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)">
    <h3 style="font-size:15px;font-weight:700">Messages</h3>
    <div style="display:flex;gap:4px">
      <button class="bi" onclick="goDMs()" title="Full view"><i class="fas fa-expand"></i></button>

  </div>
  <div style="padding:8px 10px"><input class="inp" style="font-size:12px;padding:8px 12px" placeholder="Search users..." id="dmSearch" oninput="searchDMUsers(this.value)"></div>

function closeDMPanel(){dmOpen=false;chatView=null;renderApp()}

// ── Feed ─────────────────────────────────────────────────────────
function renderComposer(){
  return `<div class="comp"><div style="display:flex;gap:10px"><img class="av" src="${avUrl(myProf)}" alt=""><textarea id="compT" placeholder="What's on your mind?"></textarea></div>
  <div id="imgPrev"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
    <label class="bi" style="cursor:pointer"><i class="fas fa-image" style="color:var(--grn)"></i><input type="file" accept="image/*" style="display:none" onchange="handleImg(event)"></label>
    <button class="bp bsm" id="compBtn" onclick="createPost()"><i class="fas fa-paper-plane"></i> Post</button>
  </div></div>`;
}

async function loadFeed(){
  const{data:posts}=await sb.from('posts').select('*,profiles(username,full_name,avatar_url)').order('created_at',{ascending:false}).limit(50);
  if(!posts){const el=document.getElementById('feedArea');if(el)el.innerHTML='<div class="empty-s"><i class="fas fa-feather-pointed"></i><p>No posts yet</p></div>';return}
  const pids=posts.map(p=>p.id);
  let ul=[],lc={},cc={};
  if(pids.length&&me){
    const{data:lks}=await sb.from('likes').select('post_id').eq('user_id',me.id).in('post_id',pids);ul=lks||[];
    const{data:allL}=await sb.from('likes').select('post_id');(allL||[]).forEach(l=>{lc[l.post_id]=(lc[l.post_id]||0)+1});
  }
  if(pids.length){const{data:cs}=await sb.from('comments').select('post_id').in('post_id',pids);(cs||[]).forEach(c=>{cc[c.post_id]=(cc[c.post_id]||0)+1})}
  const enriched=posts.map(p=>({...p,profile:p.profiles,liked:ul.some(l=>l.post_id===p.id),likeCount:lc[p.id]||0,commentCount:cc[p.id]||0}));
  renderPosts(enriched);
}

async function loadUserPosts(uid,isOwn){
  const{data:posts}=await sb.from('posts').select('*,profiles(username,full_name,avatar_url)').eq('user_id',uid).order('created_at',{ascending:false}).limit(50);
  const pids=posts.map(p=>p.id);let ul=[],lc={},cc={};
  if(pids.length&&me){const{data:lks}=await sb.from('likes').select('post_id').eq('user_id',me.id).in('post_id',pids);ul=lks||[];const{data:allL}=await sb.from('likes').select('post_id');(allL||[]).forEach(l=>{lc[l.post_id]=(lc[l.post_id]||0)+1})}
  if(pids.length){const{data:cs}=await sb.from('comments').select('post_id').in('post_id',pids);(cs||[]).forEach(c=>{cc[c.post_id]=(cc[c.post_id]||0)+1})}
  renderPosts(posts.map(p=>({...p,profile:p.profiles,liked:ul.some(l=>l.post_id===p.id),likeCount:lc[p.id]||0,commentCount:cc[p.id]||0}));
  if(isOwn)loadProfStats(uid);
}

function renderPosts(posts){
  const el=document.getElementById('feedArea');if(!el)return;
  if(!posts.length){el.innerHTML='<div class="empty-s"><i class="fas fa-feather-pointed"></i><p style="font-weight:600;margin-bottom:4px">No posts yet</p><p style="font-size:12px">Be the first to share something.</p></div>';return}
  el.innerHTML=posts.map(p=>`<article class="post" id="post-${p.id}"><div style="display:flex;gap:10px"><img class="av" src="${avUrl(p.profile)}" alt="" onclick="viewUser('${p.user_id}')"><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span class="un" onclick="viewUser('${p.user_id}')">${esc(p.profile?.full_name||p.profile?.username)}</span><span class="hd">@${esc(p.profile?.username)}</span><span class="ts">· ${timeAgo(p.created_at)}</span>${me&&me.id===p.user_id?`<button class="bi" style="margin-left:auto;font-size:12px" onclick="delPost('${p.id}')"><i class="fas fa-trash-can"></i></button>`:''}</div><div class="pb">${esc(p.content)}</div>${p.image_url?`<img class="post-img" src="${p.image_url}" alt="" onclick="lightbox('${p.image_url}')" loading="lazy" onerror="this.style.display='none'">`:''}<div class="pa"><button class="ab ${p.liked?'lk':''}" onclick="toggleLike('${p.id}',this)"><i class="fas fa-heart"></i> <span>${p.likeCount||''}</span></button><button class="ab" onclick="toggleCmt('${p.id}')"><i class="fas fa-comment"></i> <span>${p.commentCount||''}</span></button><button class="ab" onclick="sharePost('${p.id}')"><i class="fas fa-share-from-square"></i></button></div><div class="cmt-sec" id="cmt-${p.id}" style="display:none"></div></div></div></article>`).join('');
}

function renderProfHeader(p,isOwn){
  return `<div class="prof-h"><div class="prof-banner"></div><div style="padding:0 24px 24px"><div style="display:flex;align-items:flex-end;gap:14px;margin-top:-36px"><img class="av av-xl" src="${avUrl(p)}" alt="" style="border:4px solid var(--card)"><div style="flex:1"></div>${isOwn?`<button class="bg bsm" onclick="goSettings()"><i class="fas fa-pen"></i> Edit</button>`:`<button class="fbtn nf" id="followBtn-${p.id}" onclick="toggleFollow('${p.id}')">Follow</button>`}</div><h2 style="font-size:18px;font-weight:800;margin-top:12px">${esc(p.full_name||p.username)}</h2><p class="hd" style="margin-top:2px">@${esc(p.username)}</p><p style="font-size:13px;color:var(--fg2);margin-top:8px;line-height:1.5">${esc(p.bio)||'No bio yet.'}</p><div style="display:flex;gap:18px;margin-top:12px"><span id="pc0" style="font-size:12px"><strong>0</strong> <span style="color:var(--fg2)">Posts</span></span><span id="pc1" style="font-size:12px"><strong>0</strong> <span style="color:var(--fg2)">Followers</span></span><span id="pc2" style="font-size:12px"><strong>0</strong> <span style="color:var(--fg2)">Following</span></span></div></div></div>`;
}

async function loadProfStats(uid){
  const{count:pc}=await sb.from('posts').select('*',{count:'exact',head:true}).eq('user_id',uid);
  const{count:fc}=await sb.from('follows').select('*',{count:'exact',head:true}).eq('following_id',uid);
  const{count:gc}=await sb.from('follows').select('*',{count:'exact',head:true}).eq('follower_id',uid);
  const e0=document.getElementById('pc0'),e1=document.getElementById('pc1'),e2=document.getElementById('pc2');
  if(e0)e0.innerHTML=`<strong>${pc}</strong> <span style="color:var(--fg2)">Posts</span>`;
  if(e1)e1.innerHTML=`<strong>${fc}</strong> <span style="color:var(--fg2)">Followers</span>`;
  if(e2)e2.innerHTML=`<strong>${gc}</strong> <span style="color:var(--fg2)">Following</span>`;
}

// ── Post Actions ─────────────────────────────────────────────────
async function toggleLike(pid,btn){
  if(!me)return;const{data:ex}=await sb.from('likes').select('user_id').eq('user_id',me.id).eq('post_id',pid).single();
  if(ex){await sb.from('likes').delete().eq('user_id',me.id).eq('post_id',pid);btn.classList.remove('lk');const s=btn.querySelector('span');s.textContent=parseInt(s.textContent||'1')-1||''}
  else{await sb.from('likes').insert({user_id:me.id,post_id:pid});btn.classList.add('lk');const s=btn.querySelector('span');s.textContent=parseInt(s.textContent||'0')+1}
}

async function toggleCmt(pid){
  const sec=document.getElementById(`cmt-${pid}`);if(!sec)return;
  if(sec.style.display==='none'){
    sec.style.display='block';sec.innerHTML='<div style="padding:8px;text-align:center"><span class="spinner"></span></div>';
    const{data:cmts}=await sb.from('comments').select('*,profiles(username,full_name,avatar_url)').eq('post_id',pid).order('created_at',{ascending:true});
    sec.innerHTML=`${cmts.map(c=>`<div class="cmt-i"><img class="av av-s" src="${avUrl(c.profiles)}" alt=""><div style="flex:1"><span class="un" style="font-size:12px" onclick="viewUser('${c.user_id}')">${esc(c.profile?.full_name||c.profile?.username)}</span> <span class="hd" style="font-size:10px">${timeAgo(c.created_at)}</span><p style="font-size:12px;margin-top:1px">${esc(c.content)}</p></div>${me&&me.id===c.user_id?`<button class="bi" style="font-size:10px" onclick="delCmt('${c.id}','${pid}')"><i class="fas fa-xmark"></i></button>`:''}</div>`).join('')}<div class="cmt-row"><input id="ci-${pid}" placeholder="Reply..." onkeydown="if(event.key==='Enter')addCmt('${pid}')"><button class="bp bsm" onclick="addCmt('${pid}')" style="padding:7px 12px"><i class="fas fa-paper-plane"></i></button></div>`;
  }else sec.style.display='none';
}

async function addCmt(pid){const inp=document.getElementById(`ci-${pid}`);if(!inp||!inp.value.trim())return;await sb.from('comments').insert({user_id:me.id,post_id:pid,content:inp.value.trim()});inp.value='';toggleCmt(pid);setTimeout(()=>toggleCmt(pid),80)}
async function delCmt(cid,pid){await sb.from('comments').delete().eq('id',cid);toast('Deleted','ok');toggleCmt(pid);setTimeout(()=>toggleCmt(pid),80)}

async function createPost(){
  const ta=document.getElementById('compT'),content=ta?.value.trim();if(!content){toast('Write something','er');return}
  const btn=document.getElementById('compBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  let iu='';if(imgFile){try{const ext=imgFile.name.split('.').pop(),path=`${me.id}/${Date.now()}.${ext}`;const{error}=await sb.storage.from('post-images').upload(path,imgFile);if(!error){const{data}=sb.storage.from('post-images').getPublicUrl(path);iu=data.publicUrl}}catch(e){toast('Upload failed','er')}}
  await sb.from('posts').insert({user_id:me.id,content,image_url:iu});
  ta.value='';imgFile=null;imgPrev=null;btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Post';
  const pr=document.getElementById('imgPrev');if(pr)pr.innerHTML='';toast('Posted!','ok');loadFeed();
}
function handleImg(e){const f=e.target.files[0];if(!f)return;if(f.size>5*1024*1024){toast('Max 5MB','er');return}imgFile=f;imgPrev=URL.createObjectURL(f);document.getElementById('imgPrev').innerHTML=`<div style="position:relative;border-radius:8px;overflow:hidden;margin-top:8px"><img src="${imgPrev}" style="width:100%;max-height:180px;object-fit:cover;border-radius:8px" alt=""><button onclick="event.stopPropagation();rmImg()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:11px"><i class="fas fa-xmark"></i></button></div>`}
function rmImg(){imgFile=null;if(imgPrev)URL.revokeObjectURL(imgPrev);imgPrev=null;document.getElementById('imgPrev').innerHTML='';document.querySelector('input[type=file]').value=''}
async function delPost(pid){showModal('Delete Post','Are you sure? This cannot be undone.',[{t:'Cancel',cls:'bg bsm',fn:()=>{}},{t:'Delete',cls:'bp bsm',st:'background:var(--red);color:#fff',fn:async()=>{await sb.from('posts').delete().eq('id',pid);toast('Deleted','ok');if(view==='feed')loadFeed();else loadUserPosts(viewUid||me.id)}}])}
function sharePost(pid){navigator.clipboard.writeText(`${location.origin}#post-${pid}`).then(()=>toast('Link copied','ok')).catch(()=>toast('Copy failed','er'))}
function lightbox(src){const el=document.createElement('div');el.className='img-lb';el.onclick=()=>el.remove();el.innerHTML=`<img src="${src}" alt="">`;document.body.appendChild(el)}

// ── Follow / View User ───────────────────────────────────────────
async function toggleFollow(uid){if(!me||me.id===uid)return;const{data:ex}=await sb.from('follows').select('follower_id').eq('follower_id',me.id).eq('following_id',uid).single();if(ex){await sb.from('follows').delete().eq('follower_id',me.id).eq('following_id',uid);toast('Unfollowed','in')}else{await sb.from('follows').insert({follower_id:me.id,following_id:uid});toast('Following!','ok')}const b=document.getElementById(`followBtn-${uid}`);if(b){b.textContent=ex?'Follow':'Following';b.className=ex?'fbtn nf':'fbtn fw'}}

async function viewUser(uid){
  if(me&&uid===me.id){chatView=null;view='profile';renderApp();return}
  chatView=null;view='profile';viewUid=uid;renderApp();
  const p=await getProf(uid);
  document.getElementById('feedArea')?.parentElement?.querySelector('.feed-center')?.insertAdjacentHTML?.('afterbegin','');
  // Re-render feed content for other user
  const fp=document.getElementById('feedPane');

async function loadDMList(){
  // Get conversations I'm in
  const{data:parts}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',me.id);
  if(!parts||!parts.length){const el=document.getElementById('dmListFull')||document.getElementById('dmList');if(el)el.innerHTML='<div class="empty-s" style="padding:20px"><i class="fas fa-comment-dots"></i><p style="font-size:12px">No conversations yet</p></div>';return}
  const cids=parts.map(p=>p.conversation_id);
  // Get other participants
  const{data:otherParts}=await sb.from('conversation_participants').select('conversation_id,user_id,profiles(username,full_name,avatar_url)').in('conversation_id',cids).neq('user_id',me.id);
  // Get last message per conversation
  const{data:msgs}=await sb.from('messages').select('*').in('conversation_id',cids).order('created_at',{ascending:false});
  // Group messages
  const lastMsg={};msgs.forEach(m=>{if(!lastMsg[m.conversation_id])lastMsg[m.conversation_id]=m});
  // Build list
  const convMap={};(otherParts||[]).forEach(p=>{convMap[p.conversation_id]=p});
  const list=(parts||[]).map(p=>{
    const other=convMap[p.conversation_id];
    const last=lastMsg[p.conversation_id];
    if(!other)return null;
    return{cid:p.conversation_id,peer:other,last};
  }).filter(Boolean).sort((a,b)=>new Date(b.last?.created_at||0)-new Date(a.last?.created_at||0));

  const el=document.getElementById('dmListFull')||document.getElementById('dmList');
  if(!el)return;
  if(!list.length){el.innerHTML='<div class="empty-s" style="padding:20px"><i class="fas fa-comment-dots"></i><p style="font-size:12px">No conversations yet</p></div>';return}
  el.innerHTML=list.map(c=>`<div class="dm-item ${chatView?.convId===c.cid?'on':''}" onclick="openDM('${c.cid}','${c.peer.user_id}')">
    <img class="av av-s" src="${avUrl(c.peer.profiles)}" alt="">
    <div style="min-width:0;flex:1">
      <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.peer.profiles?.full_name||c.peer.profiles?.username)}</div>
      <div class="last-msg">${c.last?esc(c.last.content):'No messages'}</div>
    </div>
    ${c.last?`<span class="ts">${timeAgo(c.last.created_at)}</span>`:''}
  </div>`).join('');
}

function searchDMUsers(q){
  if(!q.trim())return loadDMList();
  sb.from('profiles').select('*').or(`username.ilike.%${q}%,full_name.ilike.%${q}%`).neq('id',me.id).limit(10).then(({data})=>{
    const el=document.getElementById('dmListFull')||document.getElementById('dmList');
    if(!el||!data?.length){if(el)el.innerHTML='<div style="padding:12px;color:var(--fg2);font-size:12px;text-align:center">No users found</div>';return}
    el.innerHTML=data.map(u=>`<div class="dm-item" onclick="startDMWith('${u.id}')"><img class="av av-s" src="${avUrl(u)}" alt=""><div><div style="font-weight:600;font-size:13px">${esc(u.full_name||u.username)}</div><div class="hd">@${esc(u.username)}</div></div></div>`).join('');
  });
}

async function startDMWithUsername(name){
  const{data}=await sb.from('profiles').select('*').ilike('username',name).neq('id',me.id).limit(1);
  if(!data?.length){toast('User not found','er');return}
  startDMWith(data[0].id);
}

async function startDMWith(uid){
  if(uid===me.id){toast('Cannot message yourself','er');return}
  // Check if conversation exists
  const{data:myConvs}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',me.id);
  const{data:theirConvs}=await sb.from('conversation_participants').select('conversation_id').eq('user_id',uid);
  const myCids=(myConvs||[]).map(c=>c.conversation_id);
  const theirCids=(theirConvs||[]).map(c=>c.conversation_id);
  const existing=myCids.find(c=>theirCids.includes(c));
  if(existing){openDM(existing,uid);return}
  // Create new
  const{data:conv}=await sb.from('conversations').insert({}).select().single();
  await sb.from('conversation_participants').insert([{conversation_id:conv.id,user_id:me.id},{conversation_id:conv.id,user_id:uid}]);
  openDM(conv.id,uid);
  toast('Conversation started','ok');
}

async function openDM(cid,peerId){
  chatView={type:'dm',convId:cid,peerId};unreadDMs=0;renderNav();
  const area=document.getElementById('dmChatArea');
  if(area){area.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';loadDMChat(area,cid,peerId)}
  else{renderDMFull();setTimeout(()=>{const a=document.getElementById('dmChatArea');if(a)loadDMChat(a,cid,peerId)},50)}
  // Update list active state
  document.querySelectorAll('.dm-item').forEach(el=>el.classList.remove('on'));
  loadDMList();
}

async function loadDMChat(area,cid,peerId){
  const peer=await getProf(peerId);
  area.innerHTML=`<div class="chat-header"><button class="bi" onclick="chatView={type:'dm'};renderDMFull()" style="margin-right:4px"><i class="fas fa-arrow-left"></i></button><img class="av av-s" src="${avUrl(peer)}" alt=""><div><div style="font-weight:600;font-size:13px">${esc(peer.full_name||peer.username)}</div><div class="hd" style="font-size:10px">@${esc(peer.username)}</div></div></div><div class="chat-messages" id="chatMsgs"><div style="text-align:center;padding:40px"><span class="spinner"></span></div></div><div class="chat-input-bar"><input class="inp" id="chatInp" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendDM()"><button class="bp bsm" onclick="sendDM()" style="padding:8px 14px"><i class="fas fa-paper-plane"></i></button></div>`;
  loadMessages();
  document.getElementById('chatInp')?.focus();
}

async function sendDM(){
  if(!chatView)return;const inp=document.getElementById('chatInp');if(!inp||!inp.value.trim())return;
  await sb.from('messages').insert({conversation_id:chatView.convId,sender_id:me.id,content:inp.value.trim()});
  inp.value='';loadMessages();
}

async function loadMessages(){
  if(!chatView)return;
  const cid=chatView.type==='dm'?chatView.convId:chatView.groupId;
  const{data:msgs}=await sb.from('messages').select('*,profiles(username,full_name,avatar_url)').eq('conversation_id',cid).order('created_at',{ascending:true}).limit(100);
  const el=document.getElementById('chatMsgs');if(!el)return;
  if(!msgs.length){el.innerHTML='<div class="empty-s" style="padding:20px"><p style="font-size:12px">No messages yet. Say hello!</p></div>';return}
  let html='',lastDate='';
  msgs.forEach(m=>{
    const d=new Date(m.created_at).toLocaleDateString();
    if(d!==lastDate){lastDate=d;html+=`<div class="msg-date-divider"><span>${d===new Date().toLocaleDateString()?'Today':d}</span></div>`}
    const isMe=m.sender_id===me.id;
    html+=`<div style="display:flex;gap:6px;${isMe?'flex-direction:row-reverse':''}"><div class="msg-bubble ${isMe?'msg-self':'msg-other'}"><div>${esc(m.content)}</div><div class="msg-meta" style="text-align:${isMe?'right':'left'}">${isMe?'You':esc(m.profiles?.username||'user')} · ${timeAgo(m.created_at)}</div></div></div>`;
  });
  el.innerHTML=html;
  el.scrollTop=el.scrollHeight;
}

// Override showModal to support custom body HTML
function showModal(title,body,btns,cancelClose=true,customBody=''){

  el.onclick=e=>{if(e.target===el&&cancelClose)closeModal()};
  el.innerHTML=`<div class="modal-b"><h3 style="font-size:17px;font-weight:700;margin-bottom:14px">${title}</h3>${customBody?customBody:`<p style="color:var(--fg2);font-size:13px;margin-bottom:18px;line-height:1.6">${body}</p>`}<div style="display:flex;gap:8px;justify-content:flex-end">${btns.map((b,i)=>`<button class="${b.cls}" style="${b.st||''}" data-mi="${i}">${b.t}</button>`).join('')}</div></div>`;
  document.body.appendChild(el);
  el.querySelectorAll('[data-mi]').forEach(b=>{b.onclick=()=>{btns[+b.dataset.mi].fn()}});
}

async function showGroupInfo(gid){
  const{data:grp}=await sb.from('groups').select('*').eq('id',gid).single();

  const{data:users}=await sb.from('profiles').select('*').neq('id',me.id).order('created_at',{ascending:false}).limit(8);
  if(users?.length){
    document.getElementById('exploreResults').innerHTML=`<h3 style="font-size:14px;font-weight:600;color:var(--fg2);margin-bottom:12px">Suggested for you</h3>${users.map(u=>`<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser('${u.id}')"><img class="av" src="${avUrl(u)}" alt=""><div style="flex:1;min-width:0"><div class="un">${esc(u.full_name||u.username)}</div><div class="hd">@${esc(u.username)}</div>${u.bio?`<p style="font-size:11px;color:var(--fg2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(u.bio)}</p>`:''}</div><button class="fbtn nf" onclick="event.stopPropagation();toggleFollow('${u.id}');this.textContent=this.textContent==='Follow'?'Following':'Follow';this.className=this.textContent==='Follow'?'fbtn nf':'fbtn fw'">Follow</button></div>`).join('')}`;
  }
}

async function doExplore(q){
  if(!q.trim()){loadExplore();return}
  const{data:users}=await sb.from('profiles').select('*').or(`username.ilike.%${q}%,full_name.ilike.%${q}%`).neq('id',me.id).limit(20);
  const el=document.getElementById('exploreResults');if(!el)return;
  if(!users?.length){el.innerHTML='<div class="empty-s"><p style="font-size:12px">No users found</p></div>';return}
  el.innerHTML=users.map(u=>`<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="viewUser('${u.id}')"><img class="av" src="${avUrl(u)}" alt=""><div style="flex:1;min-width:0"><div class="un">${esc(u.full_name||u.username)}</div><div class="hd">@${esc(u.username)}</div></div><button class="fbtn nf" onclick="event.stopPropagation();toggleFollow('${u.id}');this.textContent=this.textContent==='Follow'?'Following':'Follow';this.className=this.textContent==='Follow'?'fbtn nf':'fbtn fw'">Follow</button></div>`).join('');
}

// ── Settings ─────────────────────────────────────────────────────
async function goSettings(){
  chatView=null;view='settings';renderApp();
  const m=document.getElementById('mainArea');
  m.innerHTML=`<div class="feed-pane"><div class="feed-center">
    <h2 style="font-size:20px;font-weight:800;margin-bottom:20px">Settings</h2>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Edit Profile</h3>
      <div style="margin-bottom:14px"><label class="lbl">Display Name</label><input class="inp" id="setName" value="${esc(myProf?.full_name||'')}" maxlength="50"></div>
      <div style="margin-bottom:14px"><label class="lbl">Username</label><input class="inp" id="setUser" value="${esc(myProf?.username||'')}" maxlength="20" pattern="[a-zA-Z0-9_]+"></div>
      <div style="margin-bottom:14px"><label class="lbl">Bio</label><textarea class="inp" id="setBio" maxlength="160" style="resize:none;min-height:60px;font-size:13px">${esc(myProf?.bio||'')}</textarea></div>
      <div style="margin-bottom:14px"><label class="lbl">Avatar URL</label><input class="inp" id="setAvatar" value="${esc(myProf?.avatar_url||'')}" placeholder="https://example.com/avatar.jpg"></div>
      <button class="bp" onclick="saveSettings()"><i class="fas fa-check"></i> Save Changes</button>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:8px;color:var(--red)">Danger Zone</h3>
      <p style="font-size:12px;color:var(--fg2);margin-bottom:14px">Sign out of your account</p>
      <button class="bg" style="border-color:var(--red);color:var(--red)" onclick="handleLogout()"><i class="fas fa-right-from-bracket"></i> Sign Out</button>
    </div>
  </div></div>`;
}

async function saveSettings(){
  const fn=document.getElementById('setName').value.trim();
  const un=document.getElementById('setUser').value.trim().toLowerCase();
  const bio=document.getElementById('setBio').value.trim();
  const avu=document.getElementById('setAvatar').value.trim();
  if(!un||!/^[a-zA-Z0-9_]+$/.test(un)){toast('Invalid username','er');return}
  const{error}=await sb.from('profiles').update({full_name:fn,username:un,bio,avatar_url:avu}).eq('id',me.id);
  if(error){toast(error.message,'er');return}
  myProf={...myProf,full_name:fn,username:un,bio,avatar_url:avu};
  toast('Profile updated!','ok');renderNav();
}

// ── Navigation ───────────────────────────────────────────────────
function goFeed(){chatView=null;view='feed';dmOpen=true;renderApp()}
function goProfile(){chatView=null;view='profile';renderApp()}
function goExplore(){chatView=null;view='explore';dmOpen=true;renderApp()}

async function handleLogout(){
  await sb.auth.signOut();me=null;myProf=null;chatView=null;view='feed';renderAuth();
}

// Override renderDMChat for inline calls
async function renderDMChat(){
  if(!chatView||chatView.type!=='dm')return;
  const area=document.getElementById('chatArea');
  if(area){area.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';await loadDMChat(area,chatView.convId,chatView.peerId)}
}

async function renderGroupChat(){
  if(!chatView||chatView.type!=='group')return;
  const area=document.getElementById('chatArea');
  if(area){area.innerHTML='<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';await loadGroupChat(area,chatView.groupId)}
}

// ── Start ────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
